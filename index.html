","en_meaning":"the gradual coming together of things from different sources or in different directions; the state of being converged","th_meaning":"การรวมตัวเข้าด้วยกัน หรือความร่วมกันของสิ่งต่างๆจากแหล่งที่แตกต่างหรือทางที่แตกต่างกัน","example_en":"The countries are moving towards political convergence.","example_th":"ประเทศกำลังเดินหน้าในทางการรวมตัวเข้าด้วยกันของนโยบายการเมือง"},{"word":"coordinate","pos":"noun, verb","en_meaning":"to arrange or regulate things in a systematic and harmonious way; to align or organize people, events, or systems so that they work together effectively","th_meaning":"จัดสรรให้ตรงกันข้าม ทำให้มีความสอดคล้องกัน","example_en":"They need to coordinate their efforts to complete the project on time.","example_th":"ต้องจัดสรรการณ์ทุกคนให้สามารถทำงานร่วมกันได้อย่างมีประสิทธิภาพ"},{"word":"coordination","pos":"noun","en_meaning":"the act of bringing different elements or parts into a harmonious relationship or order","th_meaning":"การส่งเสริมความสัมพันธ์อย่างมีประสิทธิภาพหรือการจัดการเรื่องราวที่เกี่ยวข้องกันโดยมีความสอดคล้องกัน","example_en":"The project required close coordination among all team members.","example_th":"โครงการนี้จำเป็นต้องทำการประสานงานอย่างใกล้ชิดกับสมาชิกทุกคนในทีม"},{"word":"cord","pos":"noun","en_meaning":"a long piece of flexible material used to tie or suspend things, especially one made of rope or wire.","th_meaning":"สตริงหรือสายที่ใช้ในการเชื่อมต่อหรือซับเฉือนสิ่งของ","example_en":"She tied the cord tightly around the package.","example_th":"เธอจับกุมดินไม้ให้มีความแน่นอนอย่างแข็งแรง"},{"word":"coronary","pos":"adjective","en_meaning":"relating to the arteries that supply blood to the heart muscle","th_meaning":"ที่เกี่ยวข้องกับเลือดอัดไหลไปยังเนื้อเยื่อหัวใจ","example_en":"The patient was diagnosed with a blockage in his coronary artery.","example_th":"ผู้ป่วยถูกพบว่ามีการบล็อกเกี่ยวกับเลือดอัดในหลอดเลือดหัวใจของเขานั้น"},{"word":"corpus","pos":"noun","en_meaning":"a collection of written or printed works.","th_meaning":"กลุ่มข้อความหรือเอกสารที่รวมกันเป็นหนึ่งชุดใหญ่","example_en":"The corpus includes texts from various genres and time periods.","example_th":"คุรัสปัจจุบันประกอบด้วยข้อความจากหลากหลายประเภทและยุค"},{"word":"correction","pos":"noun","en_meaning":"the act of correcting something that is wrong or inaccurate","th_meaning":"การแก้ไขที่ผิดพลาดหรือไม่ถูกต้อง","example_en":"The teacher gave the students homework with corrections.","example_th":"ครูมอบงานให้นักเรียนและระบุความช่วยเหลือในการแก้ไข"},{"word":"correctly","pos":"adverb","en_meaning":"in a correct manner or way; properly.","th_meaning":"ถูกต้องอย่างมีประสิทธิภาพ","example_en":"He answered the question correctly.","example_th":"เขามองคำตอบเป็นที่ถูกต้อง"},{"word":"correlate","pos":"verb","en_meaning":"to establish a statistical relationship between two or more sets of data","th_meaning":"ที่มาเกี่ยวข้องหรือมีความสัมพันธ์กัน","example_en":"There is a strong correlation between smoking and lung cancer.","example_th":"การบวมข้อมูลระหว่างการสูบบุหรี่และมะเร็งปอดมีความสัมพันธ์อย่างรุนแรง"},{"word":"correlation","pos":"noun","en_meaning":"the relationship between two or more variables such that a change in one variable is associated with a change in the other.","th_meaning":"ความสัมพันธ์ระหว่างสองหรือมากกว่าตัวแปรที่การเปลี่ยนแปลงในหนึ่งตัวแปรจะเกี่ยวข้องกับการเปลี่ยนแปลงของตัวแปรอื่น","example_en":"There is a strong correlation between the amount of time spent studying and academic performance.","example_th":"มีความสัมพันธ์ที่แข็งแรงระหว่างเวลาที่ใช้เรียนและผลการเรียน"},{"word":"correspondence","pos":"noun","en_meaning":"the exchange of letters or messages between people, especially over a period of time.","th_meaning":"การสื่อสารอย่างต่อเนื่องระหว่างคนสองคน หรือกลุ่มผู้คน","example_en":"There is frequent correspondence between the two countries.","example_th":"มีการสื่อสารที่บ่อยครั้งระหว่างประเทศสองแห่งนี้"},{"word":"corruption","pos":"noun","en_meaning":"the practice of obtaining unfair advantages or privileges, especially in public office, by bribery.","th_meaning":"การแย่งแฝงหรือการทุจริตในตำแหน่งผู้บริหารหรือองค์กรที่เป็นสาธารณะ","example_en":"The government has been fighting corruption for years.","example_th":"รัฐบาลได้รับมือกับการแย่งแฝงเป็นปีหลายปีแล้ว"},{"word":"cortex","pos":"noun","en_meaning":"The layer of nerve tissue on the surface of the brain and spinal cord.","th_meaning":"หนังปัญญาหรือประสาทที่อยู่บริเวณผิวของสมองและกระดูกหลัง","example_en":"Damage to the cortex can lead to a loss of cognitive functions.","example_th":"ความเสียหายต่อหนังปัญญาอาจนำไปสู่การفقدนักคิด"},{"word":"credibility","pos":"noun","en_meaning":"the quality of being believed or trusted; the quality of having a basis in fact or reality","th_meaning":"ความเชื่อถือ, ความน่าเชื่อถือ","example_en":"His credibility was shaken after the scandal.","example_th":"การกลัวมิตรภาพของเขาถูกสั่งให้ดับซึ่งเกิดจากเหตุการณ์คริยามูลค่า"},{"word":"critically","pos":"adverb","en_meaning":"in a serious and thorough manner; with great care and attention to detail;","th_meaning":"อย่างเคร่งครัดและละเอียดรอบคอบ;","example_en":"The doctor examined the patient critically.","example_th":"แพทย์ตรวจคนไข้อย่างเคร่งครัด"},{"word":"critique","pos":"noun","en_meaning":"a careful analysis and evaluation, especially of something bad or unsatisfactory; criticism","th_meaning":"การวิเคราะห์และการประเมินค่าอย่างรอบคอบ หรือการรีวิว","example_en":"The painting received a mixed critique from the art critics.","example_th":"ภาพวาดได้รับความเห็นที่ต่างกันจากนักศิลปะ"},{"word":"crude","pos":"noun, adjective","en_meaning":"1. lacking in fineness or polish; rough and unfinished. 2. having little refinement or sophistication.","th_meaning":"ไม่เป็นทางการ, ที่สิ้นเปลือง, ดีก็เท่านี้","example_en":"The furniture was quite crude but functional.","example_th":"ตัวเฟอร์นิเจอร์มันดูไม่ถูกต้องแต่มันใช้งานได้"},{"word":"crystal","pos":"noun","en_meaning":"A clear and transparent mineral or a mass of such a mineral.","th_meaning":"คริสตัล (krisat)","example_en":"He holds a crystal glass with ice cubes.","example_th":"เขารักษาถ้วยคริสตัลกับส่วนแข็งข้นในน้ำแข็ง"},{"word":"cue","pos":"noun","en_meaning":"a signal or a suggestion to begin doing something, typically in the context of stage performances or sports.","th_meaning":"คำเตือนหรือข้อมูลเพื่อให้เริ่มทำบางอย่าง อาจใช้ในบริบทการแสดงทางหน้าที่หรือกีฬา","example_en":"He gave her a cue to begin singing.","example_th":"เขากับเธอว่าเริ่มร้อง"},{"word":"cure","pos":"noun","en_meaning":"a means of healing a disease or disorder, especially a medical treatment or remedy.","th_meaning":"การรักษาหรือการแก้ไขโรคหรือภาวะสุขภาพ","example_en":"The doctor prescribed a new cure for his patient's illness.","example_th":"แพทย์กำหนดการรักษาใหม่สำหรับปัญหาของคนไข้ของเขา"},{"word":"curriculum","pos":"noun","en_meaning":"a set of courses or subjects that are taught in a school, college, university, or other educational institution.","th_meaning":"หลักสูตรการศึกษา","example_en":"She is studying for her master's degree and hopes to join a prestigious university with an excellent curriculum.","example_th":"เธอกำลังเรียนปริญญาโทและหวังจะเข้ามหาวิทยาลัยที่มีหลักสูตรที่ดี"},{"word":"cyclic","pos":"adjective","en_meaning":"occurring or arranged in a regular cycle; returning to a previous state or condition at regular intervals.","th_meaning":"เกิดขึ้นในวงจรเดียวกันหรือเรียงเป็นวงจรที่ซ้ำตัวเอง","example_en":"The seasons are cyclic, with winter following summer.","example_th":"ฤดูกาลมีความวนซ้ำ ซึ่งฤดูร้อนตามด้วยฤดูหนาว"},{"word":"cylinder","pos":"noun","en_meaning":"a round solid figure whose surface is the union of two parallel circles and all points on a straight line joining the two planes that contain the two circles.","th_meaning":"ทรงกระบอก","example_en":"The water tank has the shape of a cylinder.","example_th":"ถังน้ำมีรูปร่างเป็นทรงกระบอก"},{"word":"damp","pos":"adjective","en_meaning":"moist; wet; saturated with moisture","th_meaning":"ชื้น (chiin)","example_en":"The carpet was damp after the rain.","example_th":"การดูดซับผ่านพื้นล้างจะทำให้วัสดุอิฐแห้งขึ้นและไม่ชื้น"},{"word":"deadline","pos":"noun","en_meaning":"a specified time by which something must be done or achieved; a last date or point in time.","th_meaning":"วันที่กำหนดหรือวันสุดท้ายในการทำบางอย่าง","example_en":"The project has a strict deadline of two weeks from today.","example_th":"โครงการนี้มีเวลาที่กำหนด 2 สัปดาห์จากวันนี้"},{"word":"decay","pos":"noun","en_meaning":"the process of deterioration or breaking down, especially the decomposition of organic matter","th_meaning":"การเสื่อมสภาพหรือสิ่งแวดล้อมที่ร้ายแรงต่อทรัพยากรทางธรรมชาติ","example_en":"The food in the fridge is beginning to decay.","example_th":"อาหารในถังเย็นกำลังเริ่มเสื่อมสภาพ"},{"word":"deceive","pos":"verb","en_meaning":"to make someone believe something that is not true","th_meaning":"ทำให้คนอื่นเชื่อว่าบางสิ่งที่ไม่จริง","example_en":"She tried to deceive him with a fake identity.","example_th":"เธอพยายามหลอกเขาด้วยบุคคลสร้างขึ้นมา"},{"word":"defect","pos":"noun","en_meaning":"an imperfection or flaw in something.","th_meaning":"มีสิ่งที่ไม่สมบูรณ์หรือมีปัญหา","example_en":"There is a defect in the product.","example_th":"ผลิตภัณฑ์มีความผิดพลาด"},{"word":"deficiency","pos":"noun","en_meaning":"the state of lacking something; the absence or shortage of something necessary","th_meaning":"ขาดสิ่งที่จำเป็น หรือการไม่มีอยู่ในปริมาณที่เพียงพอ","example_en":"There is a deficiency in resources.","example_th":"มีความขาดแคลนทรัพยากร"},{"word":"definite","pos":"adjective","en_meaning":"clear or unmistakable","th_meaning":"ชัดเจนหรือไม่สงสัย","example_en":"The answer is definite.","example_th":"คำตอบมันชัดเจน"},{"word":"deflection","pos":"noun","en_meaning":"the action of diverting from a course or direction, especially in an official or formal context.","th_meaning":"การเปลี่ยนแปลงทิศทางหรือเส้นทางจากจุดหมายที่กำหนดไว้","example_en":"The project was subject to numerous deflections due to changing requirements.","example_th":"โครงการมีการเปลี่ยนแปลงทิศทางหลายครั้งเนื่องจากความต้องการเปลี่ยนแปลง"},{"word":"degrade","pos":"verb","en_meaning":"to make worse or lower in quality or condition, to cause someone's moral or social standing to decline","th_meaning":"ทำให้เสียคุณภาพ ลดระดับหรือสภาพแวดล้อมทางสังคมของใคร đó","example_en":"The environment has been degrading over the years.","example_th":"สภาพแวดล้อมมีการเปลี่ยนแปลงที่ไม่ดีขึ้นในช่วงเวลาที่ผ่านมา"},{"word":"deliberately","pos":"adverb","en_meaning":"on purpose or with care and attention","th_meaning":"อย่างระมัดระวัง หรือด้วยใจชิด","example_en":"He spoke deliberately to ensure his words were understood.","example_th":"เขากล่าวอย่างระมัดระวังเพื่อให้คำพูดของเขานั่งรืบ"},{"word":"delta","pos":"noun","en_meaning":"a geographical area where a river enters an ocean or sea, characterized by its typically flat and triangular shape.","th_meaning":"ปากน้ำที่ไหลเข้าสู่ทะเลหรือมหาสมุทร โดยมีลักษณะเป็นรูปสามเหลี่ยมแบ่งพื้นผิวให้ราบรื่นและแบกบัง","example_en":"The Nile delta is one of the world's most fertile regions.","example_th":"ปากน้ำอินูโลห์เป็นพื้นที่สีเขียวและผลิตภัณฑ์ที่ดีที่สุดในโลก"},{"word":"demonstrator","pos":"noun","en_meaning":"a person who shows, explains, or presents something to others as an example or proof","th_meaning":"ผู้ที่แสดงหรืออธิบายบางอย่างให้เห็นด้วยกัน เช่น เพื่อเป็นตัวอย่างหรือหลักฐาน","example_en":"The new employee was asked to be a demonstrator for the presentation.","example_th":"พนักงานใหม่ถูกเรียกไปแสดงให้เห็นในประชุมนำเสนอ"},{"word":"denominator","pos":"noun","en_meaning":"a number by which another number (the numerator) is divided.","th_meaning":"เลขที่นำมาหารด้วยเลขเศษในการคำนวณเศษ","example_en":"The denominator in the fraction 3/4 is 4.","example_th":"ในตัวอย่าง 3/4 4 คือเลขส่วน"},{"word":"denote","pos":"verb","en_meaning":"to indicate or signify by means of a symbol, sign, or other representation","th_meaning":"หมายถึง การสื่อสารผ่านสัญลักษณ์ เช่น ข้อมูลที่แสดงผลิตภัณฑ์ในห้างสรรพสินค้าต่าง ๆ เกี่ยวกับแบรนด์และประเภทของผลิตภัณฑ์","example_en":"The symbol denotes the quantity.","example_th":"สัญลักษณ์นี้หมายถึงจำนวนนั้น"},{"word":"dense","pos":"adjective","en_meaning":"very full or thick","th_meaning":"หนาแน่น (naphan)","example_en":"The forest is very dense.","example_th":"_forest น่าจะเป็น naphan เยอะมาก"},{"word":"dependence","pos":"noun","en_meaning":"the state of depending on something or someone; the action of relying on another person or thing to some extent.","th_meaning":"การขึ้นอยู่กับหรือการพึ่งพาสิ่งใดบางสิ่งหนึ่ง","example_en":"He has an addiction to drugs and is in deep dependence on them.","example_th":"เขามีความขึ้นอยู่กับยาเสพติดและอยู่ในภาวะการพึ่งพาซึ่งลึกซึ้ง"},{"word":"depict","pos":"verb","en_meaning":"to draw or paint a picture of something, especially in order to make it look like reality","th_meaning":"ตีความเขียนหรือวาดภาพให้เหมือนถูกต้องในโลกจริง","example_en":"The artist depicted the famous painter with great accuracy.","example_th":"ศิลปินนี้ได้ตีความภาพของคนที่มักรู้จักอย่างแม่นยำมาก"},{"word":"derivative","pos":"noun","en_meaning":"a function that describes how a dependent variable changes as an independent variable changes; the instantaneous rate of change of a function with respect to its argument.","th_meaning":"สิ่งที่ปรับเปลี่ยนอยู่ตามการเปลี่ยนแปลงของตัวแปรอื่น และเป็นความเร็วทันท่วงทีในการเปลี่ยนแปลงของฟังก์ชัน","example_en":"The derivative of x^2 is 2x.","example_th":"อนุพันธ์ของ x^2 เป็น 2x"},{"word":"descendent","pos":"noun","en_meaning":"a person who is a descendant of another","th_meaning":"บุตรหลานหรือพ่อแม่ที่เกิดขึ้นมาตามลำดับ","example_en":"He is the great-grandson of the king.","example_th":"เขามีความสัมพันธ์กับพระเจ้าเป็นบรรดา"},{"word":"descriptor","pos":"noun","en_meaning":"A word or phrase used to describe or characterize something.","th_meaning":"คำที่ใช้เพื่อเป็นคำบรรยายหรือจำลองเรื่องบางอย่าง","example_en":"He is a diligent worker.","example_th":"เขาทำงานรับผิดชอบ"},{"word":"destination","pos":"noun","en_meaning":"the point to which someone is going or something is being sent","th_meaning":"จุดหมายปลายทาง","example_en":"My destination is New York.","example_th":"จุดหมายของฉันคือ نيويورก"},{"word":"detection","pos":"noun","en_meaning":"the act or process of identifying something by its presence, characteristics, etc.","th_meaning":"การตรวจจับ","example_en":"The police conducted a thorough detection of the crime scene.","example_th":"ตำรวจทำการตรวจจับที่เกิดเหตุอย่างรอบคอบ"},{"word":"developmental","pos":"adjective","en_meaning":"relating to or caused by development, especially physical or mental growth.","th_meaning":"เกี่ยวกับการพัฒนาหรือทำให้มีความทันสมัยขึ้น","example_en":"This is a developmental project.","example_th":"นี้เป็นโครงการพัฒนา"},{"word":"deviation","pos":"noun","en_meaning":"the difference between the actual and the expected, calculated as the square root of the sum of the squares of the differences","th_meaning":"ความผิดปกติหรือการเบือนเบือนของข้อมูลจากค่าเฉลี่ยที่กำหนดไว้","example_en":"The measurement resulted in a deviation from the expected value.","example_th":"การวัดนี้เกิดการเบือนเบือนในค่าคาดหวัง"},{"word":"diagnose","pos":"verb","en_meaning":"to identify the nature and cause of a disease or disorder","th_meaning":"วินิจฉัย (winnijai)","example_en":"The doctor diagnosed the patient with pneumonia.","example_th":"แพทย์วินิจฉัยไข้พอดีให้คนไข้"},{"word":"diagnosis","pos":"noun","en_meaning":"the act of identifying a disease or condition by its signs and symptoms","th_meaning":"การวินิจฉัยโรคหรืออาการโดยใช้สัญญาณและอาการของผู้ป่วย","example_en":"The doctor performed the diagnosis and prescribed medication.","example_th":"แพทย์ทำการวินิจฉัยแล้วให้ยา"},{"word":"diagnostic","pos":"noun","en_meaning":"the process or art of identifying a disease by its symptoms","th_meaning":"การตรวจจับโรคโดยการระบุอาการของโรค","example_en":"The doctor performed a thorough diagnostic.","example_th":"แพทย์ทำการวินิจฉัยอย่างละเอียด"},{"word":"diagram","pos":"noun","en_meaning":"a drawing or plan that represents relationships or processes in a clear, simplified way.","th_meaning":"แผนภูมิหรือแผนที่แสดงความสัมพันธ์หรือกระบวนการในรูปแบบที่ชัดเจนและง่ายขึ้น","example_en":"The teacher used a diagram to explain the process.","example_th":"ครูใช้แผนภูมิในการอธิบายกระบวนการ"},{"word":"dialect","pos":"noun","en_meaning":"a regional or local form of a language with its own distinct characteristics","th_meaning":"ภาษาท้องถิ่นหรือภาคภูมิใจของภาษาที่มีลักษณะเฉพาะทาง","example_en":"He speaks a dialect that's hard for others to understand.","example_th":"เขามีคำศัพท์และรูปแบบการพูดท้องถิ่นที่ทำให้คนอื่นยากในการเข้าใจ"},{"word":"diameter","pos":"noun","en_meaning":"the length of a straight line passing through the center of a circle or sphere and touching two points on its circumference or surface","th_meaning":"เส้นผ่านศูนย์กลางของวงกลมหรือทรงกลมที่ต่อไปจนถึงจุดสุดทางตรงกันข้าม","example_en":"The diameter of the circle is 10 cm.","example_th":"เส้นผ่านศูนย์กลางของวงกลมนี้ยาว 10 เซนติเมตร"},{"word":"diary","pos":"noun","en_meaning":"a book in which one writes personal thoughts and experiences, usually on a daily basis.","th_meaning":"บันทึกประจำวันหรือสมุดจดหมายส่วนตัว","example_en":"She keeps a diary to record her daily life.","example_th":"เธอใช้สมุดบันทึกเพื่อเขียนข้อมูลประจำวันของเธอ"},{"word":"dictate","pos":"verb","en_meaning":"to give instructions or make decisions for someone else, especially in a formal or official way","th_meaning":"ให้คำสั่งหรือตัดสินใจให้ใครบางคนอื่น 通常是ในบริบทที่เป็นทางการหรือถูกบังคับหนีแน่นอน","example_en":"The teacher will dictate a passage for the students to write.","example_th":"ครูจะกำหนดข้อความให้นักเรียนเขียน"},{"word":"dictionary","pos":"noun","en_meaning":"a book or online resource containing words, typically in alphabetical order, with information about their meanings and usage.","th_meaning":"คำพจนานุกรม หรือ เดินานที่มีรายการของคำศัพท์และความหมายต่างๆ","example_en":"I look up new words in the dictionary when I don't know their meaning.","example_th":"ฉันจะหาความหมายใหม่ ๆ ในคู่มือภาษาไทยหากฉันไม่รู้ตัว"},{"word":"differential","pos":"noun","en_meaning":"a device that compares two quantities and produces an output difference between them.","th_meaning":"อุปกรณ์ที่เปรียบเทียบสองปริมาณและสร้างผลลัพธ์ที่แตกต่างกัน","example_en":"The car has a differential that allows the wheels to rotate at different speeds when turning.","example_th":"รถยนต์มีอุปกรณ์_difference_ที่ทำให้เกิดการหมุนของสบูร์ที่แตกต่างกันเมื่อโรย"},{"word":"differentiate","pos":"verb","en_meaning":"to identify or recognize the distinguishing qualities of one thing from another; to make a distinction between things that are similar","th_meaning":"ต่างกัน, ระบุความแตกต่าง","example_en":"The teacher differentiated her teaching methods for different groups of students.","example_th":"ครูแยกแยะวิธีการสอนให้กับกลุ่มนักเรียนที่ต่างกัน"},{"word":"differentiation","pos":"noun","en_meaning":"the act of distinguishing between things or people that are alike and assigning each a different name or class. The process by which distinct varieties of plants and animals arise within a species.","th_meaning":"การแยกประเภทหรือความแตกต่างระหว่างสิ่งที่คล้ายกัน โดยกำหนดให้แต่ละอย่างมีชื่อเฉพาะหรือหมวดหมู่ต่าง ๆ การเกิดขึ้นของชนิดหรือสายพันธุ์ที่แตกต่างภายในสายพันธุ์เดียวกัน","example_en":"The company is working on product differentiation to attract more customers.","example_th":"บริษัทกำลังทำงานเพื่อการแยกประเภทสินค้าเพื่อสร้างความสนใจให้กับลูกค้ามากขึ้น"},{"word":"diffusion","pos":"noun, verb","en_meaning":"the process by which a substance spreads out from an area of high concentration to an area of low concentration; the act or process of spreading or diffusing","th_meaning":"การกระจายของสารจากพื้นที่ความเข้มข้นสูงไปสู่พื้นที่ความเข้มข้นต่ำ","example_en":"The diffusion of heat through a material.","example_th":"การกระจายดีเอ็นของความร้อนผ่านวัสดุ"},{"word":"dilemma","pos":"noun","en_meaning":"a difficult choice or situation in which two or more alternatives are unsatisfactory","th_meaning":"สถานการณ์ที่ยากลำบากต้องตัดสินใจเมื่อมีเลือกหลายทางและไม่มีทางออกที่ดี","example_en":"He found himself in a dilemma about whether to quit his job or continue working.","example_th":"เขานั่งคิดอยู่ว่าจะข้ามงานหรือทำงานต่อ"},{"word":"dilute","pos":"verb","en_meaning":"to make something less strong or intense by mixing it with a larger amount of another substance, or to reduce the concentration of a solution.","th_meaning":"ผสมให้ลดความเข้มข้นหรือปรับระดับของบางสิ่งอย่างไรก็ตาม อาจหมายถึงการเพิ่มจำนวนสารหลักในน้ำยาลง","example_en":"She diluted the bleach to make it milder.","example_th":"เธอผสมยาขจัดให้ลดความเข้มข้นเพื่อให้ดีกว่า"},{"word":"dimensional","pos":"adjective","en_meaning":"relating to dimensions or having dimensions; three-dimensional","th_meaning":"มีมิติหรือเกี่ยวข้องกับมิติ เช่น มิติสามมิติ","example_en":"This object is dimensional.","example_th":"สิ่งนี้มีมิติ"},{"word":"dioxide","pos":"noun","en_meaning":"a compound of oxygen with another element, especially carbon monoxide or carbon dioxide","th_meaning":"ไอนิโกลีด์ (ai noiglyid)","example_en":"Carbon dioxide is a greenhouse gas.","example_th":"คาร์บอนไดออกไซด์เป็นก๊าซเรือนกระจก"},{"word":"directive","pos":"noun","en_meaning":"an instruction or command, especially one given by a person in authority.","th_meaning":"คำสั่งหรือคำแนะนำ โดยเฉพาะจากผู้มีอำนาจ","example_en":"The teacher gave us a directive to finish our homework before the weekend.","example_th":"ครูได้ให้คำสั่งให้นักเรียนส่งงานหน้านี้ให้เสร็จก่อนสุดคืน"},{"word":"disability","pos":"noun","en_meaning":"the state of being physically or mentally unable to do something","th_meaning":"ภาวะที่ไม่สามารถทำสิ่งบางอย่างได้ทางกายภาพหรือจิตใจ","example_en":"She has a physical disability.","example_th":"เธอต้องการความช่วยเหลือในการเดินเพราะมีภาวะพิการร่างกาย"},{"word":"disadvantage","pos":"noun","en_meaning":"a disadvantage or a negative aspect of something.","th_meaning":"ความไม่สะดวกหรือสิ่งที่ทำให้คุณล้มเหลวขึ้นอย่างมาก","example_en":"There are several disadvantages to working from home.","example_th":"มีหลายปัญหาด้านการศึกษาในยุคดิจิตอล"},{"word":"discharge","pos":"verb","en_meaning":"to let out or release something, to expel water from a container, to pay off a debt, to allow someone to leave work or school","th_meaning":"ปล่อยหรือรีบสิ่งต่าง ๆ ออกไป, ให้น้ำออกจากภาชนะ, จ่ายหนี้, ส่งคนออกงานหรือโรงเรียน","example_en":"The doctor discharged the patient from the hospital after a week of treatment.","example_th":"แพทย์ปล่อยผู้ป่วยออกจากโรงพยาบาลหลังจากรักษาเป็นสัปดาห์หนึ่ง"},{"word":"discourse","pos":"noun","en_meaning":"a formal conversation or exchange of opinions, especially on a particular subject","th_meaning":"การสนทนาหรือแลกเปลี่ยนความคิดเห็นอย่างร่วมมือเกี่ยวกับเรื่องเฉพาะเจาะจง","example_en":"The philosophers engaged in an interesting discourse about the nature of reality.","example_th":"นายหนึ่งและผู้อื่นสนทนาเกี่ยวกับความเป็นจริงในโลก"},{"word":"discrete","pos":"adjective","en_meaning":"separate or distinct; individual units","th_meaning":"แยกกันหรือไม่เหมือนกัน; ส่วนต่างๆ","example_en":"The data is discrete.","example_th":"ข้อมูลนี้เป็นข้อมูลแบบ เรท"},{"word":"discrimination","pos":"noun","en_meaning":"the act of showing prejudice or unfair treatment towards someone because of their race, gender, religion, etc.","th_meaning":"การแบ่งแยกหรือไม่เคารพตามอัตลักษณ์ทางเชื้อชาติ การเพศ ศาสนา ฯลฯ","example_en":"There is no room for discrimination in the workplace.","example_th":"ในบริษัทไม่มีพื้นที่สำหรับการแบ่งแยก"},{"word":"displacement","pos":"noun","en_meaning":"the act of moving or the state of being moved from one place to another; a change in position or location","th_meaning":"การย้ายหรือการเปลี่ยนแปลงสถานที่","example_en":"The ship was undergoing displacement as it filled with cargo.","example_th":"เรือกำลังรับบรรทุกสินค้าและกำลังมีการย้าย"},{"word":"dissection","pos":"noun","en_meaning":"the act of cutting something up into parts to examine them; the process of dissecting a body for scientific study.","th_meaning":"การแยกสิ่งต่าง ๆ ออกเป็นส่วนๆ เพื่อวิเคราะห์ หรือ การศึกษาร่างกายผ่านกระบวนการทำลาย","example_en":"The medical students will undergo a dissection of a pig to learn about human anatomy.","example_th":"นักแพทย์จะทำการแยกสัตว์เลี้ยงอย่างเป็ดในการเรียนรู้โครงสร้างของร่างกายมนุษย์"},{"word":"dissertation","pos":"noun","en_meaning":"a long piece of written work on a chosen topic, submitted as part of the requirements for an academic degree.","th_meaning":"งานวิจัยที่มีความยาวและละเอียดซึ่งบุคคลนั้นมีส่วนร่วมในการเขียนและนำเสนอเพื่อขอได้รับการยอมรับจากคณะกรรมการในระดับการศึกษา","example_en":"She spent months working on her dissertation.","example_th":"เธอใช้เวลาหลายเดือนในการทำงานวิจัยของเธอ"},{"word":"dissolve","pos":"verb","en_meaning":"to break down or scatter completely","th_meaning":"ละลาย","example_en":"The sugar dissolved in the hot water.","example_th":"น้ำตาลละลายในน้ำปั่ว"},{"word":"distribution","pos":"noun","en_meaning":"the act of giving something to people in particular or dividing it among different groups, or the way things are spread out.","th_meaning":"การแจกจ่ายหรือการกระจายของสิ่งอย่างต่างๆ โดยแบ่งออกในกลุ่ม ๆ หรือกระจายทั่วไป","example_en":"The company has a wide distribution network.","example_th":"บริษัทมีเครือข่ายการจำหน่ายที่กว้างขวาง"},{"word":"disturbance","pos":"noun","en_meaning":"an interruption or hindrance to a normal state of affairs","th_meaning":"การกวนขวางหรือทำให้หยุดไม่ได้","example_en":"There was a lot of disturbance during the construction work.","example_th":"ระหว่างการทำก่อสร้างมีความกวนขวางอย่างมาก"},{"word":"diverse","pos":"adjective","en_meaning":"having a variety of different elements or qualities; varied.","th_meaning":"หลากหลาย (maha-khoraphat)","example_en":"The classroom is diverse, with students from all over the world.","example_th":"ห้องเรียนมีความหลากหลายกับนักเรียนจากทุกที่ในโลก"},{"word":"domain","pos":"noun","en_meaning":"a range of authority or control over a particular sphere, activity, or field","th_meaning":"สาขาหรือภาคของการดำเนินงานหรือกิจการเฉพาะทาง","example_en":"He has a domain expertise in web development.","example_th":"เขามีความเชี่ยวชาญในด้านการพัฒนาเว็บไซต์"},{"word":"dominance","pos":"noun","en_meaning":"the power to control or influence something or someone; the state of being more powerful than others.","th_meaning":"การควบคุมหรือมีอำนาจเหนือกว่าอย่างไรก็ตาม ที่เป็นไปได้ทั่วไป","example_en":"He holds a dominant position in the market.","example_th":"เขามีตำแหน่งที่สำคัญและมีความคืบหน้าในตลาด"},{"word":"dominant","pos":"adjective","en_meaning":"having or exercising power, influence, or superiority; preeminent.","th_meaning":"มีอำนาจ หรือการควบคุมอย่างมาก","example_en":"The dominant political party in the country has been in power for over a decade.","example_th":"พรรคการเมืองที่มีพลังงานใหญ่ที่สุดในประเทศนี้ได้รับอำนาจเป็นเวลาเกิน 10 ปีแล้ว"},{"word":"domination","pos":"noun","en_meaning":"the act of exercising control or power over someone or something","th_meaning":"การรับผิดชอบหรือควบคุมบางสิ่งอย่างมาก","example_en":"The government's policy of economic domination has been criticized by many.","example_th":"นโยบายการดูแลเศรษฐกิจของบาลถูก批ให้ร้ายแรงในหลายที่"},{"word":"donor","pos":"noun","en_meaning":"a person who gives money, blood, or something else to help others","th_meaning":"ผู้บริจาค","example_en":"He is a generous donor.","example_th":"เขามีความรักในบริจาค"},{"word":"dose","pos":"noun","en_meaning":"a single administration or portion of a drug, medicine, or other substance","th_meaning":"ประชุมที่จัดขึ้นในแต่ละวัน","example_en":"He received an overdose of morphine.","example_th":"เขารับการจ่ายยาตัวมากเกินไป"},{"word":"drain","pos":"noun, verb","en_meaning":"To remove liquid by means of a pipe or tube; to empty out (a place or container)","th_meaning":"จูงดูดซึมหรือจ่ายน้ำออกจากที่ต้องการ","example_en":"He needs to drain the water from the tank.","example_th":"เขาระบายน้ำออกจากถังน้ำ"},{"word":"drift","pos":"verb","en_meaning":"to move slowly and steadily in a particular direction, often without control; to wander or move aimlessly.","th_meaning":"ขี่ส่ง (khui saeng) หรือทิ้งอยู่ไม่รู้ต่อไป (tiang yu mai noo-toe)","example_en":"The car drifted off the road.","example_th":"รถยนต์ถูกขี่ส่งออกจากทาง"},{"word":"duration","pos":"noun","en_meaning":"the length of time during which something continues","th_meaning":"ระยะเวลาที่สิ่งใด ๆ ดำเนินอยู่","example_en":"The duration of the meeting was two hours.","example_th":"การประชุมมีความยาวระยะเวลาสองชั่วโมง"},{"word":"dye","pos":"noun, verb","en_meaning":"a substance that colors something, to color or treat with a dye","th_meaning":"ยาสี, การสี","example_en":"He used different dyes to color the fabric.","example_th":"เขาร่วมทั้งหลายประเภทของยาน้ำสีเพื่อสีผ้า"},{"word":"dynamic","pos":"adjective","en_meaning":"changing or varying over time; energetic and active","th_meaning":"เปลี่ยนแปลงหรือแปรผันอยู่ในเวลาเดียวกัน; ซุบซ้อนและมีพลังงานสูง","example_en":"The weather is dynamic, changing from sunny to rainy.","example_th":"สภาพอากาศเป็นท่าทางคืบหน้า เปลี่ยนจากแดดกับฝน"},{"word":"ecological","pos":"adjective","en_meaning":"relating to or concerning the relationship between living organisms and their environment, especially in terms of the maintenance of ecosystems and conservation.","th_meaning":"เกี่ยวกับสิ่งมีชีวิตและสภาพแวดล้อมที่เขาอยู่ด้วยกัน หรือการรักษาความสมดุลระหว่างสิ่งมีชีวิตและสิ่งแวดล้อม","example_en":"The practice of sustainable agriculture is an example of ecological farming.","example_th":"การปลูกพืชแบบยั่งยืนคือตัวอย่างของการเกษตรที่เป็นดินสังคม"},{"word":"ecology","pos":"noun","en_meaning":"the branch of biology concerned with the relations between organisms and their environment","th_meaning":"สาขาของวิทยาศาสตร์ชีวภาพที่ศึกษาเกี่ยวกับความสัมพันธ์ระหว่างสิ่งมีชีวิตกับ ด้วยกัน","example_en":"The study of ecology helps us understand how ecosystems work.","example_th":"การศึกษาระดับนี้สามารถช่วยให้เราเข้าใจเกี่ยวกับการทำงานของระบอบอุปกรณ์"},{"word":"economically","pos":"adverb","en_meaning":"in an economic way or to the advantage of the economy","th_meaning":"ตามระบบเศรษฐกิจหรือด้วยประโยชน์ต่อเศรษฐกิจ","example_en":"The project was implemented economically.","example_th":"โครงการนี้ได้รับการดำเนินงานอย่างมีประสิทธิภาพทางเศรษฐกิจ"},{"word":"economist","pos":"noun","en_meaning":"a person who studies the production, consumption, and trade of goods and services in an economy.","th_meaning":"ผู้วิจัยเศรษฐกิจ","example_en":"He is a highly skilled economist.","example_th":"เขามีทักษะการวิเคราะห์เศรษฐกิจที่ยอดเยี่ยม"},{"word":"effectiveness","pos":"noun","en_meaning":"the ability to cause a desired or intended result","th_meaning":"ความมีประสิทธิภาพ","example_en":"The new policy has shown great effectiveness.","example_th":"นโยบายใหม่ได้แสดงผลอย่างดีมาก"},{"word":"elaborate","pos":"verb","en_meaning":"to describe in detail; to explain or describe something in a more thorough or detailed way.","th_meaning":"อธิบายอย่างละเอียด","example_en":"He will elaborate on the topic further in the presentation.","example_th":"เขากำลังจะอธิบายเรื่องนี้กับรายละเอียดเพิ่มเติมในงานนำเสนอ"},{"word":"elastic","pos":"adjective","en_meaning":"Capable of being stretched or compressed and returning to original size or shape.","th_meaning":"มีความยืดหยุ่น สามารถเช็ดเชือกได้และกลับมาเป็นรูปแบบเดิมได้","example_en":"The material is very elastic.","example_th":"วัสดุนี้มีความยืดหยุ่นมาก"},{"word":"elasticity","pos":"noun","en_meaning":"the ability of a material to deform under stress and then return to its original shape when the stress is removed.","th_meaning":"ความยืดหยุ่นของวัสดุเมื่อถูกกดหรือขยันแล้วคืนมาเป็นรูปแบบเดิมเมื่อปล่อยแรง","example_en":"The fabric has good elasticity and can stretch easily.","example_th":"ผ้ามีความยืดหยุ่นดีและสามารถเบือนได้ง่าย"},{"word":"electron","pos":"noun","en_meaning":"a subatomic particle with a negative electric charge and mass much less than that of the proton.","th_meaning":"อิเล็กตรอน (อีเลกทรอน)","example_en":"Electrons are fundamental particles in atoms.","example_th":"อิเล็กตรอนเป็นส่วนประกอบพื้นฐานในอะมอน"},{"word":"elementary","pos":"adjective","en_meaning":"fundamental; basic","th_meaning":"พื้นฐาน; กับการเรียนรู้ที่ง่าย","example_en":"This is an elementary school.","example_th":"นี้คือโรงเรียนประถมศึกษา"},{"word":"elevate","pos":"verb","en_meaning":"to lift or raise up, to give someone a higher position or rank, to improve the quality of something","th_meaning":"ตั้งแต่งเลือดหรือทำให้สูงขึ้น","example_en":"She was elected to a higher position and had to elevate her game.","example_th":"เธอได้รับตำแหน่งใหม่และจำเป็นต้องปรับปรุงทักษะของตนเอง"},{"word":"elevation","pos":"noun","en_meaning":"the height of something above a reference point, especially the sea level.","th_meaning":"ระดับสูงของสิ่งใด ๆ ตั้งอยู่เหนือจุดอ้างอิง (เช่นระดับทะเล)","example_en":"The elevation of Mount Everest is about 8,848 meters.","example_th":"ความสูงของเขาคริสต์ซองคือประมาณ 8,848 เมตร"},{"word":"elimination","pos":"noun","en_meaning":"the act of removing something by force or by eliminating it from consideration; the result of this process","th_meaning":"การกำจัดหรือข้ามเมื่อไม่ต้องการให้คุณสมบัติหรือสิ่งแวดล้อมใดๆ นี้อยู่ในระบบที่เกี่ยวข้อง","example_en":"The trial process includes the elimination of witnesses who may be biased.","example_th":"กระบวนการฟื้นฟูที่ดีจะรวมการกำจัดความเสียหายจากสภาพแวดล้อมและสิ่งแวดล้อมอื่น ๆ ให้รู้สึกไม่สบายใจหรือยังคงอยู่ในระบบที่เกี่ยวข้อง"},{"word":"elite","pos":"noun","en_meaning":"The best or most select people or things.","th_meaning":"ผู้มีคุณภาพสูงที่สุดหรือกลุ่มคนที่เลือกสรรพดีที่สุด","example_en":"She is one of the elite in her field.","example_th":"เธอเป็นหนึ่งในผู้มีคุณภาพสูงที่สุดในการทำงานของเธอ"},{"word":"embed","pos":"verb","en_meaning":"to fix something into a solid material or substance","th_meaning":"ติดหรือรวมเข้าด้วยกัน","example_en":"The image is embedded in the software.","example_th":"รูปภาพถูกติดอยู่ในซอฟต์แวร์"},{"word":"emergence","pos":"noun","en_meaning":"the act of appearing suddenly or unexpectedly, especially after a long absence or in a new and different form","th_meaning":"การปรากฏตัว น์หรือไม่คาดคิด, ซึ่งอาจเกิดขึ้นหลังจากขาดหายนานหรือในรูปแบบที่แตกต่าง","example_en":"The emergence of new technologies has changed the world.","example_th":"การส่งเสริมของเทคโนโลยีใหม่ๆ ได้เปลี่ยนแปลงโลก"},{"word":"emission","pos":"noun","en_meaning":"the act of releasing gas or other substances into the air, especially pollutants.","th_meaning":"การปล่อยแก๊สหรือสารอื่น ๆ ไปยังอากาศอย่างไรก็ตาม เป็นพิษทางอากาศ","example_en":"The city's factories are major sources of air pollution.","example_th":"โรงงานในเมืองคือแหล่งของการปล่อยฝุ่นละลายดินดีที่สำคัญ"},{"word":"emit","pos":"verb","en_meaning":"to release or produce something, especially gas, heat, or light; to give off (heat, light, etc.)","th_meaning":"ปล่อย, ปลุก","example_en":"The boiler is emitting smoke.","example_th":"ปufferกำลังปล่อยควัน"},{"word":"emperor","pos":"noun","en_meaning":"a powerful ruler, especially a monarch or a person having supreme authority in a nation","th_meaning":"ผู้ปกครองหรือผู้นำที่มีอำนาจอย่างมากในประเทศ","example_en":"The emperor ruled over the entire empire.","example_th":"พระเจ้ารัฐแผ่นดินใหญ่แห่งนี้"},{"word":"empirical","pos":"adjective","en_meaning":"based on or supported by experience rather than theory","th_meaning":"ที่พึ่งพาประสบการณ์และไม่ขึ้นอยู่กับความคิดเห็นหรือสมมุติฐานทางการศึกษา","example_en":"The conclusion was drawn based on empirical evidence.","example_th":"สรุปได้จากการพิจารณาประสบการณ์จริงๆ"},{"word":"encode","pos":"verb","en_meaning":"to convert data into a form that can be transmitted or stored efficiently.","th_meaning":"แปลงข้อมูลให้อยู่ในรูปแบบที่สามารถส่งหรือจัดเก็บได้โดยมีประสิทธิภาพ","example_en":"The data needs to be encoded before it can be sent over the internet.","example_th":"ข้อมูลต้องถูกแปลงให้อยู่ในรูปแบบที่สามารถส่งผ่านอินเทอร์เน็ตได้"},{"word":"enforcement","pos":"noun","en_meaning":"The act of enforcing or the state of being enforced.","th_meaning":"การกำจัดหรือการประยุกต์ใช้กฎหมายเพื่อควบคุมและทำให้มีประสิทธิภาพ","example_en":"Enforcement of laws is crucial for maintaining order in society.","example_th":"การกำจัดหรือที่บังเอิญกำจัดปัญหาบางอย่าง จำเป็นต้องมีกฎหมายเป็นหลักฐาน"},{"word":"enormously","pos":"adverb","en_meaning":"to an extremely great degree or extent; greatly","th_meaning":"อย่างมากหรือล้นหลาม","example_en":"He studied enormously for the exam.","example_th":"เขารู้สึกตื่นเต้นมากเมื่อไปที่งานวันถัดไป"},{"word":"entity","pos":"noun","en_meaning":"a thing having distinct existence and individual character, whether physical or spiritual; a person or object.","th_meaning":"สิ่งมีเอกลักษณ์และมีชื่อ riêng อาจเป็นสิ่งที่มีชีวิตหรือไม่มีชีวิต","example_en":"The company is an entity with its own legal status.","example_th":"บริษัทนี้คือหน่วยกิจการที่มีเอกลักษณ์และมีสถานะทางกฎหมายอันดับ riêng"},{"word":"entrant","pos":"noun","en_meaning":"A person who participates in a contest, competition, or other event.","th_meaning":"ผู้เข้าร่วมแข่งขันหรือกิจกรรมต่างๆ","example_en":"The entrant must submit their entry by the deadline.","example_th":"ผู้เข้าร่วมต้อง nộpผลงานของตนภายในวันที่กำหนด"},{"word":"enzyme","pos":"noun","en_meaning":"a substance that acts as a catalyst in a chemical reaction, especially in living organisms.","th_meaning":"สิ่งมีพลังงานที่กระตุ้นการปฏิกิริยาเคมีอย่างรวดเร็วและมีประสิทธิภาพ","example_en":"Enzymes are crucial for digestion and metabolism.","example_th":"เอ็นไซม์เป็นสิ่งที่จำเป็นในการทำลายอาหารและการเผาไหม้พลังงานในร่างกาย"},{"word":"epidemic","pos":"noun","en_meaning":"a widespread disease affecting many people in a particular area at the same time.","th_meaning":"การระบาดของโรคในพื้นที่หนึ่งในเวลาเดียวกัน","example_en":"The current flu epidemic is spreading rapidly.","example_th":"การระบาดของไอร้อนปัจจุบันกำลังแพร่กระจายอย่างรวดเร็ว"},{"word":"epidemiology","pos":"noun","en_meaning":"The study and analysis of the distribution, patterns, and causes of health-related events in defined populations.","th_meaning":"การวิเคราะห์และศึกษาเกี่ยวกับความ분บันทัดสินใจและการกระจายของอุปกรณ์ทางการแพทย์ในกลุ่มประชากร","example_en":"Epidemiology is a critical field in public health.","example_th":"การวิเคราะห์และศึกษาเกี่ยวกับความกระจายของโรคเป็นสาขาที่สำคัญในการดูแลสุขภาพสาธารณะ"},{"word":"equality","pos":"noun","en_meaning":"the condition of being the same in value or measure, esp. as regards rights and opportunities","th_meaning":"ภาวะที่มีความเท่าเทียมกันในค่าหรือปริมาณ นับว่าสิทธิและโอกาสเท่ากันได้ทั่วไป","example_en":"The principle of equality is fundamental to our society.","example_th":"คำว่าequalityมีความหมายคือสภาพแวดล้อมที่มีการร่วมมือและแบ่งปันอย่างเท่าเทียมกันในสังคม"},{"word":"equilibrium","pos":"noun","en_meaning":"a state of balance or harmony between conflicting forces or elements","th_meaning":"ภาวะสมดุลหรือการคงที่ระหว่างสิ่งมีความสำคัญหรือกลยุทธ์ที่แตกต่างกัน","example_en":"The economy is in equilibrium.","example_th":"เศรษฐกิจอยู่ในภาวะสมดุล"},{"word":"equivalence","pos":"noun","en_meaning":"the condition of being essentially equal or equivalent; the quality of being equal in value, quantity, degree, or significance.","th_meaning":"ความเท่าเทียมกัน คุณสมบัติที่มีค่าหรือปริมาณหรือระดับหรือความสำคัญที่เท่ากัน","example_en":"There is an equivalence between the two concepts.","example_th":"มีความเท่าเทียมกันระหว่างแนวคิดสองข้อ"},{"word":"erase","pos":"verb","en_meaning":"to remove (something written or drawn) by scraping off, blotting out, or otherwise destroying the substance that makes up what is being removed","th_meaning":"คุยกับการลบหรือทำลายสิ่งที่เขียนหรือวาดออก","example_en":"She erased the mistake on her homework.","example_th":"เธอลบข้อผิดพลาดในหนังสือเรียนของเธอ"},{"word":"essence","pos":"noun","en_meaning":"the fundamental nature or character of something; the most important part or quality.","th_meaning":"ความสำคัญหรือลักษณะพื้นฐานของบางอย่าง","example_en":"The essence of a good meal is its taste.","example_th":"ความสำคัญในการทำอาหารคือรสชาติ"},{"word":"essentially","pos":"adverb","en_meaning":"in substance or effect; for all practical purposes;","th_meaning":"อย่างไรก็ตาม, ในลักษณะที่แท้จริง;","example_en":"The book is essentially a collection of stories.","example_th":"หนังสือนี้คือการรวบรวมเรื่องราว"},{"word":"estimation","pos":"noun","en_meaning":"the process of calculating or forming an estimate","th_meaning":"การประเมินหรือประมาณค่า","example_en":"I need to make an estimation of the cost.","example_th":"ฉันต้องทำการประเมินความต้องการในการใช้จ่าย"},{"word":"ethical","pos":"adjective","en_meaning":"concerned with what is right and wrong or good and bad, especially in one's treatment of others.","th_meaning":"เกี่ยวกับความถูกต้องและความผิดปกติ หรือดีกับไม่ดีในบริบทของคนอื่น","example_en":"It is ethical to treat everyone with respect.","example_th":"การให้เคารพกันเป็นสิ่งที่ถูกกฎหมายและมีจรรยาบรรณ"},{"word":"ethics","pos":"noun","en_meaning":"a set of moral principles or values.","th_meaning":"จริยธรรมหรือจริยธรรมศาสตร์","example_en":"The company has a strong code of ethics.","example_th":"บริษัทมีนโยบายจริยธรรมอย่างแรง"},{"word":"evident","pos":"adjective","en_meaning":"clearly obvious or noticeable; unmistakable.","th_meaning":"ชัดเจน หรือเห็นได้ชัด","example_en":"The evidence was clear and evident.","example_th":"หลักฐานชัดเจนและเห็นได้ชัด"},{"word":"evolutionary","pos":"adjective","en_meaning":"relating to or resulting from evolution; developing gradually over time through natural processes.","th_meaning":"เกี่ยวกับการพัฒนาหรือเปลี่ยนแปลงผ่านเวลายาวนานโดยธรรมชาติ","example_en":"The theory of evolution is widely accepted in the scientific community.","example_th":"ทฤษฎีการพัฒนาที่ได้รับความนับถือในชุมชนวิทยาศาสตร์"},{"word":"ex","pos":"verb","en_meaning":"to leave; to exit","th_meaning":"ออกจาก (khoosuak)","example_en":"I need to go to the bathroom.","example_th":"ฉันต้องไปห้องน้ำ."},{"word":"execute","pos":"verb","en_meaning":"to carry out or perform a plan or instruction","th_meaning":"ให้ทำตามหรือปฏิบัติคำสั่ง","example_en":"The court will execute the death sentence.","example_th":"ศาลจะประมวลผลการลงโทษลายนิติ"},{"word":"execution","pos":"noun","en_meaning":"the act or process of putting something into effect, especially the carrying out of a sentence of capital punishment.","th_meaning":"การประชุมหรือการดำเนินการตามคำสั่ง","example_en":"The execution of his plans was flawless.","example_th":"การดำเนินการตามแผนของเขานั้นเป็นที่ผิดพลาด"},{"word":"exit","pos":"verb","en_meaning":"to leave a place or situation, typically by going out the door or using another means of departure.","th_meaning":"ออกจากสถานที่หรือสถานการณ์โดยปกติจะใช้ประตูหรือวิธีการเดินทางอื่น","example_en":"I need to exit the building now.","example_th":"ฉันจำเป็นต้องออกจากอาคารตอนนี้"},{"word":"expertise","pos":"noun","en_meaning":"the quality or state of having special knowledge and skill in a particular area","th_meaning":"ทักษะหรือความชำนาญเฉพาะทางในสาขา某一特定","example_en":"He has years of expertise in software development.","example_th":"เขามีประสบการณ์อยู่หลายปีในการพัฒนาซอฟต์แวร์"},{"word":"explicit","pos":"adjective","en_meaning":"clearly stated or shown; not vague or ambiguous","th_meaning":"ชัดเจน, ไม่ท้อแท้","example_en":"He gave explicit instructions on how to do it.","example_th":"เขากล่าวให้คำแนะนำอย่างชัดเจนว่าจะทำอย่างไร"},{"word":"explicitly","pos":"adverb","en_meaning":"in a clear and direct manner; without ambiguity","th_meaning":"อย่างชัดเจนหรือชัดเจนที่สุด","example_en":"He gave the instructions explicitly.","example_th":"เขากับเขาบอกวิธีการทำแบบชัดเจน"},{"word":"exploit","pos":"noun","en_meaning":"an advantage or opportunity gained by taking unfair or dishonest advantage of a situation, especially for personal gain.","th_meaning":"การยุบจ่ายประโยชน์จากการคิดชักจะได้ผลดีกว่าคนอื่นที่ไม่รู้สึกถูกใช้","example_en":"The company is exploiting its workers by paying them less than they are worth.","example_th":"บริษัทกำลังยุบจ่ายประโยชน์ให้กับพนักงานโดยได้เงินน้อยกว่าค่าแรงจริงๆ"},{"word":"exponential","pos":"noun, adjective","en_meaning":"having a rapid rate of increase; growing or increasing at an ever-accelerating rate","th_meaning":"เพิ่มขึ้นเร็ว หรือ เกิดขึ้นอย่างรวดเร็ว","example_en":"The population of the city is growing exponentially.","example_th":"ประชากรเมืองกำลังเติบโตแบบเอ็กซ์โพเนียเลีย"},{"word":"fabric","pos":"noun","en_meaning":"a material made by weaving fibers together, especially cotton, wool, or silk.","th_meaning":"ผ้า","example_en":"The dress is made of fine fabric.","example_th":"เสื้อสูทมีผ้าหนังดี"},{"word":"facet","pos":"noun","en_meaning":"a distinct or characteristic part of something; a feature or attribute.","th_meaning":"ทางเลือกหรือส่วนหนึ่งของบางอย่าง; คุณสมบัติหรือลักษณะเฉพาะ。","example_en":"Every person has his own set of interests and facets.","example_th":"ทุกคนมีชุดความสนใจและลักษณะเฉพาะที่แตกต่างกัน"},{"word":"facilitate","pos":"verb","en_meaning":"to make something easier or less difficult","th_meaning":"ทำให้อำนาจหรือกระบวนการง่ายขึ้น","example_en":"The new system will facilitate faster communication.","example_th":"ระบบใหม่จะช่วยทำให้การสื่อสารเร็วขึ้น"},{"word":"factorial","pos":"noun","en_meaning":"the product of all positive integers less than or equal to a given positive integer","th_meaning":"ผลรวมของจำนวนเต็มที่น้อยกว่าหรือเท่ากับจำนวนเต็มที่กำหนด โดยใช้เครื่องหมายคูณระหว่างทุกๆ จำนวน","example_en":"5! = 5 x 4 x 3 x 2 x 1 = 120","example_th":"5! = 5 x 4 x 3 x 2 x 1 = 120"},{"word":"faculty","pos":"noun","en_meaning":"a group of teachers or professors who work together at a school, college, or university; the staff of an educational institution responsible for teaching and research.","th_meaning":"คณะ หมายถึงกลุ่มครูหรืออาจารย์ที่ทำงานร่วมกันในโรงเรียน มัธยมศึกษา สูง และนวัตกรรมด้านการศึกษา","example_en":"The faculty at the university is highly respected.","example_th":"คณะในมหาวิทยาลัยนี้ได้รับความเคารพอย่างมาก"},{"word":"fatigue","pos":"noun","en_meaning":"a state of extreme tiredness or exhaustion, especially as a result of mental or physical exertion.","th_meaning":"ความเครียดหรือไม่สามารถทำงานได้เนื่องจากความเหนื่อยล้าหรือความกระแทกทางร่างกาย","example_en":"He had been working non-stop for days and was suffering from fatigue.","example_th":"เขาทำงานต่อเนื่องหลายวันแล้วจึงเริ่มรู้สึกเครียด"},{"word":"feedback","pos":"noun","en_meaning":"information provided to someone about their performance, especially in a job or school.","th_meaning":"ข้อเสนอแนะหรือการให้เห็นผลสำเร็จจากการทำงาน หรือการศึกษา","example_en":"I need constructive feedback to improve my performance.","example_th":"ฉันต้องการคำแนะนำที่สร้างสรรค์เพื่อปรับปรุงการทำงานของฉัน"},{"word":"fertility","pos":"noun","en_meaning":"the capacity of a female to conceive and give birth to offspring","th_meaning":"ความสามารถในการตั้งครรภ์และให้เกิดลูก","example_en":"The soil's fertility depends on the type of nutrients it contains.","example_th":"ความมีพิษณุโลกในดินส่งผลต่อความสามารถในการตั้งครรภ์ของพืช"},{"word":"fetal","pos":"adjective","en_meaning":"relating to the unborn child in the womb; pertaining to the fetus","th_meaning":"เกี่ยวกับลูกในครรภ์","example_en":"The fetus is growing well.","example_th":"ลูกกำลังเติบโตดีอยู่"},{"word":"fever","pos":"noun","en_meaning":"an increase in body temperature above normal, typically caused by an infection.","th_meaning":"ไข้ (chao)","example_en":"He has a fever and needs to rest.","example_th":"เขารู้สึกตื่นไง ต้องพักผ่อน"},{"word":"fiber","pos":"noun","en_meaning":"a long, thin strand of material that is usually flexible and resilient, such as cotton, wool, or silk.","th_meaning":"มีข้อมูลไม่เพียงพอสำหรับความหมายในภาษาไทย","example_en":"The fabric was made from natural fibers like cotton and wool.","example_th":""},{"word":"fin","pos":"noun, verb","en_meaning":"to finish, to end; a boundary or limit; the final stage of something.","th_meaning":"จบ, ที่สุด, ขอบคุณมาก","example_en":"She finished her homework. The meeting is at three o'clock. The line at the checkout is too long. The edge of the table.","example_th":"เธอทำงานเสร็จแล้ว ประชุมนี้ในเวลาสามนาฬิกา แถวที่จ่ายเงินยาวมาก ขอบคุณมาก"},{"word":"finite","pos":"adjective","en_meaning":"having limits or boundaries; not infinite","th_meaning":"จำกัดในปริมาณหรือจำนวน","example_en":"The project has a finite budget.","example_th":"โครงการนี้มีงบประมาณจำกัด"},{"word":"flesh","pos":"noun","en_meaning":"the soft connective tissue of an animal or person, especially the part between bones or muscles.","th_meaning":"เนื้อเยื่อหรือหัวใจของสัตว์หรือคน","example_en":"The meat on the bone is delicious.","example_th":"เนื้อกับกระดูกอร่อยมาก"},{"word":"flexibility","pos":"noun","en_meaning":"the ability to bend or change shape, especially without breaking","th_meaning":"ความยืดหยุ่นในรูปแบบหรือพฤติกรรม","example_en":"He has great flexibility in his work schedule.","example_th":"เขามีความยืดหยุ่นในการกำหนดเวลาทำงาน"},{"word":"flip","pos":"verb","en_meaning":"to turn over or cause to turn over, especially from one side to the other.","th_meaning":"หมุนกลับหรือทำให้กลับด้าน","example_en":"He flipped the pancake in the pan.","example_th":"เขามีการหมุนมีก๊วยในกระทะ"},{"word":"fluid","pos":"noun","en_meaning":"A liquid substance that flows easily and takes the shape of its container.","th_meaning":"สิ่งแวดล้อมที่สามารถไหลและมีรูปร่างของถ้วยที่ใส่ไว้","example_en":"The juice is a fluid that can be poured easily from the bottle.","example_th":"น้ำผลไม้เป็นสิ่งแวดล้อมที่สามารถไหลได้ง่ายและสามารถ đổออกจากถ้วยได้"},{"word":"flux","pos":"noun","en_meaning":"a flow or stream, especially of a liquid or gas.","th_meaning":"ไหลหรือส่งด้ายอย่างต่อเนื่อง","example_en":"The river has a strong current.","example_th":"แม่น้ำมีกระแสแรง"},{"word":"footnote","pos":"noun","en_meaning":"a note placed at the bottom of a page that provides additional information about something mentioned in the text.","th_meaning":"หมายเหตุท้ายหน้าเพิ่มเติมข้อมูลอื่นๆเกี่ยวกับบางสิ่งที่กล่าวถึงในข้อความ","example_en":"He included a footnote at the bottom of the page to provide additional information.","example_th":"เขารวมหมายเหตุท้ายหน้าไว้ด้านล่างของกําหนดเพื่อให้ข้อมูลเสริมเติม"},{"word":"formally","pos":"adverb","en_meaning":"in a formal manner or in an official capacity","th_meaning":"ในรูปแบบที่มีระดับความเป็นส่วนตัวหรือเป็นองค์กร","example_en":"He will present his resignation formally.","example_th":"เขายินดีจะนำเสนอการละเมิดนี้ให้เป็นทางการ"},{"word":"formulation","pos":"noun","en_meaning":"the process of combining ingredients or components to create a mixture or solution, especially in the context of medicine, chemistry, or food science.","th_meaning":"การสังเคราะห์หรือการทำให้เข้าด้วยกันของวัตถุดิบที่มีอยู่เพื่อสร้างสารประกอบ สามารถใช้งานในบริบททางยาศาสตร์ เคมี และอาหาร","example_en":"The new drug has a novel formulation that makes it more effective.","example_th":"การสังเคราะห์ใหม่ของยาทำให้ยามีประสิทธิภาพมากขึ้น"},{"word":"forum","pos":"noun","en_meaning":"A public discussion or gathering for the exchange of ideas, information, or opinions.","th_meaning":"กระตุ้นสนทนาหรือการประชุมเพื่อแลกเปลี่ยนความคิดเห็นหรือข้อมูล","example_en":"We will have a forum to discuss our project plans.","example_th":"เราจะมีฟอรั่มในการถึงสิ่งที่จำเป็นในโครงการของเรา"},{"word":"fossil","pos":"noun","en_meaning":"the remains or traces of a living organism that lived in the past and are preserved in sedimentary rocks","th_meaning":"สิ่งมีชีวิตที่ผ่านมาที่ถูกเก็บรักษาอยู่ในดิน","example_en":"The fossil is an important piece of evidence for understanding ancient life.","example_th":"ฟิสโอลเป็นอุปกรณ์สำคัญในการเข้าใจชีวิตที่ผ่านมา"},{"word":"fraction","pos":"noun","en_meaning":"a part of a whole, especially a number representing one or more equal parts of a unit.","th_meaning":"ส่วนหนึ่งของจำนวนเต็ม หรือ ส่วนที่เท่ากันจากหนึ่งจำนวนเต็ม","example_en":"She ate half a pizza.","example_th":"เธอทานหälหนึ่งของปิซซ่า"},{"word":"fracture","pos":"noun","en_meaning":"the breaking of a bone into two or more pieces.","th_meaning":"การหักขั้ว","example_en":"He fell and fractured his leg.","example_th":"เขาล้มพยุงและหักขั้วขา"},{"word":"freely","pos":"adverb","en_meaning":"without restriction or hindrance","th_meaning":"อย่างอิสระหรือไม่ถูกจำกัด","example_en":"She can move freely.","example_th":"เธอมีความยืดหยุ่นในการเคลื่อนไหว"},{"word":"friction","pos":"noun","en_meaning":"the force that resists the relative motion of solid surfaces, fluid layers, and material elements sliding against each other.","th_meaning":"แรงต้านทานที่เกิดขึ้นระหว่างการสกัดส่องของดินแข็งหรือกลิ่นในอุปกรณ์ที่ทำหน้าที่ในการเคลื่อนไหว","example_en":"There is a lot of friction between the two surfaces.","example_th":"มีแรงต้านทานอย่างมากระหว่างพื้นผิวของสองส่วน"},{"word":"fringe","pos":"noun","en_meaning":"the outer edge of a area or object; an eccentric person or group","th_meaning":"ขอบเขตหรือบริเวณส่วนหนึ่งที่อยู่นอกกรอบหลัก","example_en":"The fringe benefits included free meals and transportation.","example_th":"สวัสดีการใช้งานของข้อมูลในส่วนต่อจากนี้"},{"word":"fundamentally","pos":"adverb","en_meaning":"at a basic or most important level; on the bottom line","th_meaning":"ที่มีความสำคัญอย่างมากหรือที่เป็นฐานะหลัก ๆ","example_en":"The company's success is fundamentally due to its innovative approach.","example_th":"ความสำเร็จของบริษัทนี้เป็นไปได้ในทางที่มีความสำคัญอย่างมากเพราะวิธีการที่สร้างสรรค์"},{"word":"fungus","pos":"noun","en_meaning":"a type of organism that grows as multicellular filaments and can cause disease in humans or animals.","th_meaning":"พืชเห็ดหรือแบคทีเรียที่สามารถเติบโตเป็นโครงสร้างหลายเซลล์และสามารถทำให้มนุษย์หรือสัตว์ร้ายแรง","example_en":"Molds and yeasts are types of fungi.","example_th":"แบคทีเรียปีกและเยอตาส์เป็นชนิดของพืชเห็ด"},{"word":"fusion","pos":"noun","en_meaning":"The process or result of combining different things to form a new whole.","th_meaning":"การสังเคราะห์หรือรวมตัวอื่นๆกับมันเพื่อสร้างของใหม่","example_en":"The fusion of cultures in the big city is evident in its diverse food and entertainment options.","example_th":"fusion ของวัฒนธรรมในเมืองใหญ่มีอยู่ที่ความสามารถในการซึ่งระหว่างอาหารและกิจกรรมบันเทิงที่หลากหลาย"},{"word":"gauge","pos":"noun, verb","en_meaning":"an instrument for measuring, especially a device that shows the pressure, flow rate, temperature, or other physical quantity; to measure something using an instrument; to assess or evaluate the extent or significance of something","th_meaning":"เครื่องวัด เช่น จักรยาน้ำ ส่งเสริมการอ่านรูปแบบ JSON ให้ถูกต้องและครบถ้วน เช่น ใช้ \"word\" เพื่ออธิบายคำศัพท์ ใช้ \"pos\" เพื่อระบุชนิดของคำ และใช้ \"en_meaning\" เพื่อระบุความหมายในภาษาอังกฤษ","example_en":"I need to check the gauge on my tire.","example_th":"ฉันต้องตรวจสอบระดับน้ำมันในเครื่องยนต์ของฉัน"},{"word":"generalization","pos":"noun","en_meaning":"the process of extending a rule, definition, or theory to new situations that were not originally considered","th_meaning":"การยืดหยุ่น หรือ การขยายขอบเขตของแนวคิดหรือทฤษฎีไปยังสถานการณ์ใหม่ๆที่ไม่ได้ถูกพิจารณาในที่แรก","example_en":"The generalization of the Pythagorean theorem to three dimensions was a significant mathematical achievement.","example_th":"การยืดหยุ่นทฤษฎีบทครูเกอชันไปยังสามมิติเป็นความสำเร็จทางคณิตศาสตร์อย่างสำคัญ"},{"word":"generalize","pos":"verb","en_meaning":"to make something more general or widespread in scope, application, or degree","th_meaning":"ทำให้สิ่งที่มีอยู่มีความกว้างขึ้นในระดับความเป็นไปได้หรือทั่วโลก","example_en":"The company hopes to generalize its product line.","example_th":"บริษัทหวังจะทำให้บรรดาสินค้าของเขามีความกว้างขึ้น"},{"word":"genetically","pos":"adjective","en_meaning":"relating to or caused by genes or heredity","th_meaning":"เกี่ยวกับหรือถูกกำหนดโดยพันธุกรรมหรือสืบทอดทางพันธุกรรม","example_en":"This organism is genetically modified.","example_th":"อนิมัลนี้ได้รับการแก้ไขด้วยพันธุกรรม"},{"word":"genetics","pos":"noun","en_meaning":"the scientific study of heredity and variation in living organisms","th_meaning":"สาขาของวิทยาศาสตร์ที่ศึกษาเกี่ยวกับการสืบทอดคุณสมบัติในชีวิตและความหลากหลาย","example_en":"The study of genetics helps us understand how traits are passed from parents to offspring.","example_th":"การศึกษาพันธุศาสตร์ช่วยเราเข้าใจว่าลักษณะใด ๆ ที่มีอยู่ในพ่อแม่จะถูกสืบทอดไปยังลูกหลาน"},{"word":"ghost","pos":"noun","en_meaning":"a spirit or supernatural being that is believed to haunt a place, especially after death","th_meaning":"นกขุน อวญพิษ","example_en":"He claimed to have seen a ghost at the haunted house.","example_th":"เขาบอกว่าเห็นนกขุนในที่ตั้งถูกลืม"},{"word":"globalization","pos":"noun","en_meaning":"The process by which the world becomes increasingly interconnected, especially through the free flow of goods, services, information, and ideas.","th_meaning":"การส่งเสริมความสัมพันธ์ที่ลึกซึ้งและร่วมกันในระดับโลกโดยผ่านการทำลายที่เกิดขึ้นในการแลกเปลี่ยนสินค้า บริการ สื่อสาร และแนวคิด","example_en":"Globalization has led to a more integrated global market.","example_th":"การส่งเสริมศักยภาพทั่วโลกได้ทำให้มีตลาดที่เชื่อมโยงกันได้ง่ายขึ้น"},{"word":"goat","pos":"noun","en_meaning":"a female sheep or a young sheep","th_meaning":"แพะ (pa)","example_en":"She has a pet goat.","example_th":"เธอมีแพะเป็นสัตว์เลี้ยง"},{"word":"goodness","pos":"noun","en_meaning":"the quality of being good or morally upright; kindness and honesty combined.","th_meaning":"คุณภาพที่ดีในทางจริยธรรมและมั่นใจ ความเคารพต่อผู้อื่น และการกระทำอย่างถูกต้อง","example_en":"Her goodness is well-known to everyone in the village.","example_th":"ดีกรดของเธอเป็นที่รู้จักกันในชุมชน"},{"word":"goods","pos":"noun","en_meaning":"articles of commerce or trade","th_meaning":"สินค้า","example_en":"They sell a variety of goods in their store.","example_th":"ขายรายการสินค้าหลากหลายใน cửa hàngของพวกเขา"},{"word":"gradient","pos":"noun","en_meaning":"a change in value from one point to another over a distance","th_meaning":"ความสัมพันธ์ระหว่างค่าที่เปลี่ยนแปลงจากจุดหนึ่งไปยังจุดอื่นๆ ในระยะทางบางอย่าง","example_en":"The gradient of the road was too steep.","example_th":"ความผันผวนทางเป็นสูงมาก"},{"word":"gram","pos":"noun","en_meaning":"A unit of mass equal to one thousandth of a kilogram.","th_meaning":"กรัม (Gram)","example_en":"I need to buy two grams of sugar.","example_th":"ฉันต้องซื้อแปรงตาสองกรัม"},{"word":"grammatical","pos":"adjective","en_meaning":"relating to or involving grammar; properly constructed according to the rules of grammar","th_meaning":"เกี่ยวกับหรือเป็นรูปแบบประโยคที่ถูกต้องตามกฎของภาษา","example_en":"The sentence is grammatical.","example_th":"ประโยคนี้เป็นประโยคที่ถูกต้อง"},{"word":"graph","pos":"noun","en_meaning":"a diagram that represents the relationship between variables","th_meaning":"แผนภูมิที่แสดงความสัมพันธ์ระหว่างตัวแปร","example_en":"He created a graph to show the sales data.","example_th":"เขาสร้างแผนภูมิต่อไปนี้เพื่อแสดงข้อมูลการขาย"},{"word":"grasp","pos":"verb","en_meaning":"to hold or control something firmly with the hands","th_meaning":"ดึงหรือจับอย่างมีกำลังใจหรือแน่นอน","example_en":"He grasped the opportunity to advance his career.","example_th":"เขามีโอกาสที่จะพัฒนาอาชีพของเขา"},{"word":"gravity","pos":"noun","en_meaning":"the force of attraction between all masses in the universe","th_meaning":"แรงดึงที่มีอยู่ในระหว่างทุกสิ่งที่มีน้ำหนักในสากล","example_en":"The force of gravity is what keeps us grounded on Earth.","example_th":"แรงดึงนี้คือเหตุผลที่ทำให้เราอยู่บนโลก"},{"word":"grid","pos":"noun","en_meaning":"a series of parallel intersecting lines or ridges forming a network; an arrangement in which things are evenly spaced and ordered.","th_meaning":"ตารางหรือรูปแบบที่มีเส้นแนวนอนและแนวตั้งที่ตัดกันอย่างสม่ำเสมอ","example_en":"The city is laid out on a grid system.","example_th":"เมืองนี้ถูกวางไว้ในระบบตาราง"},{"word":"gross","pos":"adjective","en_meaning":"unpleasantly offensive or disgusting","th_meaning":"ไม่เป็นไปตามความคิดเห็นหรืออ่อนโยน","example_en":"The smell of the garbage was gross.","example_th":"กลิ่นของขยะเหมือนกับสบู่ฟันเป็นซุป"},{"word":"gut","pos":"verb","en_meaning":"to be in good condition, to work well, to succeed","th_meaning":"ดี (dii)","example_en":"The engine is gut.","example_th":"เครื่องยนต์ดี"},{"word":"habitat","pos":"noun","en_meaning":"A natural environment in which an organism lives and grows.","th_meaning":"สภาพแวดล้อมที่สัตว์หรือพืชอาศัยอยู่และเติบโต","example_en":"The bird's habitat is the forest.","example_th":"สภาพแวดล้อมของนกคือป่า"},{"word":"halfway","pos":"adjective, adverb","en_meaning":"at or to the middle of a journey, process, etc.; in equal measure; equally divided","th_meaning":"อยู่ตรงกลางทางหรือระหว่าง แบ่งเป็นสองส่วนเท่ากัน ในระดับที่เท่ากัน","example_en":"He lives halfway between London and Paris.","example_th":"เขาอยู่ตรงกลางระหว่างลอนและปารี"},{"word":"handout","pos":"noun","en_meaning":"a printed or written document distributed to students, members of an audience, etc.","th_meaning":"เอกสารที่แจกจ่ายให้กับผู้เข้าร่วมกิจกรรมหรือนักศึกษา","example_en":"The teacher handed out the exam papers.","example_th":"ครูได้แจกข้อสอบให้นักเรียนแล้ว"},{"word":"harvest","pos":"noun","en_meaning":"the gathering of crops after they have matured and been cut from the plants","th_meaning":"การเก็บผลไม้หรือพืชหลังจากการผักฟักแล้วทำให้พร้อมสำหรับการขายหรือใช้งาน","example_en":"We will harvest our crops next week.","example_th":"เราจะทำการเก็บผลไม้ในสัปดาห์ถัดไป"},{"word":"hawk","pos":"noun","en_meaning":"a bird of prey with sharp vision, used for hunting","th_meaning":"นกจิ้งฉุน (nok ching zun)","example_en":"The hawks circled high above the valley.","example_th":"นกจิ้งฉุนมีสายตาดีมาก ทำให้สามารถหาอาหารได้ง่าย"},{"word":"headquarter","pos":"noun","en_meaning":"a main office or central place from which a company, organization, etc., is controlled or operated.","th_meaning":"สำนักงานใหญ่หรือศูนย์กลางที่บริหารจัดการองค์กรหรือกิจการ","example_en":"The headquarters of the company are located in New York City.","example_th":"สำนักงานใหญ่อยู่ที่ مدينةน욕"},{"word":"hedge","pos":"noun, verb","en_meaning":"1. A low-growing shrub or plant used to form a barrier or for decorative purposes. 2. To provide protection from criticism or attacks.","th_meaning":"1. พืชต้นหรือนิ้วไม้ที่นำมาสร้างผามป้องกัน. 2. การให้การปกป้องจากความคิดเห็นร้ายแรง","example_en":"1. They planted a hedge around their garden to keep out intruders. 2. She likes to take a walk along the hedge for its calming effect.","example_th":"1. เขาปลูกผามรอบหลังคาเพื่อป้องกันคนเข้ามาในบ้าน. 2. เธอกำลังเดินไปดูผามเพราะมีความสุข"},{"word":"helix","pos":"noun","en_meaning":"A spiral or corkscrew shape, especially one formed by a single continuous curve.","th_meaning":"กลับหรือทรงสอดคล้องแบบมีรูปเป็นเชิงโค้งพวงแฝง","example_en":"The DNA molecule is in the form of a helix.","example_th":"โมเลกุล DNA อยู่ในรูปเป็นกลับ"},{"word":"hepatitis","pos":"noun","en_meaning":"inflammation of the liver, often caused by viral infection.","th_meaning":"التهاب ี, มัก由ไวรัส gâyต้น","example_en":"She has been diagnosed with hepatitis.","example_th":"เธอถูกวินิจฉัยเป็นไข้หัวใจ"},{"word":"herbicide","pos":"noun","en_meaning":"a chemical used for killing unwanted plants, especially weeds.","th_meaning":"สารเคมีใช้ฆ่าพืชไม่ต้องการหรือแมลงพืช เช่น สารเคมีปลอกแมลงพืช","example_en":"We use herbicide to kill weeds in our garden.","example_th":"เราใช้สารเคมีปลอกแมลงพืชในการฆ่าพืชไม่ต้องการในสวนของเรา"},{"word":"hierarchy","pos":"noun","en_meaning":"a system of arrangement or order in which things are classified according to their relative importance, status, or rank.","th_meaning":"ระบบระดับหรือลำดับที่สิ่งต่างๆ ถูกจัดการโดยอ้างอิงตามความสำคัญ, อันดับ, หรือสถานะ","example_en":"The company has a strict hierarchy of authority.","example_th":"บริษัทย์มีระบบระดับสังคมที่เข้มงวด"},{"word":"hip","pos":"verb","en_meaning":"to move or walk with a particular rhythm, often in a style that is fashionable or trendy","th_meaning":"ริบกวน (ritkwan)","example_en":"He hipped into the new dance craze.","example_th":"เขาลุยเข้าไปในสไตล์การเต้นที่กำลังฮิต"},{"word":"historically","pos":"adverb","en_meaning":"in the past; formerly","th_meaning":"ในอดีต; เมื่อวาน","example_en":"Historically, she has been a good friend.","example_th":"อย่างไรก็ตาม ด้วยเหตุการณ์ที่เกิดขึ้นในอดีต จึงทำให้พวกเราจะมีความสัมพันธ์ที่ดีกับนาย"},{"word":"homework","pos":"noun","en_meaning":"assignments given to students by teachers to be done at home outside of school hours.","th_meaning":"งานบ้าน","example_en":"She has a lot of homework tonight.","example_th":"เธอต้องทำเยอะมากในวันนี้"},{"word":"horizon","pos":"noun","en_meaning":"the line that separates the earth from the sky, especially when viewed from the sea or from a high place.","th_meaning":"เส้นขอบฟ้าที่ตั้งตรงข้ามกับพื้นโลกในด้านตะวันออก","example_en":"I could see the horizon from the top of the mountain.","example_th":"ฉันสามารถเห็นเส้นขอบฟ้าจากยอดเขา"},{"word":"horizontal","pos":"adjective","en_meaning":"lying or set in a flat position parallel to the horizon; extending from left to right.","th_meaning":"แนวนอนหรือตั้งตรงกับระดับพื้น","example_en":"The wall is horizontal.","example_th":"กำแพงเป็นแนวนอน"},{"word":"hormone","pos":"noun","en_meaning":"A chemical substance produced by the body that has a specific effect on certain cells or organs.","th_meaning":"สารเคมีที่ปลดปล่อยโดยร่างกายและมีผลเฉพาะต่อเซลล์หรือ臓บางชนิด","example_en":"Insulin is a hormone produced by the pancreas that helps regulate blood sugar levels.","example_th":"ไอเซนซินเป็นสารเคมีที่ปลดปล่อยโดยผิวหนังปอดและช่วยควบคุมระดับตาเลือด"},{"word":"hydrogen","pos":"noun","en_meaning":"A chemical element with the symbol H and atomic number 1.","th_meaning":"ธาตุออกซิเจน","example_en":"Water is composed of hydrogen and oxygen.","example_th":"น้ำประกอบด้วยออกไซเจนและไฮโดรเจน"},{"word":"identical","pos":"adjective","en_meaning":"exactly the same; having the exact form, nature, or qualities","th_meaning":"เหมือนกัน, ไม่แตกต่าง","example_en":"The twins are identical.","example_th":"พี่น้องเป็นคนคล้ายกัน"},{"word":"identification","pos":"noun","en_meaning":"the act of identifying or the state of being identified","th_meaning":"การระบุตัวตนหรือสถานะที่ถูกระบุตัวตน","example_en":"The process of identification is crucial for security.","example_th":"กระบวนการระบุตัวตนจำเป็นสำหรับความปลอดภัย"},{"word":"ideology","pos":"noun","en_meaning":"a set of beliefs, values, and principles that provide the foundation for organizing and explaining how a society operates or should operate.","th_meaning":"ความคิดเห็นหรือแนวคิดที่เป็นหลักในการจัดการและอธิบายว่าสังคมควรทำงานอย่างไร","example_en":"He has strong ideological beliefs about political issues.","example_th":"เขามีความคิดเห็นทาง Políticaที่แข็งแกร่ง"},{"word":"illusion","pos":"noun","en_meaning":"a false impression or deceptive appearance.","th_meaning":"ภาพจำลองหรือสิ่งที่ทำให้คิดว่าเป็นจริงแม้ว่าจะไม่ใช่เช่นนั้นในความเป็นจริง","example_en":"He was trying to create an illusion of normalcy.","example_th":"เขายากรานสร้างภาพจำลองของภาวะปกติ"},{"word":"immune","pos":"adjective","en_meaning":"not affected by or resistant to disease, injury, or other adverse effects","th_meaning":"ภูมิคุ้มกัน","example_en":"The vaccine made him immune to the flu.","example_th":"วัคซีนทำให้เขารับป้องกันโรคระบาด"},{"word":"impact","pos":"noun","en_meaning":"The effect of something, especially a forceful blow or stroke.","th_meaning":"ผลกระทบจากบางสิ่ง","example_en":"The impact of the new policy was immediate and significant.","example_th":"ผลกระทบของนโยบายใหม่เกิดขึ้นทันทีและมีความหมายอย่างสำคัญ"},{"word":"implicit","pos":"adjective","en_meaning":"something that is understood or known but not directly stated, especially something that can be inferred from the situation.","th_meaning":"หมายถึงสิ่งที่เข้าใจหรือรู้จักอยู่แต่ไม่ได้ระบุโดยตรง การเรียกความเข้าใจจากสถานการณ์","example_en":"The importance of the meeting was implicit in everyone's behavior.","example_th":"ความสำคัญของการประชุมนั้นได้รับการเข้าใจได้ง่ายๆ ผ่านพฤติกรรมของทุกคน"},{"word":"importantly","pos":"adverb","en_meaning":"in an important way; significantly","th_meaning":"สำคัญ","example_en":"It was done importantly.","example_th":"มันถูกทำอย่างสำคัญ"},{"word":"impulse","pos":"noun","en_meaning":"a sudden and powerful action or feeling; a force applied to an object in a short time causing it to change its motion","th_meaning":"กระแทก, แรงกระแทก","example_en":"She gave him a strong impulse to leave.","example_th":"เธอให้เขากระแทกตัวเองออกจากที่นั่ง"},{"word":"incidence","pos":"noun","en_meaning":"The occurrence of something, especially an event or disease.","th_meaning":"การเกิดขึ้นหรือความต้องการของบางสิ่งบางอย่าง","example_en":"The incidence of this illness has increased in recent years.","example_th":"ภาวะที่คนบางกลุ่มต้องเผชิญกับโรคหรือปัญหาบางอย่างเพิ่มขึ้นในช่วงเวลาที่ผ่านมา"},{"word":"incline","pos":"noun, verb","en_meaning":"a slope; to lean or tilt toward something","th_meaning":"ชั้น (chao) การเอียงหรือกึ่งตัวสำหรับบางสิ่งที่สามารถปรับเปลี่ยนความเอียงได้","example_en":"The hill has a steep incline.","example_th":"เขาคนนี้ไม่มีความสามารถในการทำให้การเปลี่ยนแปลงของเรื่องราวของเขามีความเอื้อเฟื้อมาก"},{"word":"inclusion","pos":"noun","en_meaning":"the act of including someone or something in a group, organization, or society; the state of being included.","th_meaning":"การรวมหรือการทำให้เข้าสู่กลุ่ม องค์กร หรือสังคม","example_en":"The company has made efforts to increase diversity and inclusion in its workforce.","example_th":"บริษัทได้มีความพยายามเพื่อเพิ่มความหลากหลายและการรวมในพนักงานของตน"},{"word":"incredible","pos":"adjective","en_meaning":"amazing, wonderful","th_meaning":"ประทับใจ, ยอดเยี่ยม","example_en":"The performance was truly incredible.","example_th":"การแสดงนั้นเป็นไปไม่ได้เช่นกัน"},{"word":"incredibly","pos":"adverb","en_meaning":"extremely; remarkably","th_meaning":"อย่างที่น่าตกใจมากหรือไม่เชื่อถือได้","example_en":"He was incredibly brave.","example_th":"เขาเป็นคนที่มีความอดทนและความแข็งแกร่งมากที่สุด"},{"word":"incumbent","pos":"noun","en_meaning":"someone who holds or has the responsibility for a particular job, office, or position at a given time.","th_meaning":"ผู้ที่ดำรงตำแหน่งหรือหน้าที่อยู่ในขณะนี้","example_en":"The current president is an incumbent.","example_th":"ประธานาธิบดีปัจจุบันคือผู้ดำรงตำแหน่ง"},{"word":"independently","pos":"adverb","en_meaning":"alone or without dependence on others; by oneself","th_meaning":"อย่าง độc lậpหรือไม่ขึ้นอยู่กับผู้อื่น","example_en":"She works independently and does not need anyone's help.","example_th":"เธอทำงานแบบเดินทางและไม่ต้องการความช่วยเหลือจากใคร"},{"word":"indicator","pos":"noun","en_meaning":"a sign or signal used to show something, such as progress, a condition, or a level of activity.","th_meaning":"เครื่องหมาย หรือสัญญาณที่ใช้ในการแสดงบางอย่าง เช่น ความ tiến歩 การเปลี่ยนแปลงของสถานการณ์ หรือระดับกิจกรรม","example_en":"The traffic light is a good indicator of road conditions.","example_th":"ไฟ tín hiệuบนถนนเป็นเครื่องหมายที่ดีในการแสดงสภาพทางเที่ยว"},{"word":"indifference","pos":"noun","en_meaning":"a lack of interest or concern","th_meaning":"ไม่สนใจหรือไม่เข้าใจ","example_en":"She showed no indifference to the outcome.","example_th":"เธอไม่แสดงความสัมพันธ์กับผลลัพธ์นี้"},{"word":"indigenous","pos":"noun","en_meaning":"naturally existing or belonging to a place, especially one that was not introduced from elsewhere.","th_meaning":"ที่เกิดมาในดินครั้งแรกหรืออยู่อาศัยอย่างต่อเนื่องกับท้องถิ่น","example_en":"The indigenous people of the area have lived there for centuries.","example_th":"ผู้พื้นเมืองของภูมิภาคนั้นมีชีวิตและอยู่อาศัยอย่างต่อเนื่องด้านนี้มานับศตวรรษหลายสี่"},{"word":"indirect","pos":"adjective","en_meaning":"not direct; not going through an intermediary","th_meaning":"ไม่ตรงไปตรงมา; ไม่ผ่านคนกลาง","example_en":"She gave him a message indirectly.","example_th":"เธอส่งข้อความให้เขาโดยไม่ผ่านคนกลาง"},{"word":"individually","pos":"adverb","en_meaning":"separately; one at a time","th_meaning":"อย่างเดี่ยวๆ, ต่อเนื่องแต่ละครั้ง","example_en":"She distributed the gifts individually.","example_th":"เธอจัดแจกของให้คนละคน"},{"word":"induce","pos":"verb","en_meaning":"to cause or bring about, to lead to","th_meaning":"ทำให้เกิดขึ้น กระตุ้นให้เกิด","example_en":"He induced her to join the club.","example_th":"เขากำลังใจเธอให้เข้าร่วมชมรม"},{"word":"induction","pos":"noun","en_meaning":"The process of inducting someone into a new group or organization, especially as a member of the police or armed forces.","th_meaning":"การแต่งตั้งหรือรับสมัครสมาชิกให้เข้าสู่กลุ่มหรือองค์กรใหม่ อย่างเฉพาะเจาะจงกับสมาชิกตำรวจหรือกองกำลังป้องกัน","example_en":"He will be inducted into the army next month.","example_th":"เขาจะถูกแต่งตั้งเป็นทหารในเดือนหน้า"},{"word":"industrialization","pos":"noun","en_meaning":"The process of converting an economy from a primarily agricultural and rural base to one based largely on industry.","th_meaning":"การพัฒนาอุตสาหกรรม","example_en":"The Industrial Revolution was a pivotal moment in human history.","example_th":"ปฏิวัติศาสตร์อุตสาหกรรมเป็นจุดประทับใจสำคัญในประวัติศาสตร์มนุษยชาติ"},{"word":"industrialize","pos":"verb","en_meaning":"to make something into an industry or to develop a country's economy by building and developing industries","th_meaning":"ทำให้บางสิ่งมีอยู่ในบริบทอุตสาหกรรม หรือพัฒนาเศรษฐกิจของประเทศโดยสร้างและพัฒนาอุตสาหกรรม","example_en":"The government is planning to industrialize the region.","example_th":"รัฐบาลกำลังวางแผนให้บริบทนี้มีการอุตสาหกรรม"},{"word":"inequality","pos":"noun","en_meaning":"the condition of being unequal or different in size, amount, status, quality, power, or opportunity; the fact that people do not have equal rights and opportunities.","th_meaning":"ความไม่เท่าเทียมกัน ในบริบททางสังคมและเศรษฐกิจ สิทธิและโอกาสที่คนได้รับไม่เท่าเทียมกัน","example_en":"Income inequality is a growing problem in many countries.","example_th":"ความไม่เท่าเทียมในรายได้เป็นปัญหาที่กำลังเพิ่มขึ้นในประเทศหลายแห่ง"},{"word":"inevitably","pos":"adverb","en_meaning":"definitely, necessarily, surely","th_meaning":"อย่างนั้นแล้ว, แน่นอน, สิ่งนี้ต้องเกิดขึ้น","example_en":"He will inevitably pass the exam.","example_th":"เขามันจะผ่านการสอบได้แน่นอน"},{"word":"infect","pos":"verb","en_meaning":"to transmit a virus or other pathogen to someone or something, causing them to be infected.","th_meaning":"ทำให้ติดเชื้อหรือส่งโรคไปยังใครหรือบางสิ่ง","example_en":"He was infected with a serious illness.","example_th":"เขารู้สึกว่ามีโรคที่รุนแรงและต้องการการดูแล"},{"word":"infectious","pos":"adjective","en_meaning":"tending to spread quickly and widely, especially a contagious disease.","th_meaning":"มีการแพร่กระจายได้เร็วและกว้างขวาง","example_en":"The flu is highly infectious.","example_th":"โรคไข้หวัดเป็นโรคที่ติดเชื้อได้ง่าย"},{"word":"inference","pos":"noun","en_meaning":"the process of drawing conclusions based on evidence and reasoning","th_meaning":"การเรียนรู้จากข้อมูลหรือสิ่งที่พบเจอและทำการสร้างสมมุติฐานด้วยการคิดเห็น","example_en":"The doctor made an inference from the symptoms.","example_th":"แพทย์ได้ทำการสรุปผลจากการตรวจวินิจฉัยอาการ"},{"word":"inferior","pos":"adjective","en_meaning":"lower in quality, importance, or status","th_meaning":"น้อยกว่าในคุณภาพ, สำคัญหรือระดับ","example_en":"His opinion is inferior to mine.","example_th":"ความคิดเห็นของเขาน้อยกว่าฉัน"},{"word":"infinite","pos":"adjective","en_meaning":"having no limits or end; boundless","th_meaning":"ไม่มีขีดจำกัด หรือสิ้นสุด","example_en":"The universe is infinite.","example_th":"อวกาศเป็นที่ต่อเนื่องกันไปยุ่งยาก"},{"word":"infinity","pos":"noun","en_meaning":"A concept describing something without any limit or end.","th_meaning":"ความไม่มีที่สุดหรือไม่มีจบ","example_en":"The universe is infinite.","example_th":"อวกาศมีความไม่มีที่สุด"},{"word":"influential","pos":"adjective","en_meaning":"having or exercising influence or power","th_meaning":"มีกำลังใจหรือผลักดันต่อผู้อื่น ๆ ","example_en":"He is an influential figure in the business world.","example_th":"เขายังเป็นคนที่มีพลังงานในการกระทำทางธุรกิจ"},{"word":"informal","pos":"adjective","en_meaning":"not formal or official; casual","th_meaning":"ไม่เป็นทางการหรือระเบียบ; ผิดตัว","example_en":"Let's meet for an informal dinner.","example_th":"เราไปเชื่อมต่อกันแบบไม่เป็นทางการค่ะ"},{"word":"inhibit","pos":"verb","en_meaning":"to prevent or restrain from happening or developing","th_meaning":"จำกัด การเกิดขึ้นหรือพัฒนา","example_en":"The drug was used to inhibit the growth of bacteria.","example_th":"ยาได้ใช้เพื่อลดการเติบโตของแบคทีเรีย"},{"word":"inhibition","pos":"noun","en_meaning":"the process of restraining or preventing something from happening or developing.","th_meaning":"การขัดขวางหรือป้องกันบางอย่างจากเกิดขึ้นหรือพัฒนา","example_en":"The medication caused an inhibition of the patient's immune system.","example_th":"ยาส่งผลให้ระบบภูมิคุ้มกันของคนไข้ถูกขัดขวาง"},{"word":"initiate","pos":"verb","en_meaning":"to begin or start something","th_meaning":"เริ่มต้นหรือจัดการเริ่มต้นบางสิ่ง","example_en":"We need to initiate a new project.","example_th":"เราจำเป็นต้องเริ่มนักกิจใหม่"},{"word":"initiation","pos":"noun","en_meaning":"The action of introducing someone to a new organization, group, or set of ideas.","th_meaning":"การแนะนำหรือเพิ่มเข้าสู่กลุ่มผู้สมาชิกใหม่ๆ หรือกลุ่มนั้นๆ","example_en":"The initiation of the new project is expected to be completed by the end of next month.","example_th":"การเริ่มต้นโครงการใหม่นี้ควรจะเสร็จสุดท้ายในเดือนก่อนหน้านี้"},{"word":"inject","pos":"verb","en_meaning":"to put something into a person or thing in a harmful way, especially medicine into a vein","th_meaning":"จะฉีดหรือขยับสารเคมีเข้าไปในร่างกายผ่านทางเลือดหรือสัมผัส","example_en":"He had to inject himself with the vaccine.","example_th":"เขาต้องใช้ยาฉีดเพื่อป้องกันโรค"},{"word":"injection","pos":"noun","en_meaning":"the act of injecting something, especially medicine or a drug into the body; the introduction of foreign matter into an organism.","th_meaning":"การฉีดหรือทำให้สิ่งบางอย่างเข้าไปในร่างกาย เช่น การฉีดยาหรือสารเคมีที่ไม่เป็นปกติต่อร่างกาย","example_en":"She received an injection of medication to help her recover.","example_th":"เธอได้รับการฉีดยาเพื่อช่วยให้เธอหายป่วย"},{"word":"innate","pos":"adjective","en_meaning":"existing or present at birth; natural","th_meaning":"ที่เกิดมาในnat (nai khorng)","example_en":"She has an innate talent for drawing.","example_th":"เธอมีทักษะพิเศษในการวาดภาพ"},{"word":"insect","pos":"noun","en_meaning":"a small animal with six legs, belonging to the class Insecta, such as ants, bees, butterflies, and flies.","th_meaning":"พืชไม้เล็กๆ มีขา 6 เข้าสู่หมวดหมู่ Insecta เช่น แมลง, กุยช่าย, นกหนู และวิญญาณ","example_en":"Insects are an important part of the ecosystem.","example_th":"พืชไม้เป็นส่วนสำคัญในระบบนิเวศ"},{"word":"insert","pos":"verb","en_meaning":"to put or place something in a specific position or within a system, often with the use of force or pressure.","th_meaning":"ตั้งค่าหรือเพิ่มข้อมูลในระบบใดๆ โดยตรง","example_en":"He inserted the new data into the database.","example_th":"เขามีข้อมูลใหม่ที่ต้องการจะใส่ไปอยู่ในฐานข้อมูล"},{"word":"instability","pos":"noun","en_meaning":"the state of being unstable or the quality of not being stable","th_meaning":"ความไม่แน่นอน หรือคุณสมบัติที่ไม่คงที่","example_en":"The country is facing political instability.","example_th":"ประเทศกำลังเผชิญกับความไม่แน่นอนทาง سيร์"},{"word":"instinct","pos":"noun","en_meaning":"an innate tendency or ability to do something","th_meaning":"ความรู้สึกหรือทักษะที่เกิดขึ้นโดยไม่จำเป็นต้องเรียนรู้หรือฝึกฝน","example_en":"The animal acted on its instinct.","example_th":"สัตว์ทำตาม本能"},{"word":"integral","pos":"noun","en_meaning":"a whole number or a fraction representing the sum of an infinite series","th_meaning":"จำนวนเต็มหรือเศษที่
