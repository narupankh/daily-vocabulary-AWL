ies, as opposed to quantitative","th_meaning":"ที่เกี่ยวกับคุณภาพหรือข้อมูลเชิงปริมาณ","example_en":"The study was qualitative in nature.","example_th":"การวิจัยนี้มีลักษณะเป็นแบบข้อมูลเชิงคุณภาพ"},{"word":"quantitative","pos":"adjective","en_meaning":"relating to or involving measurement, especially in a precise and measurable way","th_meaning":"เกี่ยวกับหรือมีนัยสำคัญในการวัด เช่นในลักษณะที่ละเอียดและสามารถวัดได้","example_en":"Quantitative analysis of data is essential for making informed decisions.","example_th":"การวิเคราะห์ข้อมูลเชิงคณิตศาสตร์จำเป็นสำหรับการตัดสินใจที่มีประสิทธิภาพ"},{"word":"quantum","pos":"noun","en_meaning":"a fundamental unit of a physical property that is quantized, meaning that it can take on only certain discrete values.","th_meaning":"อัตราส่วนหรือปริมาณที่คงที่ของมิติทางกายภาพที่ถูกแบ่งแยกเป็นหน่วยย่อย ๆ","example_en":"The behavior of subatomic particles exhibits quantum properties.","example_th":"พฤติกรรมของอนุภาคดีวาร์ติกัสแสดงลักษณะของควานัมต์"},{"word":"questionnaire","pos":"noun","en_meaning":"a formal set of questions designed to elicit information or opinions, typically used in research, polling, or data collection.","th_meaning":"เอกสารสอบถามหรือแบบสำรวจที่ใช้เพื่อรวบรวมข้อมูลหรือความคิดเห็น","example_en":"She filled out a questionnaire for the job application.","example_th":"เธอทำการตอบแบบสอบถามสำหรับการสมัครงานนี้"},{"word":"quiz","pos":"noun","en_meaning":"A test, especially one given to students periodically during a course of study","th_meaning":"การทดสอบหรือฝึกหัดที่ใช้เพื่อประเมินความรู้และความเข้าใจของนักเรียนในช่วงเวลาที่กำหนด","example_en":"I need to take a quiz on the material we covered in class today.","example_th":"ฉันต้องการจะทำแบบทดสอบเกี่ยวกับเนื้อหาที่เราเรียนวันนี้"},{"word":"quotation","pos":"noun","en_meaning":"the act of making an offer for something, or a statement of the price at which something can be bought or sold.","th_meaning":"การเสนอราคา","example_en":"He gave me a quotation for the service.","example_th":"เขาก็ให้ฉันใบเสนอราคาสำหรับบริการนี้"},{"word":"rack","pos":"noun","en_meaning":"a frame for holding or displaying things, especially books or photographs.","th_meaning":"ตู้ใส่สิ่งของ เช่น หนังสือ ภาพ","example_en":"He put the new book on a shelf rack.","example_th":"เขามีหนังสือใหม่ๆอยู่บนตู้วางหนังสือ"},{"word":"radar","pos":"noun, verb","en_meaning":"a device for detecting and measuring the distance to objects by bouncing radio waves off them or reflecting light","th_meaning":"เครื่องตรวจจับระยะทาง โดยใช้คลื่นดูเราะห์หรือสะท้อนแสง","example_en":"The radar detected an object in the distance.","example_th":"เครื่องตรวจจับระยะทางตรวจพบวัตถุอยู่ในระยะ"},{"word":"radiation","pos":"noun","en_meaning":"the process by which energy is transferred from one substance to another, or from an object to its surroundings, as a result of the emission and absorption of electromagnetic waves.","th_meaning":"การส่งผ่านพลังงานจากวัตถุหนึ่งไปยังวัตถุอื่นหรือจากสิ่งมีรูปร่างไปยังสิ่งรอบข้างด้วยกระบวนการปล่อยและดูดซับคลื่อนที่แม่นยำ","example_en":"The building was evacuated due to radiation.","example_th":"อาคารถูกทำให้พ้นผู้อยู่อาศัยไปเพราะมีการส่งกระจายพลังงาน"},{"word":"radius","pos":"noun","en_meaning":"the distance from the center of a circle or sphere to its edge","th_meaning":"ระยะทางจากศูนย์กลางวงกลมหรือทรงกลมไปยังขอบเขต","example_en":"The radius of the circle is 5 meters.","example_th":"รัศมีของวงกลมคือ 5 เมตร"},{"word":"rainfall","pos":"noun","en_meaning":"the continuous process of rain falling from clouds to the earth","th_meaning":"ฝนตกอย่างต่อเนื่องจากคลาวน์สู่พื้นดิน","example_en":"Heavy rainfall caused flooding in many areas.","example_th":"ฝนตกหนักทำให้น้ำท่วมเกิดขึ้นในหลายภูมิภาค"},{"word":"randomize","pos":"verb","en_meaning":"to arrange or order things in a random way","th_meaning":"ให้สิ่งต่างๆ ไปอยู่ในลำดับที่ไม่มีความรู้จักกัน","example_en":"She randomized the list of participants before the experiment.","example_th":"เธอทำการสุ่มเสื้อผ้าในถุงก่อนจะเริ่มทำ thí nghiệm"},{"word":"randomly","pos":"adverb","en_meaning":"in a haphazard or unplanned way","th_meaning":"โดยสุ่ม ไม่มีลำดับ","example_en":"He chose the seat randomly.","example_th":"เขารับเลือกเก้าอี้โดยสุ่ม"},{"word":"rational","pos":"adjective","en_meaning":"logically sound or reasonable","th_meaning":"สมเหตุสมผล หรือ สANE","example_en":"He made a rational decision.","example_th":"เขารับมือกับสถานการณ์ด้วยความรู้สึกเห็นภาพ"},{"word":"rationality","pos":"noun","en_meaning":"the quality of being based on or showing good sense and sound judgment; the possession of clear-headed, sensible judgment.","th_meaning":"คุณภาพที่ตั้งใจดีและมีความเห็นชัดเจน หรือความสามารถในการสื่อสารอย่างวิธีเดียวกัน","example_en":"His decision shows a high degree of rationality.","example_th":"การตัดสินใจของเขาแสดงถึงระดับของความคิดเห็นที่ดีและสมเหตุสมผล"},{"word":"ray","pos":"noun","en_meaning":"a narrow beam of light, heat, or other radiation.","th_meaning":"แสงหรือสัญญาณที่มีความยาวคลุมเครือมากน้อยแค่เล็ก ๆ นี้","example_en":"The sun emits a constant stream of rays.","example_th":"ดวงอาทิตย์ปล่อยอุณหภูมิและแสงในรูปแบบของเรียก"},{"word":"reactive","pos":"adjective","en_meaning":"tending to react quickly to a stimulus or change; responsive","th_meaning":"ที่ตอบสนองเร็วหรือมีความรับผิดชอบต่อการเปลี่ยนแปลง","example_en":"The new app is highly reactive and provides instant feedback.","example_th":"แอพใหม่เป็นแอพที่เป็นปฏิเสธได้ดีและให้ข้อเสนอแนะได้อย่างรวดเร็ว"},{"word":"reactor","pos":"noun","en_meaning":"a device for inducing a nuclear reaction","th_meaning":"เครื่องปฏิกิริยานวัตกรรม","example_en":"The reactor is used to generate electricity.","example_th":"เครื่องปฏิกิริยานวัตกรรมใช้ในการสร้างไฟฟ้า"},{"word":"readily","pos":"adverb","en_meaning":"easily or without difficulty","th_meaning":"ง่ายๆ หรือไม่ยากลำบาก","example_en":"He can readily understand the instructions.","example_th":"เขารู้สึกว่าสามารถเข้าใจคำแนะนำได้ง่ายๆ"},{"word":"realism","pos":"noun","en_meaning":"the quality of being realistic or dealing with reality in a practical and sensible way","th_meaning":"ความเป็นจริงหรือการตีความที่ถูกต้องกับความเป็นจริงในบริบทที่สมเหตุสมผล","example_en":"The author's approach to writing was very realistic, often drawing on his own experiences.","example_th":"วิธีการเขียนของผู้เขียนนั้นมีคุณภาพที่เป็นจริง มักจะใช้ประสบการณ์ส่วนตัวในการเขียน"},{"word":"realistic","pos":"adjective","en_meaning":"likely to happen or be true; believable.","th_meaning":"เป็นไปได้จริงหรือเป็นความเชื่อถือได้","example_en":"The weather forecast is realistic, it will rain tomorrow.","example_th":"การทำนายอากาศนั้นมันเป็นไปได้จริง พรุ่งนี้จะฝน"},{"word":"realm","pos":"noun","en_meaning":"a domain or sphere of power, authority, or activity; a specific area of interest or expertise.","th_meaning":"แห่งความทรงจำ หรือโลกอื่น ๆ ที่มีอำนาจและความสามารถต่าง ๆ แตกต่างกัน","example_en":"The realm of physics deals with the fundamental laws that govern the universe.","example_th":"สภาวะของฟิสิกส์นั้นมีความรู้จักในกฎเกณฑ์ที่กำหนดคุณสมบัติต่าง ๆ ของอวกาศ"},{"word":"receptor","pos":"noun","en_meaning":"a protein or other molecule that binds to a specific ligand and initiates a reaction, often in a cell.","th_meaning":"รีเซปเตอร์ (rīsēp-tāt)","example_en":"The receptor binds to the hormone, triggering a biological response.","example_th":"รีเซปเตอร์ต้องการฮอร์โมนเพื่อกระตุ้นตอบสนองทางชีวภาพ"},{"word":"recipe","pos":"noun","en_meaning":"a set of instructions for making something, typically in cooking or baking.","th_meaning":"แผนการทำอาหารหรือวิธีการทำสิ่งต่างๆ","example_en":"The recipe is easy to follow. I made the cookies according to the recipe.","example_th":"แผนการทำ_cookies ง่ายมาก เพื่อนี้ทำตามแผนการทำ"},{"word":"reconstruct","pos":"verb","en_meaning":"to build or create something again, especially after it has been damaged or destroyed","th_meaning":"ตั้งใหม่ สร้างขึ้นอีกครั้ง","example_en":"After the earthquake, they had to reconstruct their homes.","example_th":"หลังจากแผ่นดินไหว เขาต้องการจะตั้งบ้านใหม่"},{"word":"regime","pos":"noun","en_meaning":"a system or period of government, especially one regarded as marked by a particular set of political ideas or practices.","th_meaning":"ระบบการปกครองหรือสภาวะที่เป็นไปตามนโยบายหรือปรัชญาทาง 정치บางประการ","example_en":"The country's new regime is facing many challenges.","example_th":"ประเทศนี้กำลังเผชิญกับความยากลำบากมากมายในระบบการปกครองใหม่"},{"word":"regression","pos":"noun","en_meaning":"The return of something to a previous state or level, often as a result of a negative influence.","th_meaning":"การกลับมาอยู่ในระดับเดิมหรือสถานะเดิมจากความเปลี่ยนแปลงที่เกิดขึ้น","example_en":"After the new policy was implemented, there was a regression in sales.","example_th":"หลังจากการปรับเปลี่ยนนโยบายใหม่ขายของกลับมาอยู่ในระดับเดิม"},{"word":"rehabilitation","pos":"noun","en_meaning":"the process of helping someone to recover from illness or injury, especially after an accident or surgery; a program of treatment and exercise designed to help people who are physically disabled.","th_meaning":"การรักษา การฟื้นฟูจากโรคหรือบาดเจ็บ หรือหลังจากการอุบัติเหตุหรือการผ่าตัด","example_en":"He needs rehabilitation to regain his strength and mobility after the accident.","example_th":"เขาต้องการการรักษาเพื่อรักษาพลังงานและความสามารถของตนเองหลังจากการอุบัติเหตุ"},{"word":"reinforce","pos":"verb","en_meaning":"to make something stronger or more effective, especially by adding support or material","th_meaning":"เพิ่มความแข็งแรงหรือประสิทธิภาพให้กับสิ่งใดๆ โดยการเพิ่มที่พิเศษหรือวัสดุ","example_en":"We need to reinforce the walls to ensure the building is safe.","example_th":"เราต้องเสริมสร้างกำแพงเพื่อให้ก่อตัวปลอดภัย"},{"word":"rejection","pos":"noun","en_meaning":"The act of rejecting or the state of being rejected.","th_meaning":"การปฏิเสธหรือสถานะถูกปฏิเสธ","example_en":"He received a rejection letter from the university.","example_th":"เขาได้รับข้อความปฏิเสธจากมหาวิทยาลัย"},{"word":"reliability","pos":"noun","en_meaning":"the quality of being dependable or trustworthy; the ability to be relied upon","th_meaning":"ความเชื่อถือหรือความมั่นใจได้ในสิ่งใด","example_en":"The equipment must have a high level of reliability.","example_th":"เครื่องจักรต้องมีระดับความเชื่อถือสูง"},{"word":"render","pos":"verb","en_meaning":"to produce or present something in a particular way, often with the intention of creating a certain impression; to give form to an idea or concept","th_meaning":"ทำให้เป็นไปตามความต้องการหรือแผนก่อนหน้านั้น เช่น การRenderingในด้านออกแบบกราฟิก คือการทำให้ภาพถูกสร้างขึ้นอย่างคล่องแคล่วและสวยงาม","example_en":"The artist rendered the scene in oil paints.","example_th":"ศิลปินคนนี้ได้นำเสนอภาพที่พวกเขาสร้างมาด้วยสีก้อนที่เป็นเอกลักษณ์ของตนเอง"},{"word":"repertoire","pos":"noun","en_meaning":"a collection or list of songs, plays, dances, etc. that a performer knows and can perform","th_meaning":"รายการหรือหมู่เพลงที่ศิลปินสามารถเล่นได้","example_en":"She has an impressive repertoire of talents.","example_th":"เธอมีความสามารถทางดนตรีที่น่าสนใจ"},{"word":"replacement","pos":"noun","en_meaning":"the act of replacing one thing with another, or a new item that takes the place of an old or broken one.","th_meaning":"การแทนที่หรือการเปลี่ยนมาใช้ของใหม่ที่นำมาทดแทนของเก่าหรือเสื่อมสภาพ","example_en":"The mechanic will replace the old engine with a new, more efficient one.","example_th":"ช่างจักรยานจะทำการแทนที่เครื่องยนต์เก่าด้วยเครื่องยนต์ใหม่และมีประสิทธิภาพมากขึ้น"},{"word":"replicate","pos":"verb","en_meaning":"to make a copy of something or repeat an action, process, or event exactly as it was before.","th_meaning":"คัดลอกหรือทำซ้ำให้เหมือนเดิม","example_en":"The scientists replicated the experiment to ensure accuracy.","example_th":"นักวิทยาศาสตร์ได้ทำการทดลองซ้ำเพื่อความแม่นยำ"},{"word":"replication","pos":"noun, verb","en_meaning":"the process of making exact copies of something; the production of offspring by sexual or asexual means","th_meaning":"การสร้างสำเนาที่คล้ายกันหรือการผลิตลูกหลานโดยการผสมพันธุ์หรือไม่ใช้การผสมพันธุ์","example_en":"The process of replication occurs in all living things.","example_th":"กระบวนการซ้ำเลียนแบบนี้เกิดขึ้นในสิ่งมีชีวิตทุกอย่าง"},{"word":"reproduce","pos":"verb","en_meaning":"to create offspring or produce a copy of something","th_meaning":"ทำให้เกิดลูกหรือสร้างคัดลอกของสิ่งที่มีอยู่แล้ว","example_en":"The process of reproduction involves the growth and division of cells.","example_th":"กระบวนการพันธุกรรมในปัจจุบันนี้มีความซับซ้อนและรวมถึงการเติบโตและการแบ่งเซลล์"},{"word":"reproduction","pos":"noun","en_meaning":"The production of offspring or the process by which organisms give rise to new individuals.","th_meaning":"การผลิตสืบพันธุ์หรือกระบวนการที่มีชีวอย่างสร้างอิทธิพลให้กับสิ่งแวดล้อมใหม่","example_en":"The process of reproduction in humans is complex and involves multiple stages.","example_th":"กระบวนการการผลิตของมนุษย์ซับซ้อนและมีหลายขั้นตอน"},{"word":"republic","pos":"noun","en_meaning":"a government in which the people are represented by elected officials, typically a democracy.","th_meaning":"รัฐบาลประชาธิปไตย","example_en":"The United States is a federal republic with three branches of government.","example_th":"สหรัฐอเมริกาเป็นสาธารณรัฐที่มีสามสาขาของ政府"},{"word":"resemble","pos":"verb","en_meaning":"to be like or similar to something else","th_meaning":"เหมือนหรือคล้ายกับบางสิ่งอื่น","example_en":"The new building resembles the old one.","example_th":"อาคารใหม่มีลักษณะคล้ายกับอาคารเก่า"},{"word":"reservoir","pos":"noun","en_meaning":"a large body of water, typically artificial, for storage and distribution of water or as a source of hydroelectric power.","th_meaning":"คลองหรือพื้นที่ที่ใช้เก็บน้ำ","example_en":"The dam created a new reservoir that now provides much-needed water for the local community.","example_th":"การสร้างคลองใหม่ทำให้มีน้ำเพียงพอสำหรับชุมชนในพื้นที่นั้น"},{"word":"residual","pos":"noun","en_meaning":"remaining after the main part has been removed or deducted; remainder.","th_meaning":"เศษหรือส่วนที่เหลือหลังจากหักเงินหรือทำบางอย่างออกไปแล้ว","example_en":"There is a residual income left over from the sale of the house.","example_th":"มีเงินเศษจากการขายบ้านเหลืออยู่"},{"word":"residue","pos":"noun","en_meaning":"the remainder left after something has been removed or absorbed; a trace of something remaining, especially after a process or reaction.","th_meaning":"เศษที่เหลือหลังจากให้บางสิ่งถูกนำออกหรือดูดซึม; ส่วนหนึ่งของบางสิ่งที่ยังคงอยู่แม้ว่าจะผ่านกระบวนการหรือปฏิบัติ","example_en":"After the experiment, there was a residue of chemicals in the container.","example_th":"หลังจากทดลองเสร็จ แล้วมีเศษเคมีที่ยังคงอยู่ในถ้วย"},{"word":"resistant","pos":"adjective","en_meaning":"able to withstand or cope with something, especially a disease or harmful substance; having the ability to resist","th_meaning":"สามารถกับภัยหรือสภาพแวดล้อมได้ หรือสามารถทนทานต่อสิ่งที่ร้ายแรงได้","example_en":"He is resistant to the virus.","example_th":"เขารับกันโรคไว้วางใจ"},{"word":"respiratory","pos":"adjective","en_meaning":"relating to breathing or the process of respiration","th_meaning":"เกี่ยวกับการหายใจหรือกระบวนการหายใจ","example_en":"He has a respiratory infection.","example_th":"เขาป่วยเนื่องจากการติดเชื้อทาง hô hấp"},{"word":"retrieve","pos":"verb","en_meaning":"to get back something that has been lost or borrowed","th_meaning":"ดึงกลับมา, ส่งคืน","example_en":"I need to retrieve my documents from the bank.","example_th":"ฉันต้องการดึงเอกสารของฉันออกจากธนาคาร"},{"word":"revolutionary","pos":"adjective","en_meaning":"1. causing or marked by a revolution; radical and extreme in its ideas or methods.\n2. introducing new and innovative ways of doing things.","th_meaning":"เปลี่ยนแปลงหรือปฏิวัติอย่างรุนแรง","example_en":"The invention of the wheel was a revolutionary moment in human history.","example_th":"การสร้างวงจรไฟฟ้าเป็นสิ่งที่volutionaryในประวัติศาสตร์มนุษยชาติ"},{"word":"rewrite","pos":"verb","en_meaning":"to write again or anew, typically with the intention of correcting or improving upon an earlier version.","th_meaning":"เขียนอีกครั้ง หรือแก้ไขและปรับปรุงข้อความที่มีอยู่แล้ว","example_en":"I need to rewrite this report because it doesn't meet the requirements.","example_th":"ฉันต้องการจะเขียนรายงานอีกครั้ง เพราะรายงานนี้ไม่ได้รับคะแนนตามที่กำหนดไว้"},{"word":"rhetoric","pos":"noun","en_meaning":"The art of persuasion, especially in public speaking.","th_meaning":"ศิลปะการสัมภาษณ์ หรือ การกระตุ้นอารมณ์ให้คนอื่นๆ มีความสนใจในเรื่องราวที่คุณกำลังกล่าว","example_en":"The politician's rhetoric was so convincing that many voters were swayed.","example_th":"การสัมภาษณ์ของนายพลเมืองนี้เป็นอย่างไรก็ตามมันถูกใจและมีความน่าเชื่อถือ"},{"word":"rhythm","pos":"noun","en_meaning":"the pattern of sounds and silence in music or other art forms, or the regular recurrence of something.","th_meaning":"รhythm (rythm) - ความรึมเรืองของดนตรีหรือลักษณะที่ซ้ำๆ โดยสม่ำเสมอ","example_en":"The rhythm of the heartbeat is steady and consistent.","example_th":"ความรึมเรืองของหัวใจเป็นไปอย่างต่อเนื่องและคงที่"},{"word":"ridiculous","pos":"adjective","en_meaning":"unreasonable; absurd; silly","th_meaning":"ไร้เหตุผล; ผิดปกติ; ก็จัดย่อม","example_en":"His behavior was ridiculous.","example_th":"พฤติกรรมของเขาเป็นที่ไม่สามารถยอมรับได้"},{"word":"ritual","pos":"noun","en_meaning":"a formal and repeated sequence of actions performed to express a belief or to achieve a spiritual effect","th_meaning":"การปฏิบัติตามวิธีการที่มีความซับซ้อนและเป็นแบบประจำเพื่อแสดงความเชื่อหรือให้เกิดผลทางจิตวิทยาศาสตร์","example_en":"The wedding was a traditional ritual.","example_th":"การแต่งงานของเธอคือการปฏิบัติตามบทบาทที่เป็นแบบประจำ"},{"word":"robot","pos":"noun","en_meaning":"a machine that operates automatically or with human-like intelligence.","th_meaning":"เครื่องจักรที่ทำงานโดยอัตโนมัติหรือกับความฉลาดเหมือนมนุษย์","example_en":"The factory has introduced a new robot to increase efficiency.","example_th":"โรงงานได้ร่วมมือกับผู้ผลิตเครื่องจักรรูปแบบใหม่เพื่อเพิ่มประสิทธิภาพ"},{"word":"rope","pos":"noun","en_meaning":"a long cord or string of fibers, usually twisted together","th_meaning":"สายหรือเชือกที่มีเส้นใยหลายส่วนรวมด้วยความแข็งแรง","example_en":"He tied the rope around the post.","example_th":"เขากnotสายกับจุดหลัง"},{"word":"rotate","pos":"verb","en_meaning":"to turn or cause to turn around a central point or axis, change direction, or cycle through a series of positions.","th_meaning":"หมุน (mūn), สลับตำแหน่ง (sàlap phatichai)","example_en":"The door rotates on its hinges.","example_th":"ประตูหมุนกับขบวน"},{"word":"rotation","pos":"noun","en_meaning":"the act of rotating something, a full turn around an axis","th_meaning":"การหมุน การหมุนวงกลม","example_en":"The Earth completes one rotation every 24 hours.","example_th":"โลกหมุนไปรอบครั้งหนึ่งในเวลา 24 ชั่วโมง"},{"word":"rub","pos":"verb","en_meaning":"to apply pressure to something in order to make it smooth or clean, or to check the condition of something by touching it.","th_meaning":"ตีหรือส่งกับของให้ราบรื่นหรือสะอาด หรือตรวจสอบสภาพของบางอย่างโดยใช้มือ","example_en":"He rubbed his hands together to warm them up.","example_th":"เขากิ๊จกรรมดันมือเพื่อให้มีความร้อน"},{"word":"ruler","pos":"noun","en_meaning":"A long stick with a thin blade attached to one end, used for drawing lines and measuring lengths.","th_meaning":"ไม้บรรทัดหรือกุญแจรูปวิน","example_en":"I use a ruler to measure the length of the board.","example_th":"ฉันใช้นิ้วน้ำหนักเป็นเครื่องมือในการหาความยาวของแผ่นไม้"},{"word":"scatter","pos":"verb","en_meaning":"to cause something to spread out or be dispersed in different directions","th_meaning":"กระจาย","example_en":"She scattered the papers on the table.","example_th":"เธอกระจายกระดาษทั้งหมดบนโต๊ะ"},{"word":"scenario","pos":"noun","en_meaning":"a particular set of circumstances or events, especially one imagined for a story or a practical purpose.","th_meaning":"สถานการณ์หรือเหตุการณ์ที่เกิดขึ้นในบางครั้ง","example_en":"The project's success depends on the scenario unfolding as planned.","example_th":"ความสำเร็จของโครงการนี้ขึ้นอยู่กับสถานการณ์ที่พัฒนาตามแผน"},{"word":"scholarship","pos":"noun","en_meaning":"an award given to students who are financially needy or academically优秀","th_meaning":"การศึกษาที่ได้รับการจัดสรรเงินสดจากหน่วยงานต่างๆ โดยเฉพาะอย่างยิ่งสำหรับนักศึกษาที่มีความยากจนในเรื่องของค่าใช้จ่ายในการศึกษา","example_en":"He received a full scholarship to study abroad.","example_th":"เขาได้รับการศึกษาอุดมไปด้วยเงินสดจากหน่วยงานศึกษา"},{"word":"scripture","pos":"noun","en_meaning":"a religious or sacred text considered to be the word of God or a divine revelation","th_meaning":"เอกสารทางศาสนาหรือสิ่งที่ถือเป็นคำสอนของพระเจ้าที่ทรงภาคภูมิใจ","example_en":"The Bible is one of the most revered scriptures in Christianity.","example_th":"พระพุทธศาสนามีบทเรียนสักหลายเล่มแต่นอกเหนือจากพระคัมภีร์ได้ที่ยังไม่มีอื่นเป็นการเคารพมากเท่ากับพระคัมภีร์"},{"word":"scroll","pos":"noun","en_meaning":"a long strip of paper, cloth, or other material wound around a cylinder for reading or reference.","th_meaning":"หนังสือเล่มที่มีข้อมูลหรือเนื้อหามากเกินไปต้องการให้นำมาทำเป็นลูกลักษณะ","example_en":"He read the entire scroll to find the information he was looking for.","example_th":"เขารับหนังสือเล่มที่มีข้อมูลอย่างละเอียดมากเพื่อค้นหาข้อมูลที่ต้องการ"},{"word":"secrete","pos":"verb","en_meaning":"to release or exude a substance, especially from the body.","th_meaning":"ปล่อยหรือขูดซึมสาร อย่างเฉพาะเจาะจงจากร่างกาย","example_en":"The pancreas secretes insulin into the bloodstream.","example_th":"臓ปอดเร่งปล่อยฮินสูลในเลือด"},{"word":"sediment","pos":"noun","en_meaning":"material transported and deposited by wind, water, or ice","th_meaning":"มลพิษ","example_en":"Sediment in rivers can be harmful to fish.","example_th":"มลพิษในน้ำท่วงทีอาจทำให้นกปลาเสียชีวิต"},{"word":"selective","pos":"adjective","en_meaning":"choosing carefully or deliberately, not allowing everything equally","th_meaning":"เลือกสรรหรือเลือกเฉพาะเจาะจง","example_en":"The school is selective about its applicants.","example_th":"โรงเรียนนี้มีการรับผู้สมัครที่เลือกสรร"},{"word":"semantic","pos":"adjective","en_meaning":"relating to meaning, especially in language or logic","th_meaning":"ที่เกี่ยวกับความหมาย","example_en":"The semantics of the language were complex.","example_th":"ภาษาของเรานั้นมีความหมายที่ซับซ้อน"},{"word":"semester","pos":"noun","en_meaning":"a period of study at a school or university, typically lasting from 15 to 20 weeks.","th_meaning":"ภาคการศึกษา ซึ่งรวมระยะเวลาการเรียนรู้อย่างต่อเนื่องในแต่ละชั้นเรียน","example_en":"I have two semesters left in college this year.","example_th":"ฉันยังมีภาคการศึกษาสองภาคที่จะจบปีนี้"},{"word":"semi","pos":"adjective, adverb","en_meaning":"partially; partly; to a moderate extent","th_meaning":"ส่วนใหญ่; บางที; อย่างน้อยหน่อย","example_en":"The car is only semi-functional.","example_th":"รถยนต์มันก็ได้ใช้งานได้บ้าง"},{"word":"seminar","pos":"noun","en_meaning":"a formal session of instruction or discussion on a particular subject, especially one involving lectures and discussions.","th_meaning":"การประชุมที่มีความรู้สึกในการบรรยายหรือสนทนาเกี่ยวกับเรื่องเฉพาะเจาะจง","example_en":"He attended a seminar on project management at the university.","example_th":"เขามีไปประชุมโครงการจัดการโปรเจคที่มหาวิทยาลัย"},{"word":"sensation","pos":"noun","en_meaning":"a particular feeling or impression, especially one that is strong or vivid","th_meaning":"ความรู้สึกหรือความหมายที่เจ็บปวดมากจนกระทั่งผ่อนคลายไม่ได้","example_en":"The artist had a sensation of joy when she saw her painting hanging in the gallery.","example_th":"ศิลปินรู้สึกดีใจเมื่อเห็นภาพของเธอถูกตั้งแสดงในห้องแสดงศิลปะ"},{"word":"sensible","pos":"adjective","en_meaning":"having sound judgment or sense","th_meaning":"ระมัดระวัง หรือ สุจริตใจ","example_en":"He is a sensible person.","example_th":"เขาเป็นคนที่มีความรู้สึกดี"},{"word":"sensitivity","pos":"noun","en_meaning":"the ability to detect or respond to something easily, especially a small amount of it.","th_meaning":"ความมั่นใจในตัวเองหรือการรับรู้ได้ง่ายๆ แม้จะเป็นสิ่งเล็ก ๆ","example_en":"She has a high sensitivity to pain.","example_th":"เธอต้องการที่จะทราบกับความเสียหายด้วยตัวเองอย่างรวดเร็ว"},{"word":"sensory","pos":"adjective","en_meaning":"relating to or involving the senses","th_meaning":"เกี่ยวกับหรือมีส่วนร่วมกับความรู้สึก","example_en":"The restaurant has excellent sensory experiences.","example_th":"ร้านอาหารนี้มีประสบการณ์ด้านความรู้สึกที่ยอดเยี่ยม"},{"word":"separately","pos":"adverb","en_meaning":"one by one; individually","th_meaning":"ต่างๆ, แยกกัน","example_en":"He ate the food separately.","example_th":"เขาทานอาหารแบบต่างๆ"},{"word":"separation","pos":"noun","en_meaning":"the act of parting or the state of being parted; a division into parts or sections.","th_meaning":"การแยกหรือความแตกต่าง","example_en":"The separation of families during wartime is heart-wrenching.","example_th":"การแยกครอบครัวในช่วงสงครามนั้นมีความรู้สึกหดใจ"},{"word":"sexuality","pos":"noun","en_meaning":"the capacity or state of being sexual and the various sexual behaviors that can result from it.","th_meaning":"ความสัมพันธ์ทางเพศและพฤติกรรมเพศที่เกิดขึ้นในระหว่างมีความสัมพันธ์ทางเพศ","example_en":"Exploring one's sexuality is an important part of personal growth.","example_th":"การสำรวจความสัมพันธ์ทางเพศเป็นส่วนสำคัญของการเติบโตของบุคคล"},{"word":"shallow","pos":"adjective","en_meaning":"not deep or profound","th_meaning":"ไม่ลึกหรือไม่มีความลึก","example_en":"The pool is very shallow.","example_th":"พูลน้ำนั้นไม่ลึก"},{"word":"shortly","pos":"adverb","en_meaning":"in a short time; soon; promptly","th_meaning":"ในช่วงเวลาไม่นาน; ตอนนี้หรือเร็วๆนี้","example_en":"We will arrive shortly. We will be there in just a moment.","example_th":"เราจะมาถึงในไม่กี่นาที แล้วก็จะอยู่ตรงนั้น"},{"word":"shuttle","pos":"noun, verb","en_meaning":"a bus or train that takes passengers between two or more places on a regular schedule; to transport something from one place to another in a short period of time.","th_meaning":"รถลื่นขับส่งผู้โดยสารระหว่างสองจุดอย่างประจำ; การขนส่งของสิ่งต่างๆ ไปยังที่หมายในระยะเวลาไม่นาน","example_en":"I need to catch the shuttle at the bus stop.","example_th":"ฉันต้องรอรถลื่นขับส่งที่จุดยนต์บัส"},{"word":"similarity","pos":"noun","en_meaning":"the quality or state of being similar; correspondence in form, structure, or characteristics","th_meaning":"ความคล้ายคลึงกัน","example_en":"There is a high degree of similarity between the two designs.","example_th":"มีระดับความคล้ายคลึงกันที่สูงมากระหว่างการออกแบบสองตัวนี้"},{"word":"simplify","pos":"verb","en_meaning":"to make something simpler or easier to understand","th_meaning":"ทำให้เร็วขึ้น ง่ายต่อการเข้าใจ","example_en":"Simplifying the process will save time.","example_th":"การทำให้กระบวนการดูง่ายขึ้นจะช่วยประหยัดเวลา"},{"word":"simulate","pos":"verb","en_meaning":"to create a representation of something in order to study its behavior","th_meaning":"สร้างการแสดงของบางอย่างเพื่อศึกษาพฤติกรรมของมัน","example_en":"The scientists are simulating the effects of climate change on the environment.","example_th":"นักวิทยาศาสตร์กำลังทำการจำลองผลกระทบของการเปลี่ยนแปลง khí hậuต่อสิ่งแวดล้อม"},{"word":"simulation","pos":"noun","en_meaning":"The imitation or representation of a particular process, situation, or effect","th_meaning":"การจำลองหรือสร้างสถานการณ์ที่คล้ายคลึงกับบางอย่าง","example_en":"He is conducting a simulation to test the new software.","example_th":"เขากำลังทำการจำลองเพื่อทดสอบซอฟต์แวร์ใหม่"},{"word":"simultaneously","pos":"adverb","en_meaning":"at the same time; together","th_meaning":"ในเวลาเดียวกัน พร้อมกัน","example_en":"He can speak English and Spanish simultaneously.","example_th":"เขาสามารถพูดภาษาอังกฤษและฝรั่งเศสได้พร้อมกัน"},{"word":"sin","pos":"noun","en_meaning":"trigonometric function that returns the ratio of the length of the side opposite to an angle in a right-angled triangle to the length of the hypotenuse","th_meaning":"ฟังก์ชันตรีโกณเมทริกส์ที่คืนค่าอัตราส่วนระหว่างความยาวด้านตรงข้ามกับมุมในสามเหลี่ยม직角กับความยาวของเส้นทางตรง","example_en":"The sine of 30 degrees is 0.5.","example_th":"ไซน์ 30 องศามีค่าเท่ากับ 0.5."},{"word":"singular","pos":"noun","en_meaning":"a single person, thing, or object as opposed to a group of several things.","th_meaning":"ตัวเดียว (tua daow)","example_en":"This is a singular experience.","example_th":"นี่คือประสบการณ์ที่เป็นเอก"},{"word":"sketch","pos":"noun","en_meaning":"a quick and simple drawing or outline of something, especially one made to help plan a more detailed piece of work.","th_meaning":"ภาพแบบดงเด่นหรือแผนที่สร้างสรรค์โดยรวดเร็วและง่าย ๆ เพื่อเป็นการวางแผนในการสร้างงานที่ละเอียดรอบคอบขึ้น","example_en":"He made a quick sketch of the building before leaving.","example_th":"เขาวาดภาพแบบดงเด่นของสิ่งก่อสร้างไว้ก่อนออกจากที่"},{"word":"skip","pos":"verb","en_meaning":"to move forward without touching the ground, typically over obstacles or spaces","th_meaning":"ข้ามหรือละเว้น","example_en":"I need to skip some steps in my report.","example_th":"ฉันต้องข้ามบางขั้นตอนในรายงานของฉัน"},{"word":"slab","pos":"noun","en_meaning":"a large piece of something, especially a flat piece of stone or wood used as a floor covering, wall panel, or roofing material.","th_meaning":"แผ่นใหญ่ ใช้ทำพื้นห้องหรือกำแพง","example_en":"The house has new slabs on the roof.","example_th":"บ้านมีแผ่นใหม่เป็นที่มา"},{"word":"slash","pos":"noun, verb","en_meaning":"a sharp instrument with a long handle and a blade used for cutting; to cut with a sharp instrument; an attack in wrestling or boxing that aims at the opponent's head or neck;","th_meaning":"สปัช (สะก์): เครื่องมือที่มีจุดขุยและลูกศรยาว ใช้สำหรับการตัด สปัช: การโจมตีโดยกระแทกศีรษะหรือคอของผู้อื่นในวิธีการแข่งขันเช่น มวย;","example_en":"He used a knife to slash the meat.","example_th":"เขานำสปัชไปใช้ตัดเนื้อสัตว์"},{"word":"slavery","pos":"noun","en_meaning":"A state of being owned and controlled by another person or group, especially a forced labor situation.","th_meaning":"การขังคิดหรือการถูกขับเคลื่อนโดยไม่ได้รับสิทธิเสรีภาพ","example_en":"The practice of slavery has been outlawed in many countries.","example_th":"การขังคิดที่ได้รับกฎหมายลงโทษในหลายๆ ประเทศ"},{"word":"slot","pos":"noun","en_meaning":"A hollow cylinder or tube with a rim, especially one for coins in a machine.","th_meaning":"ฝาที่รับเหรียญหรือสิ่งมีลักษณะคล้ายกันในเครื่องจักร","example_en":"He inserted the coin into the slot to start the machine.","example_th":"เขามีเงินอยู่แล้วเขาใส่เหรียญลงฝาเพื่อเริ่มเครื่อง"},{"word":"snake","pos":"noun","en_meaning":"a long, thin, limbless reptile that is usually elongated and has a flexible body with scales.","th_meaning":"สิ่งมีช่ายอย่างยาวและบางครั้งไม่มีขา ที่ปกติมักจะมีผิวเปลือก","example_en":"The snake coiled itself around the branch before climbing away.","example_th":"สิ่งมีช่ายนี้ซ้อนอยู่รอบข้อไม้ก่อนแล่นคลายออกไป"},{"word":"sneeze","pos":"noun","en_meaning":"the act of expelling air from the nose suddenly and forcibly through a closed mouth, usually as an involuntary response to irritation in the nasal passages.","th_meaning":"สัญญาณเมื่อหายใจดีและไม่สะดวก หรือการออกซิเจนจากจมูกอย่างรวดเร็วและแรง","example_en":"I sneezed when I saw the dust.","example_th":"ฉันตื่นเชิงเวลาเห็นฝุ่น"},{"word":"sniff","pos":"verb","en_meaning":"to smell or detect the odor of something with your nose","th_meaning":"กลิ่น, ตรวจจับกลิ่น","example_en":"I need to sniff the air to see if there's any smoke.","example_th":"ฉันต้องกลิ่นอากาศดูว่ามีควันไหม"},{"word":"socialize","pos":"verb","en_meaning":"to interact with other people in a friendly and informal way, often for fun or pleasure","th_meaning":"การสื่อสารหรือเข้ากันใกล้กับคนอื่นในรูปแบบที่เป็นอย่างไร้ความเครียดและไม่เป็นทางการ เพื่อความสนุกหรือเพื่อนำไปใช้ประโยชน์","example_en":"We like to socialize with friends and family.","example_th":"เราชอบจะสื่อสารหรือเข้ากันใกล้กับเพื่อนและครอบครัวของเรา"},{"word":"socially","pos":"adverb","en_meaning":"in a way that involves people or society; relating to people or society","th_meaning":"อย่างสังคม อันเชิงสังคม","example_en":"She socializes with her friends every weekend.","example_th":"เธอไปเยี่ยมกับเพื่อนๆ ในวันเสาร์และอาทิตย์"},{"word":"sodium","pos":"noun","en_meaning":"A soft, silvery-white metallic element with a low melting point.","th_meaning":"ธาตุน้ำย่อย","example_en":"Sodium is essential for the functioning of nerve cells in the body.","example_th":"น้ำย่อยจำเป็นสำหรับการทำงานของเซลล์ประสาทในร่างกาย"},{"word":"soluble","pos":"adjective","en_meaning":"able to be dissolved; capable of being dissolved in a liquid","th_meaning":"ที่สามารถละลายในน้ำได้","example_en":"Sugar is soluble in water.","example_th":"น้ำตาลละลายในน้ำได้"},{"word":"solute","pos":"noun","en_meaning":"a substance that is dissolved in a solvent to form a solution.","th_meaning":"สิ่งที่ถูกละลายในส่วนผสมในการทำน้ำมันให้กลายเป็นโซลูชัน","example_en":"The salt dissolves easily in water.","example_th":"เกะยังสามารถละลายได้ง่ายในน้ำ"},{"word":"solvent","pos":"noun","en_meaning":"A liquid that can dissolve other substances","th_meaning":"สารที่สามารถละลายสิ่งอื่นได้","example_en":"Water is a universal solvent.","example_th":"น้ำเป็นสกัดทั่วไป"},{"word":"sometime","pos":"adverb","en_meaning":"at some time; at times","th_meaning":"บางครั้ง; อยู่ในเวลาหนึ่ง","example_en":"I'll visit you sometime.","example_th":"ฉันจะมาเยือนคุณในบางครั้ง"},{"word":"sophisticate","pos":"verb","en_meaning":"to make something more complex or complicated","th_meaning":"ให้เข้าใจยากขึ้นหรือซับซ้อนขึ้น","example_en":"We need to sophisticate our arguments if we want them to be taken seriously.","example_th":"เราต้องพัฒนาการอ้างอิงของเราให้มีความซับซ้อนมากขึ้นเพื่อให้นักฟังจะเชื่อถือและสนใจ"},{"word":"span","pos":"verb","en_meaning":"to extend or cover; to enclose","th_meaning":"ครอบคลุม","example_en":"He spanned the distance with a single jump.","example_th":"เขายกระโดดครอบคลุมระยะทางนั้นๆ"},{"word":"spatial","pos":"adjective","en_meaning":"relating to or involving space; three-dimensional","th_meaning":"เกี่ยวกับหรือมีอยู่ในสามมิติ","example_en":"The room is very spacious.","example_th":"ห้องนั้งมีขนาดใหญ่"},{"word":"specialty","pos":"noun","en_meaning":"A particular skill or field of knowledge; something that one is especially good at.","th_meaning":"ความชำนาญเฉพาะตัว หรือสาขาที่มีความเชี่ยวชาญในด้านนั้นๆ","example_en":"She has a specialty in fine dining.","example_th":"เธอมีความชำนาญเฉพาะทางในการทำอาหารสุดยอด"},{"word":"specification","pos":"noun","en_meaning":"A detailed set of rules or conditions that must be met, especially for a particular product or service.","th_meaning":"การตั้งค่าหรือคำสั่งที่ระบุรายละเอียดเพื่อให้แน่นอนเกี่ยวกับการผลิตสินค้าหรือบริการ","example_en":"The product specification must be followed closely.","example_th":"ต้องปฏิบัติตามคำกำหนดค่าอย่างใกล้ชิด"},{"word":"specimen","pos":"noun","en_meaning":"an individual or a sample taken for inspection, examination, or study.","th_meaning":"ตัวอย่าง หรือ เส้นย่อ","example_en":"The doctor took several specimens for analysis.","example_th":"แพทย์ได้รับตัวอย่างหลายอย่างเพื่อวิเคราะห์"},{"word":"spectrum","pos":"noun","en_meaning":"a range of different things or qualities.","th_meaning":"スペクトラム (spektrəm) หมายถึงช่วงความหลากหลายของสิ่งต่าง ๆ หรือคุณลักษณะต่าง ๆ。","example_en":"The visible spectrum ranges from red to violet.","example_th":"สเปกตรัมที่เห็นได้ครอบคลุมจากแดงไปยังviolet"},{"word":"sperm","pos":"noun","en_meaning":"a microscopic cell produced by the male reproductive organs and capable of fusing with an egg to form a zygote","th_meaning":"สเปรมน้ำนมคุณต์","example_en":"The man provided sperm for in vitro fertilization.","example_th":"ผู้ชายให้สเปรมสำหรับการผสมพันธุ์ด้วยวิธีอีน-vitrัฟี่ลิซ่า"},{"word":"sphere","pos":"noun","en_meaning":"a round, ball-shaped object or space","th_meaning":"ทรงกลม, สล้าง, วงกลม","example_en":"The Earth is an oblate sphere.","example_th":"โลกเป็นทรงกลมที่สั่นที่ข้อศรีษะ"},{"word":"splice","pos":"verb","en_meaning":"to join or connect (parts) by cutting and joining them together","th_meaning":"ต่อหรือเชื่อมกับส่วนต่างๆด้วยการเลือดและจับกุดตัดด้วยกัน","example_en":"The scientists spliced the DNA strands to create a new virus.","example_th":"นักวิทยาศาสตร์จะต่อหรือเชื่อมกับสายDNAด้วยการเลือดและจับกุดตัดด้วยกันเพื่อสร้างไวรัสใหม่"},{"word":"sponsorship","pos":"noun","en_meaning":"the act of providing financial support for a cause, organization, or event","th_meaning":"การสนับสนุนในลักษณะเงินเพื่อให้กับกิจกรรมหรือองค์กร","example_en":"The company's sponsorship of the charity event raised funds for local schools.","example_th":"การสนับสนุนของบริษัทในการจัดงานสหภาพช่วยเหลือโรงเรียนในพื้นที่ใกล้เคียง"},{"word":"spontaneous","pos":"adjective","en_meaning":"happening without previous arrangement or planning; natural and unexpected","th_meaning":"เกิดขึ้นโดยไม่มีการวางแผนหรือเตรียมตัวให้นำไปอย่างสม่ำเสมอ","example_en":"He had a spontaneous idea for the party.","example_th":"เขามีไอเดียเพื่อปาร์ที่ไม่มีการวางแผนล่วงหน้า"},{"word":"spray","pos":"noun, verb","en_meaning":"A device for propelling a liquid or gas through the air in fine droplets.","th_meaning":"พัดลมหรือขลี่","example_en":"He used a spray to clean his car.","example_th":"เขาใช้พัดลมในการทำความสะอาดรถของเขานั่ง"},{"word":"stabilize","pos":"verb","en_meaning":"to make or become stable, firm, or secure","th_meaning":"ทำให้คงที่หรือรัดกุม","example_en":"The government is working to stabilize the economy.","example_th":" الحكومةกำลังทำงานเพื่อให้เศรษฐกิจสงบและมั่นคง"},{"word":"stack","pos":"noun, verb","en_meaning":"a collection of items stored one on top of another; to place something on top of a pile or collection.","th_meaning":" chồngกัน (ที่เก็บรวบรวมสิ่งมีลักษณะคล้ายคลึงกันหรือไม่คล้องกัน)","example_en":"The stack of books is too tall. He will stack the plates on top of each other.","example_th":"กองหนังสือตัวนี้ยาวเกินไป จับมือจะวางที่มาพร้อมกัน"},{"word":"stadium","pos":"noun","en_meaning":"a large sports hall or ground, usually covered and with a roof.","th_meaning":"สนามกีฬาหรือพื้นที่แข่งขันกีฬามassive covered area for sports.","example_en":"The city has built a new stadium to host the upcoming football tournament.","example_th":"เมืองได้สร้างสนามกีฬานำใหม่เพื่อจัดการแข่งขันฟุตบอลฤดูกาลนี้"},{"word":"stance","pos":"noun","en_meaning":"A position or attitude, especially in relation to a particular issue or cause.","th_meaning":"การณ์หรือสถานะทางอารมณ์ในเรื่องหรือกิจกรรมต่างๆ","example_en":"He took a firm stance on the matter.","example_th":"เขาจะยืนยันที่เขามีใจว่าเรื่องนี้มันสำคัญมาก"},{"word":"standardize","pos":"verb","en_meaning":"To make or become uniform, especially in form, function, or quality.","th_meaning":"ทำให้เหมือนกันหรือตรงตามมาตรฐาน","example_en":"We need to standardize our procedures for better efficiency.","example_th":"เราต้องการที่จะปรับปรุงกระบวนการของเรามาให้มีความเดียวกันเพื่อเพิ่มประสิทธิภาพ"},{"word":"static","pos":"noun, adjective","en_meaning":"unchanging; fixed in nature or position; not moving or changing; (noun) a variable that retains its value between function calls","th_meaning":"คงที่; ไม่เปลี่ยนแปลง; มีค่าคงที่ระหว่างการเรียกใช้งานฟังก์ชัน","example_en":"The price is static.","example_th":"ราคาไม่เปลี่ยนแปลง"},{"word":"statistical","pos":"adjective","en_meaning":"relating to the use of statistics or statistical methods.","th_meaning":"เกี่ยวกับการใช้สถิติหรือวิธีการสถิติ","example_en":"The data is statistically significant.","example_th":"ข้อมูลนั้นมีค่าสถิติอย่างสำคัญ"},{"word":"statistically","pos":"adjective, adverb","en_meaning":"in a statistical manner","th_meaning":"ตามสถิติ","example_en":"The data was analyzed statistically.","example_th":"ข้อมูลถูกวิเคราะห์ตามสถิติ"},{"word":"statistics","pos":"noun","en_meaning":"the science of collecting, analyzing, interpreting, and presenting data","th_meaning":"การวิเคราะห์และรายงานข้อมูล","example_en":"The study of statistics involves data analysis.","example_th":"การศึกษาสถิตินั้นก็เกี่ยวกับการวิเคราะห์ข้อมูล"},{"word":"stereotype","pos":"noun","en_meaning":"an oversimplified and often inaccurate generalization about a particular group of people","th_meaning":"คำศัพท์ที่ใช้สรุปกลุ่มคนในรูปแบบที่อ่อนโยนและไม่มีความแม่นยำ","example_en":"He made a stereotype of all中国人 as being poor.","example_th":"เขามาสรุปว่าทุกคนจากจีนเป็นคนจนจนยาก"},{"word":"stimulus","pos":"noun","en_meaning":"a thing that causes a change or reaction, especially in the body or brain.","th_meaning":"สิ่งที่กระตุ้นหรือทำให้เกิดการเปลี่ยนแปลงหรือตอบสนอง","example_en":"The pain was a strong stimulus for her recovery.","example_th":"ความเจ็บป่วยเป็นสิ่งกระตุ้นที่แรงในการฟื้นฟูของเธอ"},{"word":"straightforward","pos":"adjective","en_meaning":"easy to understand or follow; not complicated or difficult.","th_meaning":"เข้าใจง่าย ๆ หรือไม่ซับซ้อน","example_en":"The instructions were straightforward and easy to follow.","example_th":"คำแนะนำนี้เข้าใจง่ายและไม่ซับซ้อน"},{"word":"strand","pos":"noun","en_meaning":"a long, thin piece of something, especially hair or a rope","th_meaning":"หาง่าย หรือ ส่วนเล็กๆของบางอย่าง เช่น กิ่งส้น","example_en":"The fisherman used a thick fishing line to strand his boat on the beach.","example_th":"นักประมงใช้สายตกปลาที่หนาเพื่อขับเรือของเขาไปยังดินทะเล"},{"word":"strategic","pos":"adjective","en_meaning":"relating to or involving careful planning and thought; calculated","th_meaning":"ที่มีการวางแผนและคิดอย่างรอบคอบ","example_en":"Strategic thinking involves considering all options before making a decision.","example_th":"การคิดที่เป็นการวางแผนต้องพิจารณาตัวเลือกทั้งหมดก่อนการตัดสินใจ"},{"word":"strictly","pos":"adverb","en_meaning":"in a strict manner or to a great extent; with severity; rigorously; emphatically","th_meaning":"อย่างเคร่งครัดหรือในระดับที่มากที่สุด","example_en":"He must be strictly honest.","example_th":"เขาต้องการให้เขาถูกใจอย่างเคร่งครัด"},{"word":"stripe","pos":"noun, verb","en_meaning":"a narrow band or line; to mark with stripes.","th_meaning":"เส้นบุนได้หรือเส้นรูปคลื่น;","example_en":"The road was marked with white stripes.","example_th":"ถนนถูกทำลายด้วยเส้นต่อสู้"},{"word":"sub","pos":"noun","en_meaning":"a person who works on a boat or ship as part of its crew; an underwater device for breathing when you are below the water's surface.","th_meaning":"คนงานบนเรือหรือเรือล่องใต้ที่ร่วมทำงานกับเทียนของเรือ","example_en":"He works as a sub on a fishing boat.","example_th":"เขารากับตัวงานใต้น้ำ"},{"word":"subjective","pos":"adjective","en_meaning":"based on opinion or personal feelings rather than facts or reality; open to interpretation","th_meaning":"ที่มีความเจาะจง, มีความส่วนตัว, มีความผิดหวัง","example_en":"Opinions are subjective.","example_th":"ความคิดเห็นเป็นเรื่องของความเจาะจง"},{"word":"subset","pos":"noun","en_meaning":"a part or portion of something, especially a smaller group within a larger one.","th_meaning":"กลุ่มย่อย หรือ ส่วนหนึ่งของบางสิ่งอย่างใหญ่กว่า","example_en":"The subset of students who passed the exam is larger than the one who failed.","example_th":"กลุ่มนักเรียนที่ผ่านการสอบมากกว่ากลุ่มนักเรียนที่ไม่ผ่าน"},{"word":"substitution","pos":"noun","en_meaning":"the act of replacing one word or expression with another, or the replacement itself.","th_meaning":"การเปลี่ยนหรือแทนที่คำหรือพจนานุกรมด้วยคำอื่น","example_en":"The teacher asked for a substitution for John because he was absent.","example_th":"ครูขอคนทดแทนให้กับจอห์น เพราะว่าเขาขาดเรียน"},{"word":"substrate","pos":"noun","en_meaning":"a material upon which something is fixed or supported; a base or foundation","th_meaning":"พื้นฐานหรือรองพื้นที่ ที่อยู่ใต้และสร้างแรงจูงใจให้กับสิ่งที่ติดมาอยู่ด้านบน","example_en":"The rock formation serves as a good substrate for plant growth.","example_th":"การรังกับน้ำมันสามารถทำให้เกิดการเจริญเติบโตของพืชได้ดีในสภาวะที่เหมาะสม"},{"word":"subtle","pos":"adjective","en_meaning":"difficult to detect or understand; delicate","th_meaning":"ละเอียดอ่อน อ่อนแอ","example_en":"The fragrance was so subtle that no one noticed it.","example_th":"กลิ่นกลัวกับคนไม่มีตาแคลน"},{"word":"subtract","pos":"verb","en_meaning":"to remove or reduce a quantity from another quantity","th_meaning":"ตัดหรือหักจำนวนหนึ่งจากจำนวนอื่น","example_en":"I need to subtract 5 from 10.","example_th":"ฉันต้องหักรายว่าต้องการจะลบ 5 จาก 10"},{"word":"sufficiently","pos":"adverb","en_meaning":"to a sufficient extent; adequately; fully","th_meaning":"เพียงพอ ถึงตามที่ต้องการ","example_en":"He ate sufficiently for the day.","example_th":"เขานำรับประทานอาหารให้เพียงพอทั่ววัน"},{"word":"suicide","pos":"noun","en_meaning":"the act of taking one's own life, especially with intention","th_meaning":"การฆ่าตัวตายเอง ซึ่งมีใจตั้งใจทำลายตนเอง","example_en":"He committed suicide after a long period of mental illness.","example_th":"เขากilledตัวตายหลังจากเป็นโรคจิตในระยะยาว"},{"word":"super","pos":"adjective","en_meaning":"extremely good or great","th_meaning":"ดีมากหรือยอดเยี่ยม","example_en":"He is super fast!","example_th":"เขานั่งแต่นั้นเร็วกว่าฉันค่ะ"},{"word":"superior","pos":"adjective","en_meaning":"higher in quality or excellence","th_meaning":"ดีกว่า, ที่สุด","example_en":"She is a superior student.","example_th":"เธอเป็นนักเรียนยอดเยี่ยม"},{"word":"supposedly","pos":"adverb","en_meaning":"allegedly; purportedly","th_meaning":"ถูกกล่าวว่า (but not necessarily true)","example_en":"He was supposedly a millionaire.","example_th":"เขานั้นถูกกล่าวว่าเป็นเศรษฐกิจพุทธนาการ"},{"word":"surgeon","pos":"noun","en_meaning":"a doctor who performs surgery","th_meaning":"แพทย์ผู้ปฎิบัติต้นทุนหรือผ่าตัด","example_en":"He is a highly skilled surgeon.","example_th":"เขารักษาผู้ป่วยอย่างมืออาชีพ"},{"word":"surgical","pos":"adjective","en_meaning":"relating to or involving operations performed on living tissue by a surgeon, especially in hospitals","th_meaning":"เกี่ยวกับการทำหัตถด่วนหรือแพทย์ที่ขึ้นเครื่องมือและอุปกรณ์ทางการแพทย์ในการรักษาผู้ป่วย","example_en":"The patient will undergo a surgical procedure to remove the tumor.","example_th":"คนไข้จะต้องผ่านการทำหัตถด่วนเพื่อลบเนื้อเยื่อที่ไม่ปกติ"},{"word":"surplus","pos":"noun","en_meaning":"an excess of something above the normal, expected, or required amount","th_meaning":"ส่วนเกิน","example_en":"There is a surplus of apples in the market.","example_th":"ตลาดมีแอปเปิ้ลมากเกินไป"},{"word":"susceptible","pos":"adjective","en_meaning":"easily affected or harmed by something, especially a disease or negative influence","th_meaning":"สามารถเป็นตัวของโรคหรือสิ่งที่มีผลบวกกับเรื่องราวได้","example_en":"She is susceptible to illnesses.","example_th":"เธอก่อให้เกิดการระบาดของโรคได้"},{"word":"sustainable","pos":"adjective","en_meaning":"able to be maintained at a steady rate without depleting resources or causing significant harm to the environment","th_meaning":"สามารถรักษาได้ต่อเนื่องโดยไม่ทำลายทรัพยากรหรือส่งผลกระทบต่อสิ่งแวดล้อมมาก","example_en":"The company is committed to sustainable practices.","example_th":"บริษัทมีการละเมิดความรักษาได้ต่อเนื่อง"},{"word":"swap","pos":"verb","en_meaning":"to exchange or replace one thing for another; to switch positions with someone else","th_meaning":"แลกเปลี่ยนหรือแทนที่สิ่งหนึ่งด้วยสิ่งอื่น","example_en":"I need to swap my shirt for a sweater.","example_th":"ฉันต้องการจะแลกเสื้อของฉันให้เป็นหมวก"},{"word":"swell","pos":"noun, verb","en_meaning":"to rise suddenly or violently; to be large or impressive","th_meaning":"ทวมขึ้นอย่างรุนแรงหรือเร็วที่สุด หรือ สิ่งที่ใหญ่โตหรือสวยงามมาก","example_en":"The tide will soon swell.","example_th":"ลมจะก้าวนำความสูงขึ้นในช่วงเวลาหนึ่ง"},{"word":"sword","pos":"noun","en_meaning":"A long weapon with a sharp blade, typically held in one hand and used for cutting or thrusting.","th_meaning":"หน้ากั้ว (napha ku)","example_en":"He unsheathed his sword to defend himself.","example_th":"เขากิ่งขันดาษหน้ากั้วของเขาเพื่อป้องกันตัวเอง"},{"word":"syllable","pos":"noun","en_meaning":"A unit of sound in a word, typically formed by one vowel with or without surrounding consonants.","th_meaning":"สระ (sa) - ส่วนหนึ่งของคำที่ประกอบด้วยตัวพยัญชนะหรือเสียงที่มีความสำคัญในการสร้างความหมายและความถูกต้องของคำ","example_en":"The word 'university' has five syllables.","example_th":"คำว่า 'มหาวิทยาลัย' มีสระ 5 ส่วน"},{"word":"syllabus","pos":"noun","en_meaning":"a list or outline of the subjects or topics to be taught in a particular course, especially at an educational institution.","th_meaning":"รายการหรือโครงสร้างเนื้อหาที่จะสอนในหลักสูตรเฉพาะหรือสาขาเฉพาะ เช่น ในโรงเรียน","example_en":"He has prepared a detailed syllabus for the upcoming exam.","example_th":"เขานำเสนอแผนการสอนที่ละเอียดอย่างรอบคอบสำหรับการสอบครั้งถัดไป"},{"word":"symbolic","pos":"adjective","en_meaning":"serving to represent something else or standing for something","th_meaning":"หมายถึงของที่ใช้แทนหรือคุณสมบัติของสิ่งอื่น","example_en":"The dove is a symbolic bird.","example_th":"นกพีชเป็นของมหัศจรรย์"},{"word":"syndrome","pos":"noun","en_meaning":"a set of symptoms that consistently occur together and are associated with a particular condition or disease","th_meaning":"อาการกลุ่มที่เกิดขึ้นร่วมกันอย่างสม่ำเสมอและเกี่ยวข้องกับโรคหรืออันตรายบางอย่าง","example_en":"The patient was diagnosed with a rare syndrome after years of testing.","example_th":"ผู้ป่วยถูกวินิจฉัยเป็นภาวะทางด้านการแพทย์ที่เลือกยากหลังจากการทดลองหลายปี"},{"word":"syntactic","pos":"adjective","en_meaning":"relating to or involving the grammar of a language","th_meaning":"เกี่ยวกับหรือมีส่วนเกี่ยวข้องกับภาษาและโครงสร้างไวยากรณ์","example_en":"The sentence is syntactically correct.","example_th":"ประโยคนั้นเป็นประโยคที่ถูกต้องตามกฎของภาษา"},{"word":"syntax","pos":"noun","en_meaning":"the proper or regular form of expression or construction in a language; the set of rules governing the formation and combination of words and phrases into sentences.","th_meaning":"รูปแบบหรือโครงสร้างที่ถูกต้องในการใช้ภาษา เช่น การนำคำสั่งและประโยคมาส่งเสริมให้มีความหมาย","example_en":"The syntax of the programming language is correct.","example_th":"ไวยากรณ์ของภาษาโปรแกรมมิ่งนี้ถูกต้อง"},{"word":"synthesis","pos":"noun","en_meaning":"the combining of separate elements or parts to form a unified whole","th_meaning":"การผสมผสานหรือทำให้เป็นสิ่งเดียว","example_en":"The synthesis of the project took several months.","example_th":"การสังเคราะห์โครงการนี้ใช้เวลาหลายเดือน"},{"word":"synthetic","pos":"adjective","en_meaning":"made or produced by artificial means; not natural.","th_meaning":"ผลิตด้วยวิธีการจำลองหรือสร้างขึ้นเอง ไม่ใช่ธรรมชาติ","example_en":"The fabric is synthetic, made from man-made fibers.","example_th":"ผ้าที่ทำจากใยปvc เป็นผลิตภัณฑ์ที่ผสมผสานและประกอบด้วยสารเคมี"},{"word":"systematic","pos":"adjective","en_meaning":"methodical and logical in approach and execution.","th_meaning":"มีระบบและเป็นไปตามลำดับ","example_en":"She approaches her work systematically.","example_th":"เธอทำงานอย่างมีระบบ"},{"word":"tech","pos":"noun","en_meaning":"short for technology, the field of using and applying scientific knowledge to create tools, machines, processes, or systems.","th_meaning":"ชิ้นส่วนหรือองค์ประกอบของเทคโนโลยี","example_en":"She is interested in learning more about tech.","example_th":"เธอต้องการเรียนรู้มากขึ้นเกี่ยวกับทีก"},{"word":"technically","pos":"adjective, adverb","en_meaning":"in a precise or specialized sense; in reality or fact, not necessarily in appearance; using technical terms.","th_meaning":"ในมุมมองทางเทคนิค; ในความจริง หรือไม่จำเป็นต้องอยู่ในรูปแบบที่เห็นได้","example_en":"He is technically a doctor, but he doesn't practice medicine.","example_th":"เขามีความเชี่ยวชาญทางเทคนิคในการแพทย์ แต่ไม่มีการปฏิบัติงานในด้านนี้"},{"word":"temporal","pos":"adjective","en_meaning":"existing or happening over a period of time; relating to time","th_meaning":"เกี่ยวกับเวลา (keai)","example_en":"The meeting will be held at a temporal location.","example_th":"ประชุมจะจัดที่สถานที่มีการเปลี่ยนแปลงตามเวลา"},{"word":"tempt","pos":"verb","en_meaning":"to entice or allure someone by offering something desirable; to try to persuade someone to do something, especially something bad.","th_meaning":"ให้เรียกคุณทำบางสิ่งที่ไม่ดีหรือเป็นไปไม่ได้","example_en":"The offer of a bribe tempted him to accept it.","example_th":"การเสนอเงินครัวทำให้เขารับมัน"},{"word":"tense","pos":"noun","en_meaning":"The state of being in a particular time, especially with reference to the past, present, or future.","th_meaning":"เวลาในแต่ละสถานะ เช่น อดีต, ปัจจุบัน, อนาคต","example_en":"She is always tense during important interviews.","example_th":"เธอรู้สึกเครียดกับการ entrevิวนานๆ"},{"word":"terminal","pos":"noun","en_meaning":"a device that connects to a computer system and allows the user to interact with it using keyboard and screen.","th_meaning":"อุปกรณ์ที่เชื่อมต่อกับระบบคอมพิวเตอร์และให้ผู้ใช้งานสามารถโต้ตอบกับมันได้ผ่านหน้าจอและแป้นภายนอก","example_en":"He used a terminal to access the server.","example_th":"เขาร่วงการอ้างอิงถึงเซิร์ฟเวอร์โดยใช้อุปกรณ์ที่เชื่อมต่อกับคอมพิวเตอร์"},{"word":"terminology","pos":"noun","en_meaning":"a set of terms or words used in a particular field or profession; a specialized vocabulary","th_meaning":"คำศัพท์เฉพาะทางหรือภาษาอุตสาหกรรม เช่น ภาษาเทคนิคในวงการคอมพิวเตอร์","example_en":"The terminology used in the industry is often complex and difficult to understand.","example_th":"ภาษาเฉพาะทางในวงการนี้มักจะซับซ้อนและยากต่อการเข้าใจ"},{"word":"terribly","pos":"adverb","en_meaning":"extremely badly; in a very bad way","th_meaning":"อย่างไร้คุณภาพที่สุด; ในรูปแบบที่ด้อยที่สุด","example_en":"He was terribly hurt.","example_th":"เขาได้รับบาดเจ็บอย่างหนักมาก."},{"word":"textbook","pos":"noun","en_meaning":"a book used as a principal source of information or for study in a school or college course.","th_meaning":"หนังสือเรียน","example_en":"She uses her textbook to prepare for the exam.","example_th":"เธอใช้หนังสือเรียนเพื่อเตรียมตัวสำหรับการสอบ"},{"word":"theorem","pos":"noun","en_meaning":"a statement or proposition that is demonstrated to be true by a chain of reasoning and evidence.","th_meaning":"สิ่งที่ถูกพิสูจน์เป็นจริงโดยการตรวจสอบและอ้างอิงข้อมูลต่าง ๆ","example_en":"The Pythagorean theorem states that in a right-angled triangle, the square of the length of the hypotenuse is equal to the sum of the squares of the lengths of the other two sides.","example_th":"ทฤษฎีบทปีแง่ของพีจาร์กัสบอกว่าในสามเหลี่ยมมุมฉาก กำลังของความยาวด้านตรงข้ามมุมฉากเท่ากับผลบวกของกำลังของความยาวด้านอื่นสองคู่"},{"word":"theorist","pos":"noun","en_meaning":"a person who formulates theories or hypotheses","th_meaning":"ผู้ทฤษฎีหรือผู้สร้างแนวคิด","example_en":"He is a renowned economist and one of the leading theorists in his field.","example_th":"เขาเป็นเศรษฐศาสตร์ที่โด่งดังและเป็นหนึ่งในนักทฤษฎีที่อยู่ชั้นนำในกลุ่มงาน"},{"word":"thereby","pos":"adverb","en_meaning":"in that way; consequently","th_meaning":"ดังนั้น","example_en":"I will do it therefore.","example_th":"ฉันจะทำต่อไปนี้ดังนั้น"},{"word":"thermal","pos":"adjective","en_meaning":"relating to heat or temperature","th_meaning":"ที่เกี่ยวกับความร้อนหรือ Nhi้วหนัก","example_en":"The thermal power plant is a large facility that generates electricity from heat.","example_th":"โรงงานพลังงานดูโรก๊าซเป็นสถานที่ขนาดใหญ่ที่สร้างไฟฟ้าจากความร้อนของแก๊ส"},{"word":"thesis","pos":"noun","en_meaning":"a formal written work submitted to a university or college as part of the requirements for an academic degree.","th_meaning":"รายงานวิจัยหรืองานส่วนบุคคลที่นำเสนอให้แก่มหาวิทยาลัยหรือวิทยาลัยเพื่อรับรีวิวและตรวจทานเพื่อให้ได้รับการศึกษาทางด้านวิชาการ","example_en":"He submitted his thesis on time.","example_th":"เขานำรายงานวิจัยของเขามาส่งตรงเวลา"},{"word":"thickness","pos":"noun","en_meaning":"the quality or state of being thick","th_meaning":"ความหนา","example_en":"The wall has a good thickness.","example_th":"กำแพงมีความหนาดี"},{"word":"thread","pos":"noun","en_meaning":"a long, thin filament or strand","th_meaning":"เส้นใย","example_en":"She spun the yarn into a strong thread.","example_th":"เธอจั่วข้าวผงให้เป็นเส้นใยที่แข็งแรง"},{"word":"threshold","pos":"noun","en_meaning":"the limit below which something does not work or happens, a boundary that separates two things, the minimum level of quality or performance necessary to achieve success.","th_meaning":"เกณฑ์, ระดับ, การกำหนดเป้าหมายหรือค่าขั้นต่ำที่จำเป็น","example_en":"The temperature needs to be above the freezing threshold before we can go outside.","example_th":"อุณหภูมิต้องสูงกว่าระดับจุดแข็งก่อนที่เราจะสามารถออกไปนอกบ้านได้"},{"word":"thumb","pos":"noun","en_meaning":"the bone in the first joint of a finger, especially that on the little finger","th_meaning":"องแก้ม (ong gaam)","example_en":"He gave her a thumbs up.","example_th":"เขาก็โอนให้เธอได้เป็นที่น่าเชื่อถือ"},{"word":"tolerance","pos":"noun","en_meaning":"the ability or willingness to tolerate something that you do not like or believe in","th_meaning":"ความรับฟัง ความอดทนในเรื่องที่ไม่ชอบหรือคิดเห็นต่างกัน","example_en":"He has a lot of tolerance for people's differences.","example_th":"เขามีความรับฟังสำหรับความแตกต่างของคนอื่น"},{"word":"ton","pos":"noun","en_meaning":"a unit of weight or mass equal to 100 kilograms","th_meaning":"ตัน (tán) - หน่วยน้ำหนักหรือมวลเท่ากับ 100 กิโลกรัม","example_en":"The elephant weighs about three tons.","example_th":"หมูดีบีน้ำหนักประมาณสามตัน"},{"word":"toxic","pos":"adjective","en_meaning":"producing or containing harmful substances, especially in the environment.","th_meaning":"มีสารเคมีที่เป็นอันตรายหรือทำลายสิ่งแวดล้อม","example_en":"The water is toxic and should not be drunk.","example_th":"น้ำมีสารเคมีอันตรายอยู่ในน้ำดังนั้นควรดื่มไม่"},{"word":"tract","pos":"noun","en_meaning":"a long piece of land or a piece of paper with printed matter","th_meaning":"ดินที่ยาวหรือกระดาษที่มีการพิมพ์ข้อความ","example_en":"He bought a tract of land near the city.","example_th":"เขากดินที่ยาวอยู่ใกล้กับเมือง"},{"word":"traditionally","pos":"adverb","en_meaning":"in a usual or customary way; as is usually done.","th_meaning":"ในวิธีที่เป็นปกติหรือตามความคิดเห็นทั่วไป","example_en":"We have always traditionally celebrated Christmas with a big dinner and family gatherings.","example_th":"เราได้รับประทานอาหารที่盛大และจัดการในครอบครัวในปีหลังนี้"},{"word":"trait","pos":"noun","en_meaning":"a distinguishing feature or quality","th_meaning":"คุณสมบัติหรือลักษณะเฉพาะ","example_en":"He has a rare genetic trait.","example_th":"เขามีลักษณะพิเศษที่หายไป"},{"word":"trajectory","pos":"noun","en_meaning":"the path that an object follows through space as it moves from one point to another","th_meaning":"ทางที่วัตถุหรืออิสระเคลื่อนที่ตามไปอยู่ในปริภูมิ","example_en":"The satellite's trajectory needs to be carefully calculated.","example_th":"การคำนวณทางของดาวเทียมต้องทำให้แม่นยำ"},{"word":"trans","pos":"verb","en_meaning":"to transfer or transmit","th_meaning":"ในการส่งหรือติดต่อข้อมูลจากที่หนึ่งไปยังที่อื่น","example_en":"The data needs to be transferred to the new server.","example_th":"ข้อมูลต้องถูกส่งไปยังเซิร์ฟเวอร์ใหม่"},{"word":"transaction","pos":"noun","en_meaning":"a commercial or financial exchange between two parties","th_meaning":"การทำธุรกรรมทางการเงินหรือการซื้อขายระหว่างสองฝ่าย","example_en":"The transaction was completed successfully.","example_th":"ธุรกรรมนี้ได้ดำเนินการสำเร็จแล้ว"},{"word":"transcribe","pos":"verb","en_meaning":"to convert spoken or recorded speech into writing, especially in order to make a verbatim record of it.","th_meaning":"แปลงเสียงที่ได้รับมาให้อยู่ในรูปแบบข้อความ เช่น การแปลงการสื่อสารจากภาษาอื่นเป็นภาษาไทย","example_en":"The court will transcribe the proceedings and publish them online.","example_th":"ศาลจะทำการแปลงการประชุมและเผยแพร่ผลประชุมออนไลน์"},{"word":"transcription","pos":"noun","en_meaning":"the act of recording spoken or written language by writing it down, typically from an audio or video recording.","th_meaning":"การบันทึกข้อความหรือเสียงจากทางพูดหรือเขียนอย่างถูกต้องและครบถ้วน","example_en":"The doctor asked for the patient's medical transcription.","example_th":"แพทย์ขอให้ผู้ป่วยให้การบันทึกข้อมูลสุขภาพ"},{"word":"transformation","pos":"noun","en_meaning":"a significant change in the structure, function, or appearance of something.","th_meaning":"การเปลี่ยนแปลงอย่างเห็นด้วยทางโครงสร้าง ฟังก์ชัน หรือรูปทรงของสิ่งอย่าง","example_en":"The country has undergone a significant transformation in recent years.","example_th":"ประเทศเคยผ่านการเปลี่ยนแปลงที่สำคัญในหลายปีที่แล้ว"},{"word":"translation","pos":"noun","en_meaning":"the expression or rendering of a text in another language, especially the English rendering of something originally written in another language","th_meaning":"การแปลหรือการแสดงผลของข้อความในภาษาอื่นเป็นภาษาไทย","example_en":"The book contains a translation of Shakespeare's plays.","example_th":"หนังสือมีการแปลของทีมงานของอีเล็กทรอนิกส์"},{"word":"transmission","pos":"noun","en_meaning":"the act of transferring something from one place or person to another, the process of moving or transporting something, the medium by which energy is transferred in a machine, especially in a car or other vehicle.","th_meaning":"การส่งหรือส่งผ่าน, กระบวนการที่ใช้ในการขนส่งหรือย้ายอุปกรณ์ของคันขับขี่","example_en":"The transmission of knowledge is essential for the development of a society. The car has an automatic transmission.","example_th":"การส่งความรู้นี้จำเป็นสำหรับการพัฒนาสังคม การใช้เครื่องยนต์มืออาวุธที่มีระบบอัตโนมัติ"},{"word":"transmit","pos":"verb","en_meaning":"to send or convey something from one place to another, especially by radio, television, or internet.","th_meaning":"ส่งหรือเผยแพร่สิ่งต่าง ๆ ไปยังสถานที่อื่น โดยปกติผ่านทางการส่งข้อมูลเช่น สัญญาณวิทยุหรือเว็บไซต์","example_en":"The radio station will transmit the news to all areas.","example_th":"สถานีริบเรือนจะส่งข่าวออกไปทั่วประเทศ"},{"word":"transparency","pos":"noun","en_meaning":"the quality or state of being clear and free from obstruction, especially in the degree to which something can be seen through; openness or honesty in communication","th_meaning":"ความโปร่งใส หรือคุณภาพที่สามารถมองเห็นผ่านอย่างชัดเจน","example_en":"The government's policy lacks transparency.","example_th":"นโยบายของรัฐบาลขาดความโปร่งใส"},{"word":"transplant","pos":"verb","en_meaning":"to remove a part of the body from one person and put it in another person to replace a damaged or diseased part","th_meaning":"การปลูกต่อจากแก่","example_en":"The doctors had to perform an emergency heart transplant.","example_th":"แพทย์ต้องทำการเปลี่ยนสมองด่วน"},{"word":"trauma","pos":"noun","en_meaning":"a severe emotional shock or injury, especially one resulting from a distressing or frightening event","th_meaning":"ความเจ็บป่วยทางจิตใจจากเหตุการณ์ที่ยากลำบากหรือร้ายแรง","example_en":"He was traumatized by the experience of losing his job.","example_th":"เขานองกลัวหลังจากการเสียงาน"},{"word":"treaty","pos":"noun","en_meaning":"a formal agreement between two or more nations, intended to be legally binding and enforceable.","th_meaning":"สัญญาระหว่างประเทศ อัธยาศัยระหว่างประเทศ","example_en":"The treaty was signed by both parties on behalf of their respective governments.","example_th":"สัญญานี้ถูกเซ็นโดยทั้งสองฝ่ายในนามของรัฐบาลตนเอง"},{"word":"tremendous","pos":"adjective","en_meaning":"extremely large or impressive in scale, extent, or degree","th_meaning":"ครั้งสุดยอดหรือมหึ่งศักย์นิยม (Krachao sutod o mahueang niyom)","example_en":"The city's growth has been tremendous.","example_th":"การเติบโตของเมืองนี้เป็นครั้งสุดยอด"},{"word":"triangle","pos":"noun","en_meaning":"a polygon with three sides and three angles","th_meaning":"สามเหลี่ยม","example_en":"The shape of a pizza is a triangle.","example_th":"รูปของพิซซ่าเป็นสามเหลี่ยม"},{"word":"tribe","pos":"noun","en_meaning":"a group of people having a common origin or tradition, especially one larger than a clan or family but smaller than a nation.","th_meaning":"กลุ่มคนที่มีประวัติความเชื่อมโยงแบบร่วมกัน","example_en":"The tribe lived in the Amazon rainforest for centuries.","example_th":"กลุ่มนี้อาศัยอยู่ในป่าอเมซอนเป็นหลายศตวรรษ"},{"word":"tricky","pos":"adjective","en_meaning":"difficult to understand or deal with; puzzling; complicated","th_meaning":"ยากต่อการเข้าใจหรือจัดการ; สร้างความสับสน; ซับซ้อน","example_en":"The problem was tricky, but we managed to solve it in the end.","example_th":"ปัญหาเป็นที่ซับซ้อน แต่เราสามารถแก้ไขได้ในที่สุด"},{"word":"trivial","pos":"adjective","en_meaning":"not important or significant","th_meaning":"ไม่สำคัญหรือไม่มีค่า","example_en":"The problem is trivial.","example_th":"ปัญหานี้เป็นเรื่องง่าย"},{"word":"tropical","pos":"adjective","en_meaning":"relating to or characteristic of the tropics; hot and humid","th_meaning":"เกี่ยวกับหรือเป็นของที่มีอยู่ในพื้นที่ที่ติดตามดินทรงวงกลม ร้อนและชื้น","example_en":"The tropical climate made it difficult to sleep.","example_th":"สภาพแวดล้อมที่热带ทำให้ยากลำบากในการนอน"},{"word":"tumor","pos":"noun","en_meaning":"an abnormal growth of tissue that is typically benign or malignant.","th_meaning":"ภาวะเติบโตไม่ปกติของเนื้อเยื่อที่อาจเป็นดีหรือผิดปกติ","example_en":"The doctors discovered a tumor in the patient's lung during the examination.","example_th":"แพทย์ตรวจพบมะเร็งในกล้ามเนื้อของคนไข้ระหว่างการตรวจ"},{"word":"turbulent","pos":"adjective","en_meaning":"causing turbulence or violent movement","th_meaning":"ส่งผลกระทบต่อความสงบไม่สม่ำเสมอ","example_en":"The flight was turbulent, and the passengers had to hold on tightly.","example_th":"การเดินทางถูกส่งผลกระทบต่อโดยความสับสนและความกระแทกและเครียดของอากาศ"},{"word":"tutor","pos":"noun","en_meaning":"a person who teaches or instructs others, especially in a particular subject.","th_meaning":"คนสอนหรือผู้สอนอื่นๆ ที่ช่วยให้คนอื่นเรียนรู้สิ่งที่ต้องการ","example_en":"My English tutor helps me improve my speaking skills.","example_th":"ครูภาษาอังกฤษของฉันช่วยฉันพัฒนาทักษะการพูด"},{"word":"ultimate","pos":"adjective","en_meaning":"the greatest or final in quality, extent, importance, etc.","th_meaning":"สุดท้ายหรือดีที่สุด","example_en":"This is the ultimate test of your abilities.","example_th":"นี่คือการทดสอบสุดท้ายของทักษะของคุณ"},{"word":"undergraduate","pos":"noun","en_meaning":"a student at a college or university who has not yet completed a bachelor's degree.","th_meaning":"นักศึกษาปริญญาตรีที่กำลังศึกษาในมหาวิทยาลัยหรืออุดมการศึกษา","example_en":"He is an undergraduate student at MIT.","example_th":"เขารู้สึกชอบในสาขาวิศวกรรมคอมพิวเตอร์และกำลังศึกษาเป็นนักศึกษาระดับปริญญาตรีที่มหาวิทยาลัยเทคโนโลยีอุตสาหกรรมแห่งกัมพูชา"},{"word":"undermine","pos":"verb","en_meaning":"to weaken or damage something, especially the foundations of a building or a plan","th_meaning":"ทำลายฐานะหรือลดแรงจูงใจให้กับสิ่งใดสิ่งหนึ่ง","example_en":"The new regulations will undermine confidence in the company.","example_th":"นโยบายใหม่ๆจะทำลายความมั่นใจในบริษัท"},{"word":"underneath","pos":"adverb","en_meaning":"below or beneath something else; at the bottom of something","th_meaning":"ใต้ หรือต่อด้านล่างของบางสิ่ง","example_en":"The book is underneath the table.","example_th":"หนังสืออยู่ใต้โต๊ะ"},{"word":"unemployed","pos":"adjective","en_meaning":"not having a job; without employment","th_meaning":"ไม่มีงานหรือมองหาความสัมพันธ์การทำงาน","example_en":"He is currently unemployed.","example_th":"เขายังไม่มีงานทำอยู่ในขณะนี้"},{"word":"unify","pos":"verb","en_meaning":"to make or become one; to bring together into a single entity or group","th_meaning":"รวม; ทำให้เป็นหนึ่งกัน","example_en":"The council decided to unify the two departments.","example_th":"คณะตัดสินใจจะรวมแผนกสองแห่งดังกล่าว"},{"word":"unintelligible","pos":"adjective","en_meaning":"Unable to be understood or interpreted; indistinct or unclear.","th_meaning":"ไม่เข้าใจ, เกิดความสับสน","example_en":"The lecture was unintelligible because the professor spoke too fast.","example_th":"การบรรยายนั้นมีเนื้อหาที่ซับซ้อนเกินไปและทำให้นักศึกษาไม่เข้าใจ"},{"word":"unity","pos":"noun","en_meaning":"the state of being united or joined together as a whole; the quality of being unified","th_meaning":"ความสัมพันธ์ที่ดีในการทำงานร่วมกัน รวมถึงการทำงานเป็นกลุ่มหนึ่งหรือการทำงานเป็นผู้นำและกำลังใจให้คนอื่นๆ","example_en":"The company aims to achieve unity among its employees.","example_th":"บริษัทต้องการให้มีความสัมพันธ์ที่ดีกับพนักงานของตนเอง"},{"word":"unstable","pos":"adjective","en_meaning":"not firm or secure; tending to change rapidly or unexpectedly","th_meaning":"ไม่คงที่หรือมั่นคง; ต้องการเปลี่ยนแปลงหรือผิดปกติอย่างรวดเร็ว","example_en":"The weather is unstable, so we can't go outside.","example_th":"อากาศไม่คงที่ ดังนั้นเราไม่สามารถไปนอกบ้านได้"},{"word":"uplift","pos":"verb","en_meaning":"to raise or elevate something; to boost morale or spirits","th_meaning":"ยกขึ้น, ช่วยให้มีความดีใจ","example_en":"The company's success has uplifted the entire team.","example_th":"ความสำเร็จของบริษัทนี้ได้ทำให้นักงานทุกคนรู้สึกดีใจขึ้น"},{"word":"upward","pos":"adjective, adverb","en_meaning":"towards the sky or higher up; increasing in value or importance","th_meaning":"สูงขึ้น","example_en":"She is climbing upward.","example_th":"เธอกำลังชั่วไปขึ้น"},{"word":"urine","pos":"noun","en_meaning":"the liquid waste product produced by the kidneys and secreted by the ureters into the bladder, which is then expelled from the body through the urethra.","th_meaning":"น้ำสุขภาพ (nam sukan) - สารเหลวที่ผลิตโดยไตและถูกส่งผ่านเข้าไปในถังเก็บขยะด้วยทางกระเทียมแล้วถูกนำออกไปจากร่างกายผ่านทางอู่สิ่งมีชีวิต","example_en":"She had to go to the bathroom because she couldn't hold her urine any longer.","example_th":"เธอต้องไปใช้จาน เพราะไม่มีเวลาให้ทนน้ำสุขภาพ"},{"word":"usage","pos":"noun","en_meaning":"The manner in which something is used or employed; the way in which a thing is applied.","th_meaning":"การใช้งาน วิธีการใช้","example_en":"The correct usage of the word 'usage' is important for clear communication.","example_th":"การใช้คำศัพท์ 'usage' ในทางเดียวกันเป็นเรื่องสำคัญเพื่อความสื่อสารที่ชัดเจน"},{"word":"utility","pos":"noun","en_meaning":"something that is useful or helpful; the usefulness of something.","th_meaning":"สิ่งที่มีประโยชน์หรือช่วยเหลือ ความคุ้มค่าของบางอย่าง","example_en":"The kitchen has all the necessary utilities.","example_th":"ห้องครัวมีเครื่องใช้ในครัวทั้งหมด"},{"word":"utilize","pos":"verb","en_meaning":"to use or exploit for a particular purpose","th_meaning":"ใช้หรือพัฒนาให้ประโยชน์","example_en":"We must utilize every resource available to us.","example_th":"เราต้องใช้ทรัพยากรทุกอย่างที่มีให้ได้"},{"word":"utterance","pos":"noun","en_meaning":"a word, phrase, or statement spoken aloud","th_meaning":"การพูดหรือคำพูดที่เข้าใจได้ในระยะสั้นๆ","example_en":"He made a brief utterance before leaving.","example_th":"เขาพูดประโยคนี้ก่อนที่จะออกจากที่นั่ง"},{"word":"vague","pos":"adjective","en_meaning":"unclear or indistinct in meaning or definition","th_meaning":"สิ่งที่ไม่ชัดเจนหรือไม่มีความชัดเจน","example_en":"The answer was vague, and I couldn't understand it.","example_th":"คำตอบวago ฉันไม่เข้าใจ"},{"word":"valid","pos":"adjective","en_meaning":"proper or appropriate for a particular purpose; correct and accurate.","th_meaning":"ถูกต้องหรือเหมาะสมสำหรับจุดประสงค์เฉพาะ; แม่นยำและถูกต้อง","example_en":"The document is valid until the end of the year.","example_th":"เอกสารนี้ใช้ได้จนถึงสิ้นปี"},{"word":"validity","pos":"noun","en_meaning":"the quality or state of being valid or legally binding","th_meaning":"ความถูกต้องหรือความมีประสิทธิภาพของกฎหมายหรือเอกสาร","example_en":"The contract must have the proper validity.","example_th":"สัญญาจะต้องมีความถูกต้องตามกฎหมาย"},{"word":"valve","pos":"noun","en_meaning":"a device that controls the flow of liquid or gas through a pipe, tube, or duct.","th_meaning":"วาล์ว หรือกั้นป้อนที่ควบคุมการไหลของน้ำหรือแก๊สผ่านช่องดูดหรือฝอย","example_en":"He turned the valve to release the pressure.","example_th":"เขาหมุนวาล์วเพื่อปล่อยแรงกระแทก"},{"word":"variability","pos":"noun","en_meaning":"the quality or state of being variable or subject to change","th_meaning":"ความแปรผันหรือมีลักษณะที่เปลี่ยนแปลงได้","example_en":"There is high variability in the results.","example_th":"ผลการทดลองมีความแปรผันมาก"},{"word":"variance","pos":"noun","en_meaning":"the degree of difference among the elements in a given set or population, especially as determined by summing the squared differences from the mean and dividing by the number (or number minus one) of elements. It is used to measure how spread out numbers are.","th_meaning":"ความแปรปรวนในชุดข้อมูลหรือประชากร ซึ่งเป็นวิธีการที่ใช้ในการคำนวณระดับความแตกต่างระหว่างสมาชิกในชุดข้อมูล โดยทำการคิดส่วนบุคคลทั้งหมดจากค่าเฉลี่ยแล้วกำกับด้วยสัญลักษณ์ที่ยกกำลังสอง และแบ่งด้วยจำนวนสมาชิก (หรือจำนวนสมาชิกลบ 1)","example_en":"The variance of the data set is an important measure to understand the spread of the data.","example_th":"ความแปรปรวนของชุดข้อมูลเป็นวัดสำคัญในการเข้าใจระดับความกระจายของข้อมูล"},{"word":"variant","pos":"noun","en_meaning":"A different form or version of something, especially a gene or product.","th_meaning":"รูปแบบหรือรุ่นที่แตกต่างของสิ่งมีอยู่ หรือพันธุกรรมที่แตกต่าง","example_en":"The drug comes in several variants.","example_th":"ยาขึ้นมีรูปแบบหลายชนิด"},{"word":"vector","pos":"noun","en_meaning":"A quantity having direction as well as magnitude, or a member of a set of quantities that have both magnitude and direction.","th_meaning":"จำนวนที่มีความยาวและความด้าน (ทาง)","example_en":"The velocity vector indicates the speed and direction of an object's movement.","example_th":"เวกเตอร์เร็วภาพแสดงความเร็วและความทิศทางของการเคลื่อนที่ของสิ่งมีน้ำหนัก"},{"word":"vegetation","pos":"noun","en_meaning":"the natural growth of plants, especially in a particular area or during a particular season","th_meaning":"พืชไม้และสัตว์ป่าที่เติบโตอยู่ในบริเวณที่นั่งอยู่","example_en":"The lush vegetation made it difficult to see far.","example_th":"ความรื่อเริงของพืชไม้ทำให้ยากต่อการมองเห็นไกล"},{"word":"vein","pos":"noun","en_meaning":"a channel in the body for blood to flow through","th_meaning":"หลอดเลือดในร่างกายที่ส่งเลือดผ่านไป","example_en":"Her veins were visible under her skin.","example_th":"หลอดเลือดของเธออยู่ใต้ผิวหนังของเธอ"},{"word":"velocity","pos":"noun","en_meaning":"the speed of something in a particular direction","th_meaning":"ความเร็วในทิศทางต่างๆ","example_en":"The car's velocity was 60 miles per hour.","example_th":"ความเร็วของรถนั้นคือ 60 กม.ต่อชั่วโมง"},{"word":"verbal","pos":"adjective","en_meaning":"relating to or involving the use of words; spoken rather than written or acted out","th_meaning":"เกี่ยวกับหรือใช้คำพูด เช่น การสื่อสารหรือการบรรยายผ่านภาษา","example_en":"She is a verbal person. She prefers to speak rather than write.","example_th":"เธอเป็นคนที่มีความรู้สึกว่าควรจะคุยกับคนอื่นแทนที่จะเขียน"},{"word":"vertical","pos":"adjective","en_meaning":"perpendicular to a horizontal plane or line.","th_meaning":"ตั้งฉากหรือตัดกับระนาบชั้นตรงข้าม (ตรงข้ามกับแนวตั้ง)","example_en":"The wall is vertical.","example_th":"กำแพงนี้ตั้งฉาก"},{"word":"viable","pos":"adjective","en_meaning":"able to exist or happen; practical or feasible","th_meaning":"สามารถดำเนินการได้; มีประสิทธิภาพ","example_en":"The project is viable if we secure additional funding.","example_th":"โครงการนี้จะเป็นไปได้ถ้าเราได้รับงบประมาณเพิ่มเติม"},{"word":"virtue","pos":"noun","en_meaning":"a quality or attribute of a person or thing that is regarded as good, especially moral excellence or admirable behavior.","th_meaning":"คุณค่าหรือลักษณะที่ถูกพิจารณาดี หรือสิ่งที่มีคุณภาพดี","example_en":"He practiced virtue every day.","example_th":"เขานำvirtueไปใช้ในแต่ละวัน"},{"word":"vitamin","pos":"noun","en_meaning":"A substance required by an organism to live and grow.","th_meaning":"สารที่จำเป็นสำหรับการดำรงชีวิตและพัฒนาของผู้คน","example_en":"Vitamin C is essential for the immune system.","example_th":"แคลเซียมเป็นสารอาหารที่จำเป็นสำหรับกระดูกและฟัน"},{"word":"vocabulary","pos":"noun","en_meaning":"a set of words and phrases, especially those used by a particular person, group, or profession.","th_meaning":"กลุ่มคำศัพท์หรือบทเรียนเพื่อใช้ในบริบทต่างๆ ของภาษาไทย","example_en":"I need to learn a new vocabulary for my upcoming exam.","example_th":"ฉันต้องการเรียนรู้กลุ่มคำศัพท์ใหม่ก่อนสอบ"},{"word":"volition","pos":"noun","en_meaning":"the ability to make a decision or act of one's own free will, the exercise of choosing between alternatives","th_meaning":"การตัดสินใจหรือการกระทำโดยไม่ถูกบังคับ","example_en":"She exercised her volition and chose not to attend the party.","example_th":"เธอได้ใช้ความสามารถในการตัดสินใจและเลือกที่จะไม่ไปเข้าร่วมงานประفل"},{"word":"vowel","pos":"noun","en_meaning":"a sound made by the vocal cords during speech, typically representing a single spoken syllable and often used as a component of words","th_meaning":"ตัวอักษรที่มีน้ำเสียงไม่มีสระในหน้าและหลัง รวมถึง 'ะ ิ อ ุ เ ื อึ ื อือ อ็อื อั้ว อู๊ว","example_en":"The word 'vowel' is a type of speech sound.","example_th":"คำว่า 'vowel' เป็นชนิดของเสียงพูด"},{"word":"watershed","pos":"noun","en_meaning":"a ridge or divide between two river systems. The highest point on a watershed.","th_meaning":"ดินแดนที่แบ่งแยกน้ำจากแหล่งน้ำสู่แม่น้ำอื่นๆ","example_en":"The mountain range is the natural watershed for the region.","example_th":"รูปเขาเป็นแนวเส้นกั้นน้ำที่แบ่งแยกน้ำของภูมิภาค"},{"word":"wavelength","pos":"noun","en_meaning":"the distance between corresponding points of two successive waves in a periodic wave train, measured along the direction of propagation","th_meaning":"ความยาวคลื่น","example_en":"The wavelength of light determines its color.","example_th":"ความยาวคลื่นของแสงมีผลต่อสีของแสง"},{"word":"weave","pos":"verb","en_meaning":"to make or arrange by interlacing threads or fibers, especially on a loom.","th_meaning":"ทำลายกินท์หรือผ้าโดยการสับและผสมสายตาด้วยกันบนเครื่องปนวาย.","example_en":"She is weaving a blanket for her baby.","example_th":"เธอกำลังทำการปนวายเพื่อทำหมวกให้กับบุตรชาย."},{"word":"wheat","pos":"noun","en_meaning":"a cereal grass, Triticum spp., whose edible seeds are ground into flour and used to make breads, pastas, etc.","th_meaning":"ข้าว","example_en":"I need to buy wheat for baking bread.","example_th":"ฉันต้องการซื้อข้าวดำเพื่อบakeขนม"},{"word":"whereby","pos":"adverb","en_meaning":"by which; by means of which","th_meaning":"โดยที่","example_en":"He achieved his goals whereby he worked hard.","example_th":"เขาได้รับรางวัลด้วยการทำงานหนักมาก"},{"word":"whichever","pos":"pronoun","en_meaning":"any of several that are being considered or compared.","th_meaning":"ซึ่งก็ตาม หรือ ที่ใด ก็ได้","example_en":"I don't care which one. Whichever you choose is fine with me.","example_th":"ฉันไม่รู้สึกว่าต้องการอะไร คุณเลือกได้เลย"},{"word":"whoever","pos":"pronoun","en_meaning":"anyone who; whomever","th_meaning":"ใครก็ตามที่","example_en":"Whoever breaks the rules will be punished.","example_th":"ใครก็ตามที่ละเมิดกฎจะถูกคดี"},{"word":"widespread","pos":"adjective","en_meaning":"extending over a wide area or affecting many people; common, prevalent.","th_meaning":"ครอบคลุมทั่วไป, มีความแพร่หลายอย่างกว้างขวาง, เป็นไปตามทั่วไป.","example_en":"The disease was widespread in the village.","example_th":"โรคระบาดได้ทั่วบ้าน"},{"word":"wisdom","pos":"noun","en_meaning":"the quality or state of knowing how to do what is right and just, and having good judgement in practical matters.","th_meaning":"ความรู้สึกฉลาด ความรู้ที่มีค่าในการตัดสินใจและทำกิจกรรมในชีวิตประจำวัน","example_en":"He has accumulated a great deal of wisdom over the years.","example_th":"เขาได้สะสมความรู้สึกฉลาดมากเป็นเวลายาวนาน"},{"word":"workshop","pos":"noun","en_meaning":"a room or building where practical work or training is carried out","th_meaning":"ห้องปฏิบัติการหรือสถานที่จัดกิจกรรมฝึกอบรม","example_en":"She attended a cooking workshop to learn how to make pizza.","example_th":"เธอไปเข้า
