แทนผลรวมของอนุกรม vô ขีดจำกัด","example_en":"The integral of x^2 is (1/3)x^3 + C.","example_th":"ผลต่างของ x^2 คือ (1/3)x^3 + C."},{"word":"integration","pos":"noun","en_meaning":"the process of joining different things together as part of a single system or whole.","th_meaning":"การรวมสิ่งต่าง ๆ ด้วยกันให้เป็นหนึ่งส่วนของระบบหรือทวีปพลังงานเดียว","example_en":"The integration of different software systems is crucial for a company's operations.","example_th":"การรวมซอฟต์แวร์หลายโปรแกรมด้วยกันจำเป็นสำหรับการทำงานของบริษัท"},{"word":"intensity","pos":"noun","en_meaning":"the quality or state of being intense; the degree of something; a strong feeling or effect","th_meaning":"ความแรง; ระดับของบางสิ่ง","example_en":"The intensity of the pain was unbearable.","example_th":"ความเจ็บปวดที่หนักมากจนทำให้รู้สึกไม่สามารถทนได้"},{"word":"intensive","pos":"adjective","en_meaning":"having or characterized by great intensity","th_meaning":"มีความหนัก หรือ มีพลังงานมาก","example_en":"The teacher gave an intensive lesson.","example_th":"ครูสอนในระดับหนัก"},{"word":"interact","pos":"verb","en_meaning":"to communicate or exchange ideas with someone, especially in a way that is enjoyable and reciprocal.","th_meaning":"สื่อสารหรือแลกเปลี่ยนความคิดเห็นกับใคร่อย่างที่สนุกสนานและเป็นสองฝ่าย","example_en":"She enjoys interacting with other people at the party.","example_th":"เธอชอบสื่อสารกับคนอื่น ๆ ในงานปาร์ตี้"},{"word":"interesting","pos":"adjective","en_meaning":"in an interesting way; that is or has caught one's interest","th_meaning":"ในทางที่น่าสนใจ; ที่ได้รับความสนใจหรือมีความหมายที่น่าสนใจ","example_en":"It was interestingly well-received at the conference.","example_th":"มันได้รับการตอบรับอย่างดีมากในงานประชุม"},{"word":"interface","pos":"noun","en_meaning":"a way of connecting two or more devices, networks, or systems so that they can communicate with each other.","th_meaning":"อินเตอร์เฟซ คือวิธีการเชื่อมต่อกับอุปกรณ์หรือระบบสองหรือมากกว่ากันเพื่อให้สามารถสื่อสารกันได้","example_en":"The new computer has a USB interface.","example_th":"คอมพิวเตอร์ใหม่มีอินเตอร์เฟซ USB"},{"word":"interfere","pos":"verb","en_meaning":"to prevent, impede, or obstruct the progress of something; to meddle in affairs that are not one's own.","th_meaning":"ส่งผลกระทบ, อุกมิให้, ปิดขั้น","example_en":"The government should not interfere in the personal lives of its citizens.","example_th":"รัฐบาลไม่ควรถูกความเข้าใจในการผู้ที่ช่วยเหลือในด้านการส่งผลกระทบหรืออุกมิให้"},{"word":"intermediate","pos":"noun, adjective","en_meaning":"having a middle position or level; not advanced or beginner, but not expert either","th_meaning":"ระดับกลาง ไม่เป็นมืออาชีพแต่อยู่ระหว่างเริ่มต้นและมืออาชีพ","example_en":"The student is at an intermediate level of English.","example_th":"นักเรียนกำลังอยู่ในระดับกลางภาษาอังกฤษ"},{"word":"interrupt","pos":"verb","en_meaning":"to break in on or stop (an action, sound, etc.) suddenly and unexpectedly.","th_meaning":"ทำให้หยุดขึ้นมาทันทีโดยไม่คาดคิด","example_en":"She interrupted me while I was speaking.","example_th":"เธอก็ตัดแทรกฉันตอนกำลังพูด"},{"word":"interval","pos":"noun","en_meaning":"a period of time between two events or actions; the distance between things","th_meaning":"ช่วงเวลาหรือระยะทางระหว่างเหตุการณ์ หรือสิ่งที่เกิดขึ้น","example_en":"There is a five-minute interval between each train.","example_th":"มีช่วงเวลายาว 5 นาทีระหว่างแต่ละรถไฟ"},{"word":"intervene","pos":"verb","en_meaning":"to enter a situation and especially a conflict or dispute to help resolve it, often as an outside person or third party.","th_meaning":"เข้าร่วมหรือแทรกแซงในสถานการณ์หรือขัดแย้งเพื่อช่วยแก้ไข","example_en":"The police intervened and stopped the fight.","example_th":"ตำรวจเข้าร่วมและหยุดต่อสู้"},{"word":"interviewer","pos":"noun","en_meaning":"a person who conducts an interview, especially as part of a job application process.","th_meaning":"ผู้สัมภาษณ์","example_en":"The hiring manager will be the interviewer for this position.","example_th":"หัวหน้าทีมจะเป็นผู้สัมภาษณ์ในตำแหน่งนี้"},{"word":"invade","pos":"verb","en_meaning":"to attack and occupy a place or country by force, especially militarily.","th_meaning":"เข้าร่วมที่บังคับหรือโจมตีที่ยุติธรรม","example_en":"The army was ordered to invade the enemy's territory.","example_th":"กองกำลังทหารได้รับคำสั่งให้รุกรเข้ากับพื้นที่ของศัตรู"},{"word":"invasion","pos":"noun","en_meaning":"the act of forcing entry into a country or area by armed forces, typically as an attack.","th_meaning":"การบุกครองหรือการขโมยที่เข้าร่วมด้วยกำลังปืนศัตรู","example_en":"The invasion of Normandy was a crucial turning point in World War II.","example_th":"การบุกครองนอร์มาเนียเป็นจุดเปลี่ยนแปลงสำคัญในสงครามโลกครั้งที่สอง"},{"word":"inversion","pos":"noun","en_meaning":"the act of turning something upside down or the state of being inverted; a reversal of order, sequence, or orientation.","th_meaning":"การกลับ ngượcหรือการทำให้ตรงข้ามกัน","example_en":"She had to do an inversion in her dance routine to impress the judges.","example_th":"เธอต้องทำ invertion ในรูปแบบเต้นของเธอเพื่อแสดงความคิดเห็นแก่ผู้วัด"},{"word":"invert","pos":"verb","en_meaning":"to reverse the order of items in a list or to turn something upside down.","th_meaning":"ที่มาของอังกฤษ แปลว่า 'กลับคืน' หรือ 'ตัดข้าม'","example_en":"He inverted the order of the numbers in the list.","example_th":"เขากำลังการเปลี่ยนตำแหน่งเลขในรายการที่ให้มา"},{"word":"ion","pos":"noun","en_meaning":"an atom or molecule that has lost one or more electrons and carries a net electrical charge, either positive (cation) or negative (anion).","th_meaning":"อะโอน: สิ่งมีไฟฟ้าขึ้นหรือลงจากอะตอมหรือโมเลกุล","example_en":"The ionized gas glows under the electron beam.","example_th":"กรดอะโอนที่ได้รับแรงผลัดแสดงแสงใต้ถบเรือนง่าย"},{"word":"irrelevant","pos":"adjective","en_meaning":"not relevant or important","th_meaning":"ไม่เกี่ยวข้องหรือไม่มีความสำคัญ","example_en":"The information provided is irrelevant to the situation.","example_th":"ข้อมูลที่ให้มาเป็นไปไม่ได้ต่อสถานการณ์นี้"},{"word":"irrigation","pos":"noun","en_meaning":"the process of providing water to land, especially to crops, to make it suitable for growing plants.","th_meaning":"การจ่ายน้ำให้ดินเพื่อทำให้เหมาะสมสำหรับการปลูกพืช","example_en":"The farmer relies on irrigation to maintain his crop yields during dry spells.","example_th":"ชาวนาขึ้นอยู่กับการบริหารจัดการระบบท่อระบายน้ำเพื่อให้เกิดผลผลิตได้อย่างต่อเนื่องในช่วงแห้ง"},{"word":"jazz","pos":"noun","en_meaning":"a style of music characterized by improvisation and a complex rhythmic structure.","th_meaning":"เพลงแจ๊ซ หรือ จัซจิซ เป็นรูปแบบของดนตรีที่มีการคิดสรรพและโครงสร้างทางรhythmที่ซับซ้อน","example_en":"He enjoys listening to jazz music.","example_th":"เขามักจะฟังเพลงแจ๊ซ"},{"word":"junior","pos":"noun, adjective","en_meaning":"a person who is younger or less experienced than another","th_meaning":"คนที่ยังไม่เป็นผู้เชี่ยวชาญหรือมีประสบการณ์มากพอในเรื่องนั้น","example_en":"He is a junior engineer.","example_th":"เขานักศึกษาปริญญาตรีจบ"},{"word":"justification","pos":"noun","en_meaning":"the act or practice of giving reasons for something, especially an action that might otherwise seem unreasonable or unjustified.","th_meaning":"การให้เหตุผลที่เหมาะสมเพื่อแสดงความเข้าใจและความชัดเจนในเรื่องใด ๆ","example_en":"The government provided a detailed justification for the new tax laws.","example_th":"รัฐบาลได้ให้เหตุผลในการสร้างกฎหมายภาษีใหม่"},{"word":"kidney","pos":"noun","en_meaning":"a pair of organs that filter blood and remove waste products, producing urine.","th_meaning":"臓 ร่วมที่หนังสันหลังซึ่งช่วยทำความสะอาดเลือดและลบสารไม่ต้องการออกจากร่างกาย","example_en":"I need to go see a doctor because I think I have kidney problems.","example_th":"ฉันต้องไปตรวจแพทย์เพราะผมเชื่อว่าผมมีปัญหาเกี่ยวกับ臓 ร่วมที่หนังสันหลัง"},{"word":"kilometer","pos":"noun","en_meaning":"a unit of length equal to 1,000 meters (or about 3.281 feet)","th_meaning":"หน่วยความยาวที่เท่ากับ 1,000 เมตร (ประมาณ 3.281ฟุต)","example_en":"The distance from my house to the nearest city is 5 kilometers.","example_th":"ระยะทางจากบ้านฉันไปเมืองใกล้สุดคือ 5 กิโลเมตร"},{"word":"lab","pos":"noun","en_meaning":"a laboratory or experimental room where scientific experiments are conducted","th_meaning":"ห้องปฏิบัติการหรือห้องทดลองที่ใช้ในการทำการทดลองวิทยาศาสตร์","example_en":"He works in a research lab.","example_th":"เขานำทำงานในห้องทดลองวิจัย"},{"word":"lateral","pos":"noun, adjective","en_meaning":"from or toward the side; not straight forward or back. A horizontal projection from the vertical axis.","th_meaning":"ข้างหน้าหรือข้างหลัง","example_en":"The building has a lateral entrance on the side.","example_th":"건물มีประตูเข้าทางด้านข้าง"},{"word":"layout","pos":"noun","en_meaning":"The arrangement or organization of elements on a page, screen, or other surface.","th_meaning":"การวางตัวอักษรหรือข้อมูลในหน้าเว็บไซต์หรือเอกสารอย่างสม่ำเสมอและสวยงาม","example_en":"The layout of the website was redesigned to improve user experience.","example_th":"การออกแบบแผนที่ของเว็บไซต์ได้รับการปรับปรุงเพื่อให้ผู้ใช้งานได้มีประสบการณ์ดีขึ้น"},{"word":"leaf","pos":"noun","en_meaning":"a small part of a plant, typically flat and green","th_meaning":"ใบ","example_en":"The tree has many leaves.","example_th":"ต้นไม้มีใบเยอะ"},{"word":"lecturer","pos":"noun","en_meaning":"a person who teaches in a school or university, especially as a regular employee.","th_meaning":"ครูหรือนักสอน","example_en":"He is a lecturer at the university.","example_th":"เขาเป็นครูที่มหาวิทยาลัย"},{"word":"legend","pos":"noun","en_meaning":"a popular story or rumour that has been handed down over time, especially one with a moral. A famous person.","th_meaning":"เรื่องราวหรือคำสั่งที่ถูกทอดทิ้งมาข้ามเวลา และอาจจะไม่มีความจริง แต่มักจะมีค่านิยมและหมายเหตุ","example_en":"She has become a legend in her field.","example_th":"เธอกลายเป็นเรื่องราวที่นิยมในวงการของเธอนั้น"},{"word":"legitimate","pos":"adjective","en_meaning":"正式的; 合法的","th_meaning":"ถูกต้อง; อันน่าเชื่อถือ","example_en":"This is a legitimate claim.","example_th":"นี่คือการคำขอที่ถูกต้อง"},{"word":"leisure","pos":"noun","en_meaning":"a period of rest or relaxation, especially when separated from work and other everyday activities.","th_meaning":"เวลาพักผ่อนหรือการเงียบสงบ เมื่อไม่ต้องทำอะไร เช่น การออกกำลังกาย การดูหนัง การนอนหลับ","example_en":"She enjoys spending her leisure time reading books and walking in the park.","example_th":"เธอชอบใช้เวลาพักผ่อนในการอ่านหนังสือและเดินที่สวนสาธารณะ"},{"word":"lever","pos":"noun","en_meaning":"A long arm used to open a door, especially one on the handle side.","th_meaning":"เครื่องจักรที่ใช้ในการเปลี่ยนแรงและระยะทาง เช่น เก้าหน้า","example_en":"She uses a lever to open the door.","example_th":"เธอใช้เครื่องจักรลากเพื่อเปิดประตู"},{"word":"lexical","pos":"adjective","en_meaning":"relating to or concerned with words or their use in language","th_meaning":"เกี่ยวกับคำศัพท์หรือการใช้งานภาษา","example_en":"The lexical error was due to a simple typo.","example_th":"ข้อผิดพลาดทางด้านภาษาเกิดจากตัวสะกดง่ายๆ"},{"word":"liable","pos":"adjective","en_meaning":"subject to legal or moral responsibility; responsible for the consequences of one's actions.","th_meaning":"ต้องรับผิดชอบ","example_en":"The company is liable for any damage caused by its products.","example_th":"บริษัทต้องรับผิดชอบต่อความเสียหายใด ๆ ที่เกิดขึ้นจากผลิตภัณฑ์ของพวกเขา"},{"word":"lifestyle","pos":"noun","en_meaning":"the way a person lives or behaves","th_meaning":"สไตล์ชีวิต","example_en":"She has an active lifestyle.","example_th":"เธอมีไลฟ์สไตล์ที่กระตือรือร้น"},{"word":"lifetime","pos":"noun","en_meaning":"The duration of someone's life or the period during which something lasts.","th_meaning":"อายุหรือช่วงเวลาที่สิ่งใดสิ่งหนึ่งอยู่ในสภาพการใช้งาน","example_en":"He has a long lifetime as an experienced teacher.","example_th":"เขามีอายุการทำงานยาวนานในฐานะครูผู้มีประสบการณ์"},{"word":"likelihood","pos":"noun","en_meaning":"the probability of something happening or being the case; a possibility","th_meaning":"ความน่าจะเป็นหรือโอกาสเกิดขึ้นของสิ่งใด","example_en":"The likelihood of rain tomorrow is 80 percent.","example_th":"ความน่าจะเป็นฝนพรุ่งนี้คือ 80 เปอร์เซ็นต์"},{"word":"likewise","pos":"adverb","en_meaning":"in the same way; similarly;","th_meaning":"เหมือนกัน","example_en":"She studies hard, and he does likewise.","example_th":"เธอทำงานหนัก และเขาทำเช่นเดียวกัน"},{"word":"limb","pos":"noun","en_meaning":"a part of the body that extends from a joint to a bone or another joint, including muscles, nerves, and skin.","th_meaning":"แขนหรือขาของตัวเรา","example_en":"The limb was injured in the accident.","example_th":"แขนเขาได้รับบาดเจ็บในอุบัติเหตุ"},{"word":"linear","pos":"adjective","en_meaning":"forming a straight line or extending in a straight line.","th_meaning":"ต่อเนื่องตรงหรือไม่เบกบวก","example_en":"The road is linear in design, with no hills or curves.","example_th":"ถนนมีรูปแบบตรงไม่มีภูมิผิวโค้ง"},{"word":"linguistic","pos":"adjective","en_meaning":"relating to or involving language, especially its structure and use","th_meaning":"ที่เกี่ยวข้องกับหรือต้องการใช้ภาษา อย่างเฉพาะเจาะจงกับโครงสร้างและการใช้งานของภาษา","example_en":"Linguistic studies involve the analysis of language patterns.","example_th":"วิจัยภาษาศึกษาเกี่ยวกับการวิเคราะห์รูปแบบภาษา"},{"word":"linguistics","pos":"noun","en_meaning":"The scientific study of language.","th_meaning":"การศึกษาเกี่ยวกับภาษา","example_en":"Linguistics is the study of how humans communicate with each other through language.","example_th":"การศึกษานี้เป็นเรื่องราวเกี่ยวกับวิธีที่มนุษย์สื่อสารกันผ่านภาษา"},{"word":"liter","pos":"noun","en_meaning":"a unit of liquid capacity or volume equal to 1000 milliliters","th_meaning":"หนึ่งลิตร (lit)","example_en":"I need a liter of water for my tea.","example_th":"ฉันต้องการหนึ่งลิตรน้ำเพื่อชงกาแฟ"},{"word":"liver","pos":"noun","en_meaning":"the largest internal organ of the human body, located in the upper right abdomen and playing a key role in detoxification and metabolic processes.","th_meaning":"臓 (ต่างๆ) เป็นตัวอวัยวะภายในที่ใหญ่ที่สุดของร่างกายมนุษย์ อยู่ในบริเวณด้านบนซ้ายของลำคอ และมีบทบาทสำคัญในการกำจัดสารพิษและกระบวนการเมตาบอลิก","example_en":"The liver is crucial for breaking down harmful substances in the body.","example_th":"臓 จำเป็นสำหรับการแยกขยะอันร้ายแรงออกจากร่างกาย"},{"word":"locally","pos":"adverb","en_meaning":"in or at a particular place; in the vicinity of the speaker's location.","th_meaning":"ในบริเวณใกล้เคียงหรือในพื้นที่เฉพาะ","example_en":"He bought groceries locally.","example_th":"เขามอบซื้อสินค้ากับบุตรของเขาอยู่ในจังหวัดบึงกาฬ"},{"word":"locus","pos":"noun","en_meaning":"a particular place or position; the center of activity or interest","th_meaning":"สถานที่หรือตำแหน่งเฉพาะ; จุดศูนย์กลางกิจกรรมหรือความสนใจ","example_en":"The locus of her interests is literature.","example_th":"ลักษณะของเธอคือการอ่านหนังสือ"},{"word":"logical","pos":"adjective","en_meaning":"based on or involving reason and logic","th_meaning":"ที่เกี่ยวข้องกับเหตุผลหรือการคำนวณ","example_en":"The argument is logical.","example_th":"การทำความคิดเห็นมีความเรื่องธรรม"},{"word":"longitudinal","pos":"adjective","en_meaning":"relating to or running along the length of something","th_meaning":"ที่ต้นด้านบนหรือที่กึ่งกลางของสิ่งมีรูปทรงทางยาว","example_en":"The train runs longitudinally.","example_th":"รถไฟขับไปทางยาว"},{"word":"loop","pos":"noun, verb","en_meaning":"1. A continuous series of events or actions repeating themselves repeatedly. 2. To move around in a circuitous way.","th_meaning":"วงจรป้อน้ำหนักหรือวงจรการทำงานที่ทำซ้ำตัวเองอย่างไม่หยุด","example_en":"1. The loop runs through the list of items and processes each one. 2. He had to loop around the block several times before he could reach his destination.","example_th":"1. เวนทำงานผ่านรายการของสิ่งมีอยู่และประมวลผลแต่ละสิ่งนั้น 2. เขาต้องวนไปรอบที่เกิดขึ้นหลายครั้งก่อนที่จะถึงสถานที่ปลายทาง"},{"word":"lump","pos":"noun","en_meaning":"a large mass of tissue, especially in an abnormal growth or a solidified area of pus.","th_meaning":"มีกลุ่มแข็งหรือเม็ดแข็งในร่างกาย","example_en":"He has a lump in his neck.","example_th":"เขามีเม็ดแข็งในคอ"},{"word":"lung","pos":"noun","en_meaning":"an organ in the chest that extracts oxygen from air and expels carbon dioxide","th_meaning":"กล้ามเนื้อที่อยู่ในหน้าอกที่ใช้ในการบริหารจัดการออกซิเจนและคาร์บอนไดออกไซด์","example_en":"The lung helps in breathing.","example_th":"กล้ามเนื้ออันมีอยู่ในหน้าอกช่วยในการหายใจ"},{"word":"machinery","pos":"noun","en_meaning":"a machine or group of machines, especially a large one used for industrial purposes.","th_meaning":"เครื่องจักรหรือกลุ่มของเครื่องจักรขนาดใหญ่ที่ใช้ในธุรกิจอุตสาหกรรม","example_en":"The factory relies on advanced machinery to increase its productivity.","example_th":"โรงงานขึ้นอยู่กับเครื่องจักรที่มีประสิทธิภาพเพื่อเพิ่มผลิตภัณฑ์"},{"word":"magnetic","pos":"noun","en_meaning":"having the property of attracting iron or steel, or other substances with similar properties; having a strong attraction or power of influence","th_meaning":"มีความก้าวหน้าหรือร่มร้นต่อสิ่งอื่นๆ","example_en":"The magnet was attracted to the metal object.","example_th":"แมเก็ตถูกดึงดูดโดยสิ่งเหล็ก"},{"word":"magnitude","pos":"noun","en_meaning":"the relative size or importance of something; the degree of intensity of a physical quantity.","th_meaning":"ขนาดหรือความสำคัญของบางสิ่ง事物; ระดับความแรงของปริมาณทางกายภาพ。","example_en":"The magnitude of the earthquake was 7.5 on the Richter scale.","example_th":"ความแรงของแผ่นก่อสร้างนั้นมีขนาดอยู่ที่ 7.5 ในระดับเครื่องมือวัดเรขาฟิก"},{"word":"mall","pos":"noun","en_meaning":"a large indoor shopping center with many stores and sometimes entertainment facilities.","th_meaning":"ซีร์วิสเซนเตอร์หรือตลาดกลางที่มีหลายร้านค้าและบางครั้งยังมีความบันเทิง","example_en":"I love to go shopping at the mall with my friends.","example_th":"ฉันชอบไปอยู่ในเซ็นเตอร์การขายส่งใหญ่กับเพื่อนๆของฉัน"},{"word":"manipulate","pos":"verb","en_meaning":"to control or influence someone or something in a particular way, often unfairly","th_meaning":"การควบคุมหรือจัดการกับใครบางคนหรือบางสิ่งอย่างเฉพาะเจาะจง บางครั้งอาจเป็นแบบไม่เพียงทางธรรมชาติ","example_en":"He tries to manipulate the public opinion.","example_th":"เขาพยายามควบคุมความคิดเห็นของประชาชน"},{"word":"manipulation","pos":"noun","en_meaning":"the act of changing something by a trick or skill, especially to influence the actions of others in a way that they do not realize what is happening.","th_meaning":"การจัดข้อความหรือติดต่อสื่อสารเพื่อให้เกิดผลลัพธ์ที่ไม่เป็นทางเลือก","example_en":"He was accused of political manipulation.","example_th":"เขาถูกกล่าวหาว่าได้ทำการจัดข้อความทางการเมือง"},{"word":"manual","pos":"noun","en_meaning":"a book or set of instructions that explains how to do something.","th_meaning":"หนังสือหรือเซ็ตคำแนะนำที่อธิบายวิธีทำบางอย่าง","example_en":"I need a user manual for this new software.","example_th":"ฉันต้องการคำแนะนำผู้ใช้สำหรับซอฟต์แวร์ใหม่นี้"},{"word":"manuscript","pos":"noun","en_meaning":"a document written by hand, especially one composed as part of an academic or professional requirement","th_meaning":"เอกสารที่เขียนด้วยมือ เช่น หนังสือสมุดหรือนำเข้าสู่การศึกษาหรืองานวิจัย","example_en":"He submitted a manuscript for publication.","example_th":"เขาส่งผลงานตีพิมพ์ให้กับสำนักพิมพ์."},{"word":"marble","pos":"noun","en_meaning":"a metamorphic rock consisting of recrystallized carbonate minerals, typically white with black veins or patterns","th_meaning":"หินมาร์บัล","example_en":"The statue was made entirely of marble.","example_th":"พระ像是ที่ทำด้วยหินมาร์บัล"},{"word":"marginal","pos":"adjective","en_meaning":"barely adequate; nearly insufficient or inadequate.","th_meaning":"ไม่เพียงพอหรือน้อยมาก","example_en":"The quality of the product is marginal, barely meeting customer expectations.","example_th":"คุณภาพสินค้าเป็นระดับเสียก่อน ไม่เพียงพอที่จะทำให้ลูกค้าพึงพอใจ"},{"word":"marker","pos":"noun","en_meaning":"A pen or a stick used for writing or drawing on surfaces.","th_meaning":"ไม้บรรจุ","example_en":"I need to get a new marker because this one is out of ink.","example_th":"ฉันต้องซื้อไม้บรรจุใหม่ เพราะนี่หมดก็แล้ว"},{"word":"marrow","pos":"noun","en_meaning":"the soft tissue in the center of bones, rich in stem cells that produce blood cells","th_meaning":"เนื้อเยื่อในด้านล่างของกระดูกที่มีเซลล์รากเพาะเลือดอยู่","example_en":"The doctor removed the patient's bone marrow for a transplant.","example_th":"แพทย์ได้ทำการเอาเนื้อเยื่อกระดูกออกจากคนไข้เพื่อดำเนินการผ่าตัดเปลี่ยนเนื้อเยื่อ"},{"word":"maternal","pos":"adjective","en_meaning":"relating to one's mother or motherhood","th_meaning":"ที่เกี่ยวกับแม่หรือการเป็นแม่","example_en":"She is the maternal uncle of my friend.","example_th":"เธอคือญาติพ่อของเพื่อนผม"},{"word":"mathematical","pos":"adjective","en_meaning":"relating to or involving mathematics","th_meaning":"เกี่ยวกับคณิตศาสตร์","example_en":"He is a mathematical genius.","example_th":"เขาเป็นคนเชิงคณิตศาสตร์"},{"word":"matrix","pos":"noun","en_meaning":"a rectangular arrangement of numbers, symbols, or expressions in rows and columns","th_meaning":"เมทริกซ์ (métrik sa) หมายถึงโครงสร้างที่แสดงข้อมูลในรูปแบบตารางที่มีจำนวนและสัญลักษณ์หรือสมบัติการดำเนินการอยู่ในแถวและหลัก","example_en":"The matrix represents the data in a structured format.","example_th":"เมทริกซ์นี้แสดงข้อมูลในรูปแบบที่มีโครงสร้าง"},{"word":"maximize","pos":"verb","en_meaning":"to make or achieve the greatest amount or degree possible","th_meaning":"เพิ่มขึ้นสูงสุดหรือทำให้มีความเป็นไปตามที่ต้องการมากที่สุด","example_en":"We need to maximize our chances of success.","example_th":"เราจำเป็นต้องพัฒนาโอกาสสำเร็จให้สูงสุด"},{"word":"meaningful","pos":"adjective","en_meaning":"having or expressing a clear and coherent significance or purpose; significant","th_meaning":"มีความหมายที่ชัดเจนหรือมีความสำคัญ","example_en":"The speech was meaningful to him because it reminded him of his childhood.","example_th":"การพูดคุยนั้นมีความหมายในสำนึกของเขาว่าได้รับการเตือนภัยจากอาชญากรรม"},{"word":"mechanic","pos":"noun","en_meaning":"a person who repairs and maintains mechanical devices or vehicles.","th_meaning":"ผู้ช่างซ่อมแซมหรือบำรุงรักษาอุปกรณ์เครื่องจักรและยานพาหนะ","example_en":"He is a skilled mechanic.","example_th":"เขารู้จักการซ่อมบำรุงอุปกรณ์เครื่องจักรได้ดี"},{"word":"mechanical","pos":"adjective","en_meaning":"relating to machines or the making of things with machines","th_meaning":"ที่เกี่ยวกับเครื่องจักรหรือการสร้างสิ่งต่าง ๆ ด้วยเครื่องจักร","example_en":"He is a mechanical engineer.","example_th":"เขานักวิศวกรรมเครื่องกล"},{"word":"media","pos":"noun","en_meaning":"means of communication, press, or information","th_meaning":"สื่อสารหรือข่าว传媒","example_en":"The media are reporting on the scandal.","example_th":"สื่อมวลชนกำลังรายงานเรื่องราวที่เกิดขึ้น"},{"word":"mediate","pos":"verb","en_meaning":"to intervene in a dispute or difference between two parties to help them reach an agreement","th_meaning":"ให้ผู้กลางช่วยแก้ไขข้อแย่ใจระหว่างสองฝ่าย","example_en":"The mediator helped both sides find common ground.","example_th":"ผู้กลางช่วยให้ทั้งสองฝ่ายหาจุดส่วนร่วมกัน"},{"word":"membrane","pos":"noun","en_meaning":"a layer of tissue that separates parts of an organism or cell and controls what enters and leaves the cell.","th_meaning":"มembrane ในภาษาไทยแปลว่า คลื่นหรือผิวหนังที่สร้างระหว่างส่วนต่าง ๆ ของระบบชีวภาพหรือเซลล์และควบคุมการเข้ามาและออกไปของสาร","example_en":"The cell membrane is essential for maintaining the cell's integrity.","example_th":"คลื่นเซลล์เป็นสิ่งที่จำเป็นในการรักษาความแข็งแรงและความถูกต้องของเซลล์"},{"word":"memorize","pos":"verb","en_meaning":"to learn and remember something for a long time","th_meaning":"จำ (chan)","example_en":"I need to memorize these dates for the exam.","example_th":"ฉันต้องการจะจดจำวันสำคัญนี้สำหรับการสอบ"},{"word":"mentor","pos":"noun","en_meaning":"a person who teaches or advises another, especially in a professional or personal capacity.","th_meaning":"ผู้สอนหรือปรึกษานักศึกษาที่มีประสบการณ์ในอาชีพ","example_en":"He has been my mentor throughout my career.","example_th":"เขามีบทบาทเป็นครูและผู้ปรึกษาตลอดชีวิตการทำงานของฉัน"},{"word":"mercury","pos":"noun","en_meaning":"a heavy, silvery metallic element with the symbol Hg and atomic number 80","th_meaning":"แมงกับ (mangkap)","example_en":"Mercury is a metallic element.","example_th":"แมงกับเป็นธาตุสิ่งแวดล้อมประเภทโลหะ."},{"word":"merge","pos":"verb","en_meaning":"to combine two or more things into a single thing","th_meaning":"ส่งต่อหรือรวมเข้าด้วยกัน","example_en":"The rivers merged into one large river.","example_th":"แม่น้ำหลายแห่งส่งต่อกับกันเป็นแม่น้ำใหญ่"},{"word":"messenger","pos":"noun","en_meaning":"a person who carries news or packages from one place to another","th_meaning":"ผู้ส่งข้อมูลหรือบรรลุภัณฑ์จากสถานที่หนึ่งไปยังสถานที่อื่น","example_en":"The messenger delivered the package right on time.","example_th":"ผู้ส่งส่งพัสดุตรงเวลา"},{"word":"metabolism","pos":"noun","en_meaning":"The process by which an organism converts nutrients into energy and maintains life.","th_meaning":"กระบวนการที่เกิดขึ้นในร่างกายของมีชีวิตเพื่อเปลี่ยนแปลงสารอาหารเป็นพลังงานและรักษาการดำรงชีวิต","example_en":"A healthy diet is essential for maintaining a good metabolism.","example_th":"การทำอาหารที่ดีคือสิ่งที่จำเป็นสำหรับการรักษาสมองในการเผาผลาญพลังงาน"},{"word":"metaphor","pos":"noun","en_meaning":"a figure of speech in which a word or phrase is applied to an object or action to which it is not literally applicable.","th_meaning":"คำศัพท์ที่ใช้เพื่อแสดงความหมายของสิ่งหนึ่งด้วยวิธีการอ้างอิงหรือเปรียบเทียบกับสิ่งอื่นๆ","example_en":"Time is a thief.","example_th":"เวลาเหมือนคนลอกเลียนแบบ"},{"word":"methodology","pos":"noun","en_meaning":"a set of procedures and principles used in a particular field of study or practice, especially one that has been developed for a specific task or project.","th_meaning":"กลยุทธ์หรือกระบวนการที่ใช้ในสาขาการศึกษาหรือธุรกิจใด ๆ ซึ่งมีรายละเอียดเฉพาะสำหรับงานหรือโครงการ某อย่าง","example_en":"The team followed a rigorous methodology to complete the project on time.","example_th":"ทีมใช้กลยุทธ์รัดกุมในการทำโปรเจคและส่งเสริมไปตามกำหนดเวลา"},{"word":"micro","pos":"noun","en_meaning":"very small, tiny","th_meaning":"เล็กที่สุด หรือ น้อยที่สุด","example_en":"The microbe is too small to be seen with the naked eye.","example_th":"แบคทีเรียก็เล็กมากจนถึงตาเปล่าไม่เห็นได้"},{"word":"mid","pos":"adjective, adverb","en_meaning":"in the middle; average","th_meaning":"ตรงกลาง; ระดับเฉลี่ย","example_en":"The movie was mid-paced.","example_th":"ภาพยนตร์นั้นมีความเร็วเฉลี่ย"},{"word":"migrate","pos":"verb","en_meaning":"to move from one place or country to another, especially because of social, economic, or political reasons.","th_meaning":"การย้ายตัวเองไปอยู่ในที่อื่น เนื่องจากเหตุผลเชิงสังคม เศรษฐกิจ หรือ 정치","example_en":"Many people migrate to find better jobs and a higher standard of living.","example_th":"คน 많은ย้ายไปอยู่ที่อื่นเพื่อหางานดีและชีวิตคุณภาพสูงขึ้น"},{"word":"migration","pos":"noun","en_meaning":"the movement of people from one country or region to another, especially for permanent residence.","th_meaning":"การย้ายหรือส่งผ่านคนจากประเทศหรือภูมิภาคหนึ่งไปยังประเทศหรือภูมิภาคอื่นอย่างสม่ำเสมอ","example_en":"The migration of people to the city for better job opportunities.","example_th":"การย้ายคนจำนวนมากไปที่เมืองเพื่อโอกาสการทำงานดีขึ้น"},{"word":"millimeter","pos":"noun","en_meaning":"a unit of length equal to one thousandth of a meter","th_meaning":"หน่วยความยาวที่เท่ากับพันที่หนึ่งของเมตร","example_en":"The table is 100 millimeters thick.","example_th":"โต๊ะนี้มีความสูง 100 มิลลิเมตร"},{"word":"mineral","pos":"noun","en_meaning":"a naturally occurring inorganic solid with a definite chemical composition and an ordered internal structure","th_meaning":"สิ่งแวดล้อมที่เกิดขึ้นจากธรรมชาติและมีโครงสร้างอินทรีย์และองค์ประกอบเคมีที่แน่นอน","example_en":"Quartz is a common mineral.","example_th":"ดินเผือกเป็นสิ่งแวดล้อมที่พบได้บ่อย"},{"word":"minimal","pos":"adjective","en_meaning":"the least amount or number of something necessary; the bare essentials","th_meaning":"ที่น้อยที่สุด ที่จำเป็นอย่างยิ่ง","example_en":"She lives a minimal lifestyle.","example_th":"เธอมีชีวิตแบบอย่างที่น้อยที่สุด"},{"word":"minimize","pos":"verb","en_meaning":"to make something as small or little as possible","th_meaning":"ให้สิ่งมีอยู่น้อยลง ลดตัวเลขหรือปรับขนาดอย่างน้อย","example_en":"He tried to minimize the damage.","example_th":"เขาพยายามทำให้ความเสียหายที่เกิดขึ้นน้อยที่สุด"},{"word":"minus","pos":"verb, adjective","en_meaning":"to subtract; less than","th_meaning":"ลบ (lak)","example_en":"What is 5 minus 2?","example_th":"5 - 2 = 3"},{"word":"missile","pos":"noun","en_meaning":"a weapon designed to be launched from a vehicle and fly through the air to strike a target, typically with explosives or other warheads.","th_meaning":"อุปกรณ์ที่ออกแบบมาเพื่อปล่อยออกจากยานพาหนะและทวีคุณภาพเพื่อโจมตีเป้าหมาย โดยมักจะมีระเบิดหรืออัวสัญญาณรบกวนอื่น ๆ ภายใน","example_en":"The missile was launched with precision to destroy the enemy's stronghold.","example_th":"จรวดถูกปล่อยออกด้วยความแม่นยำเพื่อทำลายฐานที่อยู่ของศัตรู"},{"word":"mobility","pos":"noun","en_meaning":"the ability to move easily from one place to another; freedom of movement","th_meaning":"ความสามารถในการเดินทางหรือการเคลื่อนที่อย่างสะดวกสบาย","example_en":"The company offers excellent mobility for its employees.","example_th":"บริษัทให้พนักงานประโยชน์ในการเดินทางในรูปแบบที่ดี"},{"word":"modification","pos":"noun","en_meaning":"the act of changing something by making small or detailed changes; an alteration","th_meaning":"การเปลี่ยนแปลง หรือ การแก้ไขบางส่วนเพื่อปรับปรุง","example_en":"The architect made several modifications to the original design.","example_th":"สถาปัตยกรรม viênทำการเปลี่ยนแปลงหลายอย่างในออกแบบเดิม"},{"word":"mole","pos":"noun","en_meaning":"a small mammal that lives underground and eats insects, worms, etc.","th_meaning":"หนู (nū)","example_en":"A mole is a small animal.","example_th":"หนูนั้นมีชิ้นส่วนที่สามารถล่าแมลงได้"},{"word":"molecular","pos":"adjective","en_meaning":"relating to or involving molecules","th_meaning":"ที่เกี่ยวกับหรือมีส่วนร่วมกับโมเลกุล","example_en":"The molecular structure of water is H2O.","example_th":"โครงสร้างโมเลกุลของน้ำคือ H2O"},{"word":"molecule","pos":"noun","en_meaning":"the smallest fundamental unit of a chemical compound that can take part in a chemical reaction","th_meaning":"โมเลกุล (molekul)","example_en":"Water is composed of two hydrogen molecules and one oxygen molecule.","example_th":"น้ำประกอบด้วยสองโมเลกุลของไฮโดรเจนและโมเลกุลหนึ่งของออกซิเจน"},{"word":"momentum","pos":"noun","en_meaning":"the force that an object in motion possesses, enabling it to continue moving at the same velocity unless acted upon by an external force","th_meaning":"ความสัมพันธ์ระหว่างมวลของวัตถุกับความเร็วในการเคลื่อนที่","example_en":"The car had a lot of momentum and couldn't be stopped easily.","example_th":"รถมีพลังงานโมเมนตัムมากจึงยากจะหยุดได้"},{"word":"monetary","pos":"noun","en_meaning":"relating to money or the exchange of money; financial","th_meaning":"เกี่ยวกับเงินหรือการแลกเปลี่ยนเงิน; การเงิน","example_en":"The monetary value of the house is significant.","example_th":"ค่าของบ้านในมูลค่าเงินเป็นอย่างมาก"},{"word":"monkey","pos":"noun","en_meaning":"an animal of the primate family, typically characterized by a long tail and grasping hands and feet.","th_meaning":"สัตว์ป่าหรือนกแมลงชนิดหนึ่งที่มีช่วงยาวและมีอิทธิพลในการจับสิ่งของด้วยข้อมือและเท้า","example_en":"The zoo has a variety of monkeys.","example_th":"สวนสัตว์มีหลากหลายชนิดนกแมลง"},{"word":"monopoly","pos":"noun","en_meaning":"the complete control or ownership of something by a single person or company.","th_meaning":"การควบคุมหรือครอบครองสิ่งบางอย่างโดยผู้เดียวหรือนักธุรกิจเท่านั้น","example_en":"The government must break up the monopoly in the telecommunications industry.","example_th":"정ต้องแยกแยะการควบคุมทางดิจิตอลในภาคสื่อสารระหว่างผู้ประกอบการคนเดียว"},{"word":"morality","pos":"noun","en_meaning":"the principles concerning the distinction between right and wrong or good and bad behavior.","th_meaning":"ความจริยธรรม คุณภาพที่ทำให้เรามีคติต่อสิ่งที่ถูกและผิด","example_en":"We must adhere to high moral standards in our work.","example_th":"เราต้องปฏิบัติตามจริยธรรมที่สูงในงานของเรานะ"},{"word":"morphological","pos":"adjective","en_meaning":"relating to the study of word structure and formation, especially the way in which words are put together from smaller parts.","th_meaning":"เกี่ยวกับการศึกษาโครงสร้างและรูปแบบของคำ หรือวิธีที่คำสามารถประกอบด้วยส่วนย่อย","example_en":"The morphological analysis of a language involves examining how words are formed from smaller units.","example_th":"การวิเคราะห์มโนรมัลล์ของภาษาอาจต้องการตรวจสอบว่าคำใด ๆ สามารถสร้างขึ้นจากส่วนย่อยได้อย่างไร"},{"word":"morphology","pos":"noun","en_meaning":"the branch of linguistics concerned with the structure and formation of words in a particular language, including the processes that yield related or derived forms.","th_meaning":"สาขาของภาษาศาสตร์ที่เกี่ยวกับโครงสร้างและการสร้างคำในภาษานั้นๆ โดยรวมกระบวนการที่จะให้คำที่คล้ายกันหรือต่อเนื่อง กับกัน","example_en":"The study of morphology helps us understand the rules governing word formation.","example_th":"การศึกษา Morphology จะช่วยเราเข้าใจกฎเกณฑ์ในการสร้างคำ"},{"word":"mortality","pos":"noun","en_meaning":"the condition or quality of being mortal; the fact of being subject to death","th_meaning":"ภาวะหรือคุณสมบัติที่จะตาย; ความเป็นไปได้ที่จะตาย","example_en":"Every person faces mortality.","example_th":"ทุกคนต้องเผชิญกับภาวะตาย"},{"word":"motif","pos":"noun","en_meaning":"a decorative design or pattern that is repeated, especially on textiles and clothing.","th_meaning":"ลายหรูหราที่ซ้ำกันอยู่หลายครั้งในเครื่องแต่งกายและผ้า;","example_en":"The dress features a beautiful floral motif.","example_th":"กระโปรงนี้มีลายดอกสวยงามในรูปแบบของ_motif_"},{"word":"motive","pos":"noun","en_meaning":"the reason or cause for an action or event","th_meaning":"ความต้องการหรือสาเหตุที่กระทำบางอย่างเกิดขึ้น","example_en":"The motive behind his actions was personal gain.","example_th":"สาเหตุของพฤติกรรมของเขาคือประโยชน์ส่วนบุคคล"},{"word":"multi","pos":"adjective, adverb","en_meaning":"involving more than one; composed of several parts or elements.","th_meaning":"มีหลายส่วนหรือองค์ประกอบ","example_en":"A multi-story building has many floors. She works in a multi-cultural office.","example_th":"อาคารที่มีหลายชั้นมีหลายพื้นที่ เธอทำงานในสำนักงานที่มีผู้บริหารหลากหลายเชื้อชาติ"},{"word":"multinational","pos":"noun","en_meaning":"A company that operates or has operations in more than one country.","th_meaning":"บริษัทที่ดำเนินกิจการหรือมีสาขาในหลายประเทศ","example_en":"Johnson & Johnson is a multinational corporation.","example_th":"บริษัทจอห์นสันด์แวดล้อม เป็นบริษัทที่เป็นเอกชนและมีสาขาในหลายประเทศ"},{"word":"multiply","pos":"verb","en_meaning":"to calculate the product of two or more numbers","th_meaning":"คูณ (kuon)","example_en":"2 multiplied by 3 equals 6.","example_th":"2 คูณ 3 เท่ากับ 6."},{"word":"mutation","pos":"noun","en_meaning":"a change in the structure of a gene or chromosome, leading to a different trait or characteristics.","th_meaning":"การเปลี่ยนแปลงในโครงสร้างของกลีนหรือโครโมโซม ทำให้เกิดลักษณะหรือความแตกต่าง","example_en":"The mutation in the gene caused a change in the protein sequence.","example_th":"การแปรรูปในกลีนได้ส่งผลให้เกิดการเปลี่ยนแปลงในลำดับของโปรตีน"},{"word":"myth","pos":"noun","en_meaning":"a traditional story, especially one that is regarded as historical but which has no basis in fact.","th_meaning":"เรื่องเล่าที่เกิดขึ้นในอดีตแต่มักไม่มีความเป็นจริง","example_en":"He believes everything he reads on the internet, including myths and legends.","example_th":"เขามเชื่อว่าทุกสิ่งที่เห็นบนอินเทอร์เน็ต รวมถึงเรื่องราวแบบเสมือนความจริงและประพันธ์"},{"word":"naked","pos":"adjective","en_meaning":"completely without clothes or covering, especially the body","th_meaning":"ไม่ใส่ผ้าหรือเชื้อหนังอย่างสมบูรณ์ ทั่วไปหมายถึงร่างกายที่เปล่งแสงได้ทั้งหมด แต่บางครั้งอาจหมายถึงไม่มีการปกป้องเรื่องส่วนตัว","example_en":"He went naked to the beach.","example_th":"เขานำไปอยู่ในหาดแบบเปล่งแสง"},{"word":"namely","pos":"adverb, conjunction","en_meaning":"that is to say; in other words","th_meaning":"ที่นั่นคือ เช่นกัน","example_en":"He arrived late, namely after 10 pm.","example_th":"เขามาช้า เมื่อเวลา 23.00 น."},{"word":"nasty","pos":"adjective","en_meaning":"unpleasant or offensive in behavior, speech, or appearance","th_meaning":"ไม่ดีใจหรือเป็นอันตราย","example_en":"He was a nasty person to deal with.","example_th":"เขาคนที่ยากจะรับประทาน"},{"word":"nationalism","pos":"noun","en_meaning":"the belief in the supreme importance of one's own country and nation","th_meaning":"ความเชื่อมั่นในความสำคัญสูงที่สุดของประเทศและชาติพันธุ์","example_en":"He has a strong sense of nationalism.","example_th":"เขามีความเชื่อมั่นในความสำคัญสูงที่สุดของประเทศ"},{"word":"neat","pos":"adjective","en_meaning":"tidy and well-arranged","th_meaning":"เรียบเรียงและสะอาด","example_en":"He keeps his room neat.","example_th":"เขานั่งทำงานอยู่ในห้องที่เรียบเรียงและสะอาด"},{"word":"necessity","pos":"noun","en_meaning":"something that is required or essential","th_meaning":"สิ่งที่จำเป็นหรือได้รับความสำคัญ","example_en":"Water is a necessity for life.","example_th":"น้ำเป็นสิ่งที่จำเป็นสำหรับการดำรงชีวิต"},{"word":"neo","pos":"noun","en_meaning":"new, recent, contemporary","th_meaning":"ใหม่, อุดated, เสมอท่า","example_en":"This is a neo-classical building.","example_th":"นี่คือบ้านแบบคลาสิกใหม่"},{"word":"nest","pos":"noun","en_meaning":"a hollow structure or hole made by animals, especially birds, for laying eggs and raising young.","th_meaning":"หลุมหรือซ่าที่สัตว์ทำให้สำหรับวางไข่และเลี้ยงลูก","example_en":"The bird built its nest in a high tree branch.","example_th":"นกสร้างหลุมในขั้นของไม้ที่สูง"},{"word":"neural","pos":"noun, adjective","en_meaning":"relating to or affecting the nerves and nervous system; of, relating to, or characterized by a network of neurons or a neural network","th_meaning":"เกี่ยวกับหรือมีส่วนร่วมกับระบบประสาทและนิวเรียล; ของ, เกี่ยวกับ, หรือเป็นอย่างไรที่ต้องการเนื้อห์หรือเครือข่ายเดียวกัน","example_en":"Neural networks are used in artificial intelligence.","example_th":"เครือข่ายประสาทถูกใช้ในด้าน trí Tuệ"},{"word":"neuron","pos":"noun","en_meaning":"a cell in the nervous system that receives, processes, and transmits information.","th_meaning":"เซลล์ในระบบประสาทที่รับรู้ การประมวลผล และส่งข้อมูล","example_en":"The function of neurons is to transmit electrical signals from one neuron to another.","example_th":"ฟังก์ชันของนีโตรอนคือการส่งสัญญาณไฟฟ้าจากหนึ่งนีโตรอนไปยังนีโตรอนอื่น"},{"word":"neutral","pos":"adjective","en_meaning":"having no particular attitude or opinion, especially with regard to political matters; not influenced by external factors.","th_meaning":"ไม่มีความคิดเห็นหรือสิ่งแวดล้อมที่เป็นอยู่ที่ไม่ได้รับผลกระทบจากแหล่งข้อมูลภายนอก","example_en":"She maintains a neutral stance on political issues.","example_th":"เธอมีการมองเห็นทางกลางต่อประเด็น 정치"},{"word":"nicely","pos":"adverb","en_meaning":"in a pleasant or satisfactory manner","th_meaning":"ด้วยความสะดวกสบายหรือเป็นไปตามที่คาดหวัง","example_en":"He served the food nicely.","example_th":"เขารับประทานอาหารอย่างดี"},{"word":"niche","pos":"noun","en_meaning":"a specialized area of interest or expertise, a small market segment that is not widely known or served by large companies.","th_meaning":"ตลาดเล็กหรือช่องทางการขายที่เฉพาะเจาะจงหรือไม่เป็นทั่วไป","example_en":"He found great success in the niche of high-end custom clothing.","example_th":"เขารับรู้ความสำเร็จในตลาดเชิงลึกของเสื้อผ้าสูงค่ากับการออกแบบตัวเอง"},{"word":"nitrogen","pos":"noun","en_meaning":"a chemical element with the symbol N and atomic number 7; a colorless, odorless, tasteless, non-toxic diatomic gas","th_meaning":"แก๊สออกไซด์ไนโตรเจน (gás oksida nítron)","example_en":"Nitrogen is used in the production of fertilizer.","example_th":"ไนโตรเจนใช้ในการผลิตยาปุ๋ย"},{"word":"noble","pos":"adjective","en_meaning":"having or showing high moral standards and a sense of honor; dignified.","th_meaning":"น่าภูมิใจหรือเป็นคนที่ดีและเคารพอื่น ๆ","example_en":"He is a noble man.","example_th":"เขาเป็นคนที่ดีและเคารพอื่น ๆ"},{"word":"node","pos":"noun","en_meaning":"a point where lines or wires meet or branch out; a particular point in time; an individual part of a computer network.","th_meaning":"จุดประกายหรือจุดตัดสินทางในสายไฟ การเชื่อมต่อคอมพิวเตอร์","example_en":"The intersection of the roads is a busy node.","example_th":"จุดประกายที่มีการขนส่งคนเยอะ"},{"word":"noisy","pos":"adjective","en_meaning":"producing sound with great volume, especially unintelligible sound; loud and disorderly","th_meaning":"เสียงรบกวน","example_en":"The party was noisy with music and dancing.","example_th":"งานเลี้ยงมีเสียงรบกวนด้วยเพลงและเต้นรำ"},{"word":"nominal","pos":"noun","en_meaning":"relating to or denoting a noun","th_meaning":"เกี่ยวกับหรือคุณลักษณะของคำนาม","example_en":"The nominal value of the asset is $100,000.","example_th":"มูลค่าทางการเงินของทรัพยากรนี้คือ 100,000"},{"word":"non","pos":"adjective","en_meaning":"not","th_meaning":"ไม่ (mai)","example_en":"The book is non-fiction.","example_th":"หนังสือเป็นที่ประดิษฐ์"},{"word":"nonetheless","pos":"adverb","en_meaning":"nevertheless, despite this, in any case","th_meaning":"อย่างไรก็ตาม, ในทางกลับกัน, แม้ว่าจะ...ก็ตาม","example_en":"I failed the exam, but I'll get a job nonetheless.","example_th":"ฉันไม่ผ่านการสอบแต่อย่างไรก็ตามฉันยังได้รับงาน"},{"word":"nonlinear","pos":"adjective","en_meaning":"not following a straight line or a simple pattern; not linear.","th_meaning":"ไม่ทำตามเส้นตรงหรือรูปแบบง่ายๆ ไม่ได้เป็นเชิงเส้น","example_en":"Nonlinear systems are often used in the study of complex phenomena, such as weather patterns and biological processes.","example_th":"ระบบที่ไม่เป็นเชิงเส้นมักจะใช้ในการศึกษาปรากฏการณ์ที่ซับซ้อน เช่น รูปแบบอากาศและกระบวนการทางชีวภาพ"},{"word":"norm","pos":"noun, verb","en_meaning":"a standard or expected way of doing something; a rule or regulation.","th_meaning":"มาตรฐานหรือวิธีทำบางอย่างที่ถูกคาดหวังหรือกำหนดล่วงหน้า","example_en":"The company has strict norms for employee behavior.","example_th":"บริษัทมีข้อกำหนดทางจริยธรรมและบวกต่อไปนี้สำหรับพฤติกรรมพนักงาน"},{"word":"notation","pos":"noun","en_meaning":"A system of writing or recording information using symbols.","th_meaning":"ระบบการเขียนหรือบันทึกข้อมูลโดยใช้สัญลักษณ์","example_en":"The notation for music is called sheet music.","example_th":"การเรียกอ่านเครื่องหมายทางดนตรีในภาษาไทยคือ เนื้อเพลง"},{"word":"novice","pos":"noun","en_meaning":"a beginner or someone who is not experienced in something","th_meaning":"คนที่เป็นใหม่หรือผู้เริ่มต้นในสิ่งใดๆ","example_en":"She was a novice cook.","example_th":"เธอเป็นนักทำอาหารผู้เริ่มต้น"},{"word":"nucleus","pos":"noun","en_meaning":"the central part of an atom, containing the protons and neutrons","th_meaning":"นิวเคลียส หรือศูนย์กลางอะมอนีม","example_en":"The nucleus is surrounded by a cloud of electrons.","example_th":"นิวเคลียสอยู่รอบ ๆ เม็ดกลับพลัง"},{"word":"numerical","pos":"noun, adjective","en_meaning":"relating to or involving numbers; consisting of digits or figures.","th_meaning":"เกี่ยวกับเลขหรือตัวเลข","example_en":"He is a numerical genius.","example_th":"เขาเป็นคนที่มีความรู้ความสามารถในการคำนวณและประดิษฐ์อย่างมาก"},{"word":"nutrient","pos":"noun","en_meaning":"a substance that is essential for the growth and maintenance of an organism, especially a plant or animal.","th_meaning":"สารที่จำเป็นสำหรับการเติบโตและรักษาสุขภาพของต้นไม้หรือสัตว์","example_en":"The soil lacks nutrients, so the plants won't grow properly.","example_th":"ดินขาดสารอาหาร ส่งผลทำให้พืชไม่เติบโตดี"},{"word":"objection","pos":"noun","en_meaning":"an expression of disapproval or disagreement, typically in a formal or legal context.","th_meaning":"การปฏิเสธ หรือขัดแย้งบางอย่าง","example_en":"He raised an objection to the proposal.","example_th":"เขานำเสนอข้อต่อทวีกเกี่ยวกับคำนึงที่ถูกเสนอ"},{"word":"obscure","pos":"adjective","en_meaning":"difficult to understand or explain; vague or unclear","th_meaning":"ซับซ้อนที่สุดหรือยากเข้าใจ","example_en":"The meaning of the term is obscure.","example_th":"ความหมายของคำนี้เป็นอันตราย"},{"word":"observer","pos":"noun","en_meaning":"one who watches or observes something, especially a scientific experiment or event.","th_meaning":"ผู้ที่ดูหรือสังเกตบางอย่าง หรือการทดลองวิทยาศาสตร์และเหตุการณ์บางอย่าง","example_en":"He was chosen as an observer for the science fair.","example_th":"เขารถูกเลือกให้เป็นผู้ที่ดูในงานสัมมนาวิทยาศาสตร์"},{"word":"obtain","pos":"verb","en_meaning":"to get or receive something by legal means, especially from someone else.","th_meaning":"ได้รับหรือจับมือกับบางสิ่งอย่างถูกกฎหมายจากคนอื่น","example_en":"He obtained a promotion at work.","example_th":"เขาได้รับการขยันงาน"},{"word":"occupation","pos":"noun","en_meaning":"The work or profession for which one is paid; a job.","th_meaning":"อาชีพ งานที่ทำเพื่อได้เงิน","example_en":"She found her occupation at the age of twenty-five.","example_th":"เธอพบอาชีพอันเหมาะสมในอายุรู้สึกวัย 25"},{"word":"occurrence","pos":"noun","en_meaning":"the act of happening; an instance or case of something that happens","th_meaning":"การเกิดขึ้น; กรณีหรืออันดับที่ซ้ำๆบางอย่างเกิดขึ้น","example_en":"The occurrence of the storm was a surprise to everyone.","example_th":"การเกิดลมร้อนเป็นเรื่องที่ผู้คนทุกคนคาดหวังไม่"},{"word":"offspring","pos":"noun","en_meaning":"children or descendants.","th_meaning":"ลูกศัพท์หรือบรรพบุรุษหลาน","example_en":"The offspring of this union will grow up to be strong and independent.","example_th":"ลูกทางปู่หลานจะโตขึ้นมาเป็นคนแข็งแรงและอิสระ"},{"word":"onset","pos":"noun","en_meaning":"the beginning or starting point of something","th_meaning":"จุดเริ่มต้นหรือช่วงเวลาที่เกิดขึ้น","example_en":"The onset of spring brings new life to the garden.","example_th":"การเริ่มของฤดูกาลใบไม้ร่วงทำให้สวนบานเต็มไปด้วยความสดชื่น"},{"word":"onwards","pos":"adverb","en_meaning":"in a forward direction; continuing to move ahead or progress","th_meaning":"ไปต่อไปหรือถัดไป ดำเนินการต่อ","example_en":"We will continue onwards with our project.","example_th":"เราจะดำเนินโครงการของเรานี้ต่อไป"},{"word":"optical","pos":"adjective","en_meaning":"relating to light or the properties of light","th_meaning":"เกี่ยวกับแสงหรือคุณสมบัติของแสง","example_en":"The optical fibers are used for long-distance communication.","example_th":"สายประท้วงมองเห็นใช้ในการสื่อสารระยะไกล"},{"word":"optimal","pos":"adjective","en_meaning":"the best possible or most suitable for a particular purpose or need; the most effective in terms of quality, cost, energy consumption, etc.","th_meaning":"ที่ดีที่สุดหรือเหมาะสมมากที่สุดสำหรับวัตถุประสงค์หรือความจำเป็นเฉพาะ","example_en":"The optimal solution to the problem is the one that provides the best outcome with the least resources.","example_th":"การแก้ปัญหาแบบที่ดีที่สุดคือที่ให้ผลลัพธ์ดีที่สุดด้วยทรัพยากรน้อยที่สุด"},{"word":"optimum","pos":"noun","en_meaning":"the best possible or most favorable condition or quality","th_meaning":"การที่ดีที่สุดหรือคุณภาพที่ดีที่สุด","example_en":"The temperature of the incubator should be set at its optimum.","example_th":"อุณหภูมิของกล่องฟักไข่ควรถูกตั้งให้มีค่าที่เหมาะสมที่สุด"},{"word":"oral","pos":"noun, adjective","en_meaning":"relating to the mouth or voice; spoken rather than written","th_meaning":"ที่มีเสียงหรือสัญญาณทางช่องปาก","example_en":"He gave me oral instructions.","example_th":"เขากับฉันให้คำแนะนำด้วยเสียง"},{"word":"organ","pos":"noun","en_meaning":"an individual structure within an organism, especially one that performs a specific function or set of functions.","th_meaning":"โครงสร้างภายในสิ่งมีชีวิตที่ได้รับการพัฒนาเพื่อทำงานเฉพาะอย่าง某อย่าง","example_en":"The heart is an organ that pumps blood throughout the body.","example_th":"หัวใจคือโครงสร้างภายในที่ดูแลการทำงานของเลือดในร่างกาย"},{"word":"organism","pos":"noun","en_meaning":"a living thing, especially a plant or an animal.","th_meaning":"สิ่งมีชีวิต เช่น ต้นไม้ การ์ดีน สัตว์ป่า","example_en":"All living organisms require water to survive.","example_th":"ทุกสิ่งมีชีวิตจำเป็นต้องมีน้ำเพื่อการดำรงชีวิต"},{"word":"orient","pos":"verb","en_meaning":"to determine or face in a particular direction, especially north.","th_meaning":"จัดตั้งหรือทำให้มีการส่องแสงตรงไปข้างหน้า","example_en":"He needs to orient himself before the meeting starts.","example_th":"เขารู้จักทิศทางแล้วก่อนที่จะมีการประชุม"},{"word":"orientation","pos":"noun","en_meaning":"The position of something in space; the way that something is turned or directed.","th_meaning":"ทิศทางหรือตำแหน่งของสิ่งอยู่ในอวกาศ; วิธีการหมุนหรือนำทางของบางสิ่ง","example_en":"The orientation of the building was north-south.","example_th":"ทิศทางของอาคารเป็นทางออกและฝั่งซ้าย"},{"word":"oscillation","pos":"noun","en_meaning":"the act of swinging back and forth or up and down, a continuous back-and-forth movement.","th_meaning":"การสกปรกหรือการเคลื่อนไหวกลับมาตัวหน้าไปตัวหลังอย่างต่อเนื่อง","example_en":"The pendulum's oscillation is measured in seconds.","example_th":"ความสกปรกของระนาบวัดด้วยช่วงเวลาเป็นวินาที"},{"word":"outer","pos":"adjective","en_meaning":"being on the outside; exterior; surrounding","th_meaning":"อยู่นอก (yauw ngoe)","example_en":"The outer walls of the building are made of bricks.","example_th":"กำแพงนอกของ 건축물ถูกสร้างด้วยก้อนหิน"},{"word":"outlet","pos":"noun","en_meaning":"an opening or door that provides access to a room or passage, especially in an exterior wall of a building.","th_meaning":"ปลughole","example_en":"He went through the back outlet to reach the storage area.","example_th":"เขามาใช้จุดดันหลังออกไปที่ห้องเก็บของ"},{"word":"overhead","pos":"noun, verb","en_meaning":"a structure or system carried above or over something; to place (something) above or over another thing.","th_meaning":"โครงสร้างหรือระบบที่ตั้งอยู่เหนือสิ่งใดสิ่งหนึ่ง หรือ การวางให้สิ่งอยู่เหนือหรือด้านบนของสิ่งอื่น","example_en":"The building has an overhead crane.","example_th":"อาคารมีเครื่องยกที่ตั้งขึ้นมา"},{"word":"overlap","pos":"verb","en_meaning":"to extend beyond the limits of something else or to be partially or completely on top of each other","th_meaning":"ย้อนกัน, ตัดสินเจ้าของ","example_en":"The new building overlaps with an old one.","example_th":"อาคารใหม่ทับซ้อนกับอาคารเก่า"},{"word":"overview","pos":"noun","en_meaning":"a general survey or summary of a subject","th_meaning":"ภาพรวมหรือการมองเห็นแบบทั่วถึงของเรื่องราวหรือสถานการณ์","example_en":"The report provides an overview of the project's progress.","example_th":"รายงานนี้นำเสนอภาพรวมของการทำโครงการ"},{"word":"oxidize","pos":"verb","en_meaning":"to combine with oxygen, especially to form a rust or oxide","th_meaning":"ขัดต้านกับออกซิเจนหรือถูกออกไซด์","example_en":"The metal oxidized over time.","example_th":"โลหะเหล่านี้ขัดต้านกับออกซิเจนแล้วเกิดการออกไซด์"},{"word":"oxygen","pos":"noun","en_meaning":"a chemical element with the symbol O and atomic number 8. It is essential for most forms of life on Earth.","th_meaning":"ออกซิเจน","example_en":"We need to breathe in oxygen to survive.","example_th":"เราต้องหายใจออกซิเจนเพื่อที่จะรอดชีวิต"},{"word":"painful","pos":"adjective","en_meaning":"causing pain or suffering; unpleasant","th_meaning":"ทำให้รู้สึกเจ็บปวดหรือไม่สบายใจ","example_en":"The patient's wound was painful.","example_th":"บาดเจ็บของคนไข้นั้นทำให้รู้สึกเจ็บปวด"},{"word":"par","pos":"noun, verb, adjective","en_meaning":"a standard level of performance; a set of rules or guidelines; to reduce to the minimum necessary; to adjust to a particular setting or state","th_meaning":"ระดับมาตรฐาน; กฎหรือข้อกำหนด; เพื่อลดลงสู่ระดับที่จำเป็นต่ำที่สุด; เพื่อปรับให้ตรงกับการตั้งค่าหรือสถานะ","example_en":"He played par at golf.","example_th":"เขาร่วมแข่งกอล์ฟและเล่นได้อยู่ในระดับมาตรฐาน"},{"word":"paradigm","pos":"noun","en_meaning":"a model or pattern, especially one that is to be followed in making something else.","th_meaning":"แบบอย่าง หรือแม่แบบ","example_en":"The company has a new business paradigm.","example_th":"บริษัทมีการเปลี่ยนแปลงแบบอย่างในธุรกิจ"},{"word":"paradox","pos":"noun","en_meaning":"A statement or situation that seems contradictory or incapable of being true.","th_meaning":"คำพูดหรือสถานการณ์ที่เทียบกันตรงข้ามหรือไม่สามารถเป็นจริงได้","example_en":"The idea that time travel is possible is a paradox.","example_th":"ความคิดว่าการเดินทางในเวลาเป็นไปได้นั้นเป็นพาราโดกซ์"},{"word":"parameter","pos":"noun","en_meaning":"a factor or element in a set of factors affecting the outcome of an experiment, calculation, or other process.","th_meaning":"พารามิเตอร์ (parāmetor) เป็นคำที่ใช้ในบริบททางวิทยาศาสตร์และเทคนิค การอ้างถึงตัวแปรหรือค่าที่เข้าร่วมในการคำนวณ ทำการทดลอง อธิบายการทำงาน หรือกระบวนการใด ๆ","example_en":"The parameters of the experiment were set to control for temperature and humidity.","example_th":"พารามิเตอร์ของการทดลองตั้งไว้ว่าจะควบคุมดีกรี الحرارةและความชื้น"},{"word":"parcel","pos":"noun","en_meaning":"a package or shipment of goods","th_meaning":"กล่องส่งหรือพัสดุที่ถูกจัดส่งด้วยบริการขนส่ง","example_en":"He received a parcel in the mail.","example_th":"เขากำลังรับกล่องส่งมาในอีเมล"},{"word":"pardon","pos":"verb","en_meaning":"to forgive someone for an error or mistake, especially one that has been made in a court of law","th_meaning":"ขอโทษ, ผ่อนคลาย","example_en":"I must pardon you for your actions.","example_th":"ฉันต้องขอโทษคุณสำหรับการกระทำของคุณ"},{"word":"parental","pos":"adjective","en_meaning":"relating to parents or parentage; showing the qualities of a parent, especially with regard to care and support.","th_meaning":"เกี่ยวกับผู้ปกครอง หรือความเป็นพ่อแม่: แสดงคุณสมบัติของผู้ปกครอง เช่น การดูแลและการสนับสนุน","example_en":"Parental guidance is crucial for children's development.","example_th":"การให้คำแนะนำจากผู้ปกครองเป็นสิ่งที่จำเป็นสำหรับการพัฒนาเด็ก"},{"word":"parenthesis","pos":"noun","en_meaning":"a curved line or curve, especially one forming part of the boundary of a figure or a set of lines enclosing something.","th_meaning":"วงเล็บหรือวงรีด","example_en":"The sentence is missing its closing parenthesis.","example_th":"ประโยคขาดวงปิดของวงเล็บ"},{"word":"partial","pos":"adjective","en_meaning":"incomplete; not total or full","th_meaning":"ไม่ครบถ้วน, บางส่วน","example_en":"The answer is partial.","example_th":"คำตอบเป็นบางส่วน"},{"word":"partially","pos":"adverb","en_meaning":"to a limited extent or degree; not completely","th_meaning":"บางส่วน ไม่เป็นที่เต็ม","example_en":"I ate only partially because I was feeling sick.","example_th":"ฉันกินแค่บางส่วน เนื่องจากรู้สึกอ่อนแอ"},{"word":"particle","pos":"noun","en_meaning":"a small piece of something that has broken off or been separated from a larger whole; a very fine grain of matter.","th_meaning":"ส่วนตัวหรือจุดเล็กๆ ของสิ่งสกปรกที่แตกออกจากสิ่งใหญ่","example_en":"The water broke into particles when it hit the rock.","example_th":"น้ำแตกเป็นจุดเล็กๆ เมื่อชนกับหิน"},{"word":"partition","pos":"noun, verb","en_meaning":"a division into parts; the action of dividing something into parts; a section or area within a larger space; to divide (something) into parts.","th_meaning":"การแบ่งแยก; ส่วนหรือย่อยพื้นที่ของพื้นที่ใหญ่; การนำบางสิ่งมีความแตกต่างให้เป็นส่วนๆ","example_en":"The house was partitioned into three bedrooms. She wants to partition her time between work and leisure.","example_th":"บ้านของเธอถูกแบ่งแยกเป็นห้องพักสามชั้น เธอมีความต้องการที่จะแบ่งเวลาระหว่างการทำงานและอดิเรก"},{"word":"pathway","pos":"noun","en_meaning":"a path or route for travel, especially one that is marked or maintained","th_meaning":"ทางเลือดหรือเส้นทางที่ใช้ในการเดินทาง","example_en":"The new pathway was built to connect the two neighborhoods.","example_th":"ถนนใหม่ได้สร้างขึ้นเพื่อเชื่อมต่อสองชุมชน"},{"word":"peasant","pos":"noun","en_meaning":"a person who works on a farm or in agriculture, typically of lower social status than farmers who own their land.","th_meaning":"คนเล่นนาวหรือผู้ทำงานในป่าที่มีความยากลำบาก","example_en":"The peasants were forced to work long hours in the hot sun.","example_th":"ชาวนาถูกกดดันให้ทำงานต่อเนื่องเวลาสูงในแดดแรง"},{"word":"periodic","pos":"adjective","en_meaning":"occurring at regular intervals; recurring periodically","th_meaning":"เกิดขึ้นประจำเวลานานๆ","example_en":"The Earth rotates on its axis in a periodic fashion.","example_th":"โลกกลับไปรอบ ๆ ทุก 24 ชั่วโมงดังกล่าวคือการหมุนแบบปกติหรือเป็นประจำ"},{"word":"peripheral","pos":"noun","en_meaning":"a part of a machine or system that is connected to it but not essential to its main function","th_meaning":"ส่วนประกอบหรืออุปกรณ์เสริมที่เชื่อมต่อกับระบบหลักอย่างไม่จำเป็นในการทำงานหลัก","example_en":"The monitor is a peripheral of the computer.","example_th":"จอคอมพิวเตอร์คือส่วนประกอบของคอมพิวเตอร์"},{"word":"pest","pos":"noun","en_meaning":"an animal or insect that damages crops, furniture, etc.","th_meaning":"ศัตรูพืช (satru phu)","example_en":"The farmer fought a persistent pest problem in his garden.","example_th":"เกษตรกรต้องเผชิญกับปัญหาศัตรูพืชที่รุนแรงในสวนของเขา"},{"word":"pesticide","pos":"noun","en_meaning":"a chemical substance used to destroy insects, weeds, or other pests","th_meaning":"สารเคมีที่ใช้ในการทำลายศัตรูพืชหรือแมลงพยาธิไม่รักษา","example_en":"We need to use pesticides to protect our crops from damage.","example_th":"เราต้องใช้สารเคมีกำจัดศัตรูพืชเพื่อป้องกันการเสียหายให้กับผลไม้ของเรา"},{"word":"phenomenal","pos":"adjective","en_meaning":"extremely good or impressive; amazing","th_meaning":"ยอดเยี่ยม; ดีมาก","example_en":"Her performance at the concert was phenomenal.","example_th":"การแสดงเธอที่คอนเสิร์ตนั้นเป็นที่ยอดเยี่ยม"},{"word":"philosopher","pos":"noun","en_meaning":"a person who thinks deeply about abstract or profound subjects, especially those that involve ethics, religion, and metaphysics.","th_meaning":"ผู้คิดอย่างลึกซึ้งเกี่ยวกับประเด็นที่ซับซ้อนและเป็นทฤษฎี","example_en":"He is a philosopher with a keen interest in morality.","example_th":"เขามีความสนใจในจริยธรรมและความคิดอย่างลึกซึ้งมาก"},{"word":"philosophical","pos":"adjective","en_meaning":"Theoretical, concerned with ideas or abstract concepts rather than practical matters.","th_meaning":"ทฤษฎีใจหรือความคิดลึกซึ่งไม่ได้รับผลกระทบจากสถานการณ์ภายนอกหรือเหตุการณ์ประจักษ์ชีวิตประจำวัน","example_en":"His philosophical views on life have influenced many people.","example_th":"ความคิดลึกของเขาเกี่ยวกับชีวิตได้ผลส่งเสริมให้กับคนอื่นหลายคน"},{"word":"phonological","pos":"adjective","en_meaning":"relating to the science of sound in language or speech, especially as it relates to pronunciation and articulation","th_meaning":"เกี่ยวกับศาสตร์เสียงในภาษาหรือการพูด รวมถึงความสัมพันธ์กับการออกเสียงและการระบุตำแหน่ง","example_en":"The phonological rules of a language determine how words are pronounced.","example_th":"กฎของระบบเสียงในภาษาทำให้วิธีการพูดคำศัพท์เป็นไปอย่างไร"},{"word":"phosphate","pos":"noun","en_meaning":"a salt of phosphoric acid, occurring naturally in many rocks and bones","th_meaning":"ฟิสโคไซท์ (phosko-sai)","example_en":"The soil is rich in phosphate.","example_th":"ดินมีฟิสโคไซท์ให้มาก"},{"word":"photographic","pos":"adjective","en_meaning":"relating to or involving photography; capable of being recorded on film or electronic media","th_meaning":"เกี่ยวกับการถ่ายภาพหรือที่สามารถถูกบันทึกในแผ่นฟิล์มหรืออุปกรณ์สำหรับบันทึกข้อมูลทางดิจิตอล","example_en":"A photographic memory allows you to remember things for a long time.","example_th":"การทรงจำภาพถ่ายทำให้คุณสามารถจำสิ่งต่างๆได้นาน"},{"word":"physically","pos":"adverb","en_meaning":"in a physical manner or way","th_meaning":"ในทางกายภาพ","example_en":"He moved his hand physically to show you the object.","example_th":"เขามีการเคลื่อนไหวร่างกายเพื่อให้คุณเห็นวัตถุนี้"},{"word":"physician","pos":"noun","en_meaning":"a medical professional who practices medicine, especially in the hospital.","th_meaning":"แพทย์ หรือ นักจิตวิทยา","example_en":"He is a physician and specializes in pediatrics.","example_th":"เขานายแพทย์และเชี่ยวชาญด้านโรคเด็ก"},{"word":"physics","pos":"noun","en_meaning":"the natural science that involves the study of matter and its motion through space and time, along with related concepts such as energy and force.","th_meaning":"วิทยาศาสตร์ที่ศึกษาเกี่ยวกับความรู้สึกของมันในช่วงเวลาและพื้นที่","example_en":"Physics is the study of matter and its motion through space and time.","example_th":"วิทยาศาสตร์คือการศึกษาเกี่ยวกับความรู้สึกของมันในช่วงเวลาและพื้นที่"},{"word":"physiological","pos":"adjective","en_meaning":"relating to the natural functions of living organisms","th_meaning":"เกี่ยวกับการทำงานธรรมชาติของสิ่งมีชีวิต","example_en":"The physiological processes of the body include breathing and digestion.","example_th":"กระบวนการทางภูมิศาสตร์ของร่างกายรวมถึงการหายใจและการดื่มน้ำ"},{"word":"pi","pos":"noun","en_meaning":"a mathematical constant approximately equal to 3.14159, the ratio of a circle's circumference to its diameter","th_meaning":"ค่าคงที่ทางคณิตศาสตร์ประมาณเท่ากับ 3.14159 อัตราส่วนของเส้นรอบวงของวงกลมต่อรัศมี","example_en":"The value of pi is approximately 3.14159.","example_th":"ค่าของพายเป็นประมาณ 3.14159"},{"word":"planner","pos":"noun","en_meaning":"someone who plans or organizes events, projects, or schedules.","th_meaning":"ผู้วางแผนหรือผู้จัดการกิจกรรม","example_en":"I need a planner to organize my wedding.","example_th":"ฉันต้องการคนที่จะช่วยวางแผนงานแต่งงานของฉัน"},{"word":"plantation","pos":"noun","en_meaning":"an area of land planted with a large number of trees or crops, especially for commercial purposes.","th_meaning":"พื้นที่ปลูกไม้หรือผลไม้หลายต้นเป็นกลุ่มใหญ่เพื่อการขาย","example_en":"He bought a plantation in Malaysia to grow rubber trees.","example_th":"เขานำเงินไปซื้อพื้นที่ปลูกถั่วเหลืองในมาเลเซีย"},{"word":"plausible","pos":"adjective","en_meaning":"likely to be true or happen; believable","th_meaning":"เป็นไปได้หรือเชื่อถือได้","example_en":"The story is plausible.","example_th":"บทบาทนี้เป็นไปได้"},{"word":"plug","pos":"noun","en_meaning":"an electrical connector or device that is inserted into an outlet","th_meaning":"ปลั๊ก","example_en":"I need to plug in my computer.","example_th":"ฉันต้องการปลั๊กคอมพิวเตอร์ของฉันเข้ากับสายไฟ"},{"word":"plural","pos":"noun, adjective","en_meaning":"relating to or consisting of more than one item or person; having multiple members or elements; belonging to the same class or category as another word with a plural form.","th_meaning":"มีจำนวนมากกว่าหนึ่ง หรือประกอบด้วยหลายสิ่งอย่างหรือนัก","example_en":"The family is plural, consisting of parents and children. This document is in plural form.","example_th":"ครอบครัวเป็นแบบพหุทาง เข้าใจได้ว่ามีสมาชิกมากกว่าหนึ่ง หรือในเอกสารนี้มีรูปแบบแบบพหุทาง"},{"word":"polar","pos":"adjective","en_meaning":"of or relating to the poles, especially the Arctic or Antarctic regions","th_meaning":"ที่มีจุดกำเนิดหรือปลายทางอยู่ตรงข้ามกัน เช่น เนื้อท้องฟ้าเหนือและใต้","example_en":"The North Pole is covered in ice.","example_th":"จุดกำเนิดของโลกตั้งอยู่ที่เหนือ"},{"word":"pole","pos":"noun","en_meaning":"a long, strong stick or cylinder used for support or to transmit power","th_meaning":"รูขวน้ำสูง (ruanwai)","example_en":"I need a wooden pole to hang my clothes.","example_th":"ฉันต้องการรูขวน้ำสูงในการถักผ้าของฉัน"},{"word":"politically","pos":"adverb","en_meaning":"in a political manner or with regard to politics","th_meaning":"ในลักษณะการเมืองหรือเกี่ยวกับการเมือง","example_en":"He spoke politically, trying to appeal to the voters' emotions.","example_th":"เขากำลังเลตามเนื้อหาทางการเมืองเพื่อเรียกความสนใจของผู้คนที่สมัครใจ"},{"word":"portfolio","pos":"noun","en_meaning":"a collection of investments or assets, typically owned by an individual or organization, for the purpose of generating income and providing capital growth.","th_meaning":"รวบรวมทรัพย์สินหรือเงินทุนในกลุ่มเดียวกันเพื่อสร้างรายได้และเพิ่มค่าจดจำ","example_en":"She has a diverse portfolio of stocks and bonds.","example_th":"เธอมีfolioของหุ้นและหนี้สินที่หลากหลาย"},{"word":"portray","pos":"verb","en_meaning":"to represent or describe a person or thing in a certain way, especially as a picture or other visual representation","th_meaning":"แสดงให้เห็นหรือบรรยายคนหรือสิ่งของในลักษณะต่าง ๆ โดยเฉพาะอย่างยิ่งถึงภาพหรือการแสดงอย่างอื่น ๆ","example_en":"The artist will portray the model in various poses.","example_th":"ศิลปินจะแสดงภาพคนแบบตัวอย่างในรูปแบบต่าง ๆ"},{"word":"portrayal","pos":"noun","en_meaning":"the depiction of a person or thing in art, literature, etc.","th_meaning":"การแสดงหรืออธิบายภาพหรือลักษณะของคนหรือสิ่งที่มีอยู่ในงานศิลปะ วรรณกรรม ฯลฯ","example_en":"The portrait was a faithful portrayal of the subject.","example_th":"ภาพวาดเป็นการแสดงที่เกิดความตื่นเต้นของคนหรือสิ่งที่มีอยู่"},{"word":"positively","pos":"adverb","en_meaning":"in a good or favorable manner; in an encouraging way","th_meaning":"ในทางที่ดีหรือมีประโยชน์","example_en":"He gave me a positive response.","example_th":"เขากล่าวตอบถึงผมอย่างเป็นบวก"},{"word":"poster","pos":"noun","en_meaning":"a large printed notice or advertisement hung on a wall or in public place","th_meaning":"บอร์ดประกาศหรือโฆษณาขนาดใหญ่ที่แสดงข้อความหรือภาพและติดไว้ในมuro หรือสถานที่สาธารณะ","example_en":"I saw a poster for the new movie at the bus station.","example_th":"ฉันเห็นบอร์ดประกาศสำหรับภาพยนตร์ใหม่ที่บริษัทขนส่งอยู่ที่สถานีรถโดยสาร"},{"word":"postgraduate","pos":"noun","en_meaning":"a person who has completed an academic degree at a university or other higher education institution after completing a bachelor's degree.","th_meaning":"ผู้สำเร็จการศึกษาในระดับสูงกว่าหลักสูตรปริญญาตรี","example_en":"He is pursuing a master's degree in economics.","example_th":"เขานำไปศึกษาทางด้านเศรษฐศาสตร์ในระดับมestr"},{"word":"potassium","pos":"noun","en_meaning":"A soft, silvery-white metallic element used in fertilizers and as a heart medication.","th_meaning":"ธาตุก็อกเกะ (Patet kkok)","example_en":"Potassium is an essential nutrient for plants and animals.","example_th":"กลูตาล์มีความจำเป็นอย่างยิ่งสำหรับสัตว์และพืช"},{"word":"powder","pos":"noun","en_meaning":"a fine dry substance made by grinding a solid substance into tiny particles.","th_meaning":"สารน้ำตาลที่ละเอียดและมีขนาดเล็ก ทำจากการกำจัดกันของสิ่งที่แข็งเป็นส่วนย่อยๆ เยอะมาก","example_en":"She sprinkled sugar powder over the cake.","example_th":"เธอปะฝักหวานให้กับเค้ก"},{"word":"practitioner","pos":"noun","en_meaning":"a person who is trained and skilled in a particular art or profession, especially a medical professional.","th_meaning":"ผู้ปฏิบัติตามทฤษฎีและเทคนิค","example_en":"He is a doctor specializing in surgery.","example_th":"เขานักแพทย์เชี่ยวชาญด้านการผ่าตัด"},{"word":"pragmatic","pos":"adjective","en_meaning":"reasonable and practical in approach or attitude; sensible","th_meaning":"ระมัดระวัง, ดูแลรอบคอบ","example_en":"She is pragmatic about work.","example_th":"เธอเป็นคนที่รู้จักใช้ทรัพยากรอย่างมีความคิดเห็น"},{"word":"pre","pos":"adjective, adverb","en_meaning":"before; prior to","th_meaning":"ก่อน","example_en":"The meeting was held pre-emptively.","example_th":"ประชุมจัดก่อนหน้านี้"},{"word":"precede","pos":"verb","en_meaning":"to come before in time, order, or importance","th_meaning":"ต้องการอยู่ก่อนหน้า (tak sao yu koon phueang)","example_en":"The train will precede the bus on this route.","example_th":"รถไฟจะมาถึงก่อนรถ เบี้ยนี่"},{"word":"precipitate","pos":"verb","en_meaning":"to fall from the sky in liquid form, especially rain or snow; to come together suddenly and completely","th_meaning":"ตกเป็นน้ำฝนหรือหิว; กระทบหรือเกิดขึ้นด้วยความรุนแรงและรวดเร็ว","example_en":"It's raining heavily today.","example_th":"ฝนตกหนักมากในวันนี้"},{"word":"precipitation","pos":"noun","en_meaning":"the process of water falling from the sky in the form of rain, snow, sleet, or hail.","th_meaning":"การตกของน้ำที่มาจากฟ้าในรูปแบบฝน หail หรือสleet","example_en":"The city received a lot of precipitation during the month of March.","example_th":"เมืองได้รับปริมาณน้ำจั่วที่มากในการเดือนมีนาคม"},{"word":"predator","pos":"noun","en_meaning":"an organism that hunts and kills other organisms for food","th_meaning":"สัตว์หรือแมลงที่ค้นหาและกินสัตว์อื่นเพื่อดิ้งอาหาร","example_en":"The lion is a formidable predator.","example_th":"เสือเป็นดุลยภาพในความรับผิดชอบ"},{"word":"prediction","pos":"noun","en_meaning":"the act of predicting or a forecast made about future events or developments.","th_meaning":"การทำนาย หรือการทำข้อมูลเชิงยุทธศาสตร์สำหรับเหตุการณ์ในอนาคต","example_en":"The meteorologists' prediction for the weekend is clear skies and mild temperatures.","example_th":"นายจัดการแผนกนี้ได้ทำการทำนายว่าในสัปดาห์ที่จะมาอากาศจะดีและไม่มีฝน"},{"word":"predominantly","pos":"adverb","en_meaning":"most of the time; mainly","th_meaning":"มากที่สุดหรือใหญ่ที่สุดในระดับทั้งหมด","example_en":"She predominantly wears blue clothes.","example_th":"เธอใส่ว่าเสื้อสีน้ำเงินมากกว่า"},{"word":"prejudice","pos":"noun","en_meaning":"an unfavorable opinion or feeling formed beforehand without knowledge or just consideration of the facts.","th_meaning":"ความคิดเห็นร้ายแรงหรือไม่ชอบเกี่ยวกับบางคนหรือบางสิ่งอย่างโดยไม่มีข้อมูลจริงหรือการคิดรอบคอบ","example_en":"He had a prejudice against people from different cultures.","example_th":"เขามีความคิดเห็นร้ายแรงต่อผู้คนจากวัฒนธรรมที่แตกต่างกัน"},{"word":"preliminary","pos":"adjective","en_meaning":"something that happens before the main part of an activity or process begins","th_meaning":"การเตรียมตัวหรือขั้นตอนที่จะทำก่อนที่จะเริ่มทำการหลัก","example_en":"The preliminary meeting was held to discuss plans for the project.","example_th":"ประชุมทดลองจัดให้เข้าใจแผนการทำงาน"},{"word":"presume","pos":"verb","en_meaning":"to assume or believe something, especially without sufficient evidence","th_meaning":"คาดหวังหรือสมมุติฐานบางอย่างแม้ไม่มีหลักฐานเพียงพอ","example_en":"I presumed that she was in Paris when I called her.","example_th":"ฉันสมมุติว่าเธออยู่ในปารีเมื่อฉันโทรไปหาเธอ"},{"word":"prevalence","pos":"noun","en_meaning":"the extent or degree to which something occurs or is found in a particular place, group of people, etc.","th_meaning":"ความแพร่กระจายหรือจำนวนที่มากขึ้นในบางบริบทหรือกลุ่มคน","example_en":"The prevalence of diabetes in the elderly population has increased significantly over the past decade.","example_th":"ภาวะเบาหวานแพร่กระจายในผู้สูงอายุมีการเพิ่มขึ้นอย่างมากในช่วงทศวรรษล่าสุด"},{"word":"prey","pos":"noun, verb","en_meaning":"an animal hunted and killed by another for food, to hunt or capture (an animal) for food; a person who is being unfairly treated or manipulated.","th_meaning":"สัตว์ที่ถูกจับหรือกินย่อยด้วยมิตรชีวิตอื่น หรือผู้ที่ถูกบวกลวงหรือใช้ประโยชน์จากอย่างไม่ธรรม","example_en":"The lion hunts its prey. The government is preying on the rights of citizens.","example_th":"สิงห์กำลังจับกุมยุงเพื่ออาหาร  الحكومةกำลังขโมยสิทธิของประชาชน"},{"word":"primer","pos":"noun","en_meaning":"a liquid or paste applied to a surface before painting, varnishing, or staining it","th_meaning":"ป่นพื้นหรือสกุบติดหนังสำหรับเตรียมการทาสี","example_en":"She used a primer to prepare the walls for painting.","example_th":"เธอใช้ป่นพื้นในการเตรียมการทาสีให้กำแพง"},{"word":"primitive","pos":"noun","en_meaning":"a basic or fundamental quality or characteristic; an elementary or rudimentary concept or process.","th_meaning":"สิ่งพื้นฐานหรือคุณสมบัติที่เป็นทางเลือกในการสร้างหรือทำงาน","example_en":"The computer has many primitive functions, but it's the combination of these that makes it so powerful.","example_th":"คอมพิวเตอร์มีฟังก์ชันพื้นฐานมากมาย แต่การผสมผสานของมันทำให้มันทรงพลัง"},{"word":"probe","pos":"noun, verb","en_meaning":"an instrument for examining or testing something; to investigate or examine closely; to inquire into or ask questions of","th_meaning":"เครื่องมือสำหรับตรวจจับหรือทดสอบบางสิ่ง; เพื่อทำการสำรวจหรือตรวจสอบอย่างใกล้ชิด; เพื่อสอบถามหรือสอบถามคำถามให้เกี่ยวกับบางสิ่ง","example_en":"The doctor used a probe to check for a fever. She probed the question about her past with curiosity.","example_th":"แพทย์ใช้เครื่องมือตรวจจับเพื่อตรวจวัดไข้.เธอทำการสอบถามคำถามเกี่ยวกับประวัติของเธอด้วยความสงสาร"},{"word":"problematic","pos":"adjective","en_meaning":"causing difficulty or concern; troublesome.","th_meaning":"ยากแก้ไขหรือทำให้เกิดปัญหา","example_en":"The project is problematic due to the lack of resources.","example_th":"โครงการนี้มีปัญหาเพราะขาดทรัพยากร"},{"word":"processor","pos":"noun","en_meaning":"A device or software that processes data by performing operations on it.","th_meaning":"เครื่องประมวลผล","example_en":"The computer has a powerful processor to handle the tasks efficiently.","example_th":"คอมพิวเตอร์มี_processor_ที่ทรงพลังในการจัดการงานอย่างมีประสิทธิภาพ"},{"word":"productive","pos":"adjective","en_meaning":"producing or able to produce much; useful and efficient in producing results.","th_meaning":"มีประสิทธิภาพ ผลิตเป็นจำนวนมาก มีประโยชน์และมีประสิทธิภาพในการผลิตผลลัพธ์","example_en":"A productive day is one where a lot of work gets done.","example_th":"วันที่มีประสิทธิภาพคือวันที่ทำงานได้많ี่"},{"word":"productivity","pos":"noun","en_meaning":"the quality or state of producing output efficiently, or the amount of output produced by a person, machine, etc. over a particular period of time.","th_meaning":"คุณภาพหรือภาวะที่ทำให้ผลผลิตเกิดขึ้นอย่างมีประสิทธิภาพ หรือปริมาณผลผลิตที่ถูกสร้างขึ้นโดยคน เครื่องจักร เป็นต้นในช่วงเวลาที่กำหนด","example_en":"Improving productivity is essential for a company's success.","example_th":"การเพิ่มประสิทธิภาพคือสิ่งที่จำเป็นสำหรับความสำเร็จของบริษัท"},{"word":"profound","pos":"adjective","en_meaning":"deep in significance, feeling, or intensity","th_meaning":"ลึกซึ้งในความหมายหรือความรู้สึก","example_en":"The impact of her words was profound.","example_th":"ผลกระทบจากคำพูดของเธอลึกซึ้ง"},{"word":"progression","pos":"noun","en_meaning":"the action or process of moving forward in a particular direction, especially as part of a series of changes or developments","th_meaning":"การพัฒนาหรือการ tiếnไปสู่ทิศทางต่อไปในกระบวนการบางอย่าง","example_en":"The company is making progress in its new product line.","example_th":"บริษัทกำลังพัฒนาเรื่องใหม่ๆ และได้ผลดีเกินคาด"},{"word":"progressive","pos":"adjective","en_meaning":"tending to move forward or advance, especially in a steady and orderly way; developing gradually","th_meaning":"ที่จะพัฒนาขึ้นอย่างมีลำดับและเป็นระเบียบ","example_en":"His career has been progressing steadily.","example_th":"อาชีพของเขากำลังพัฒนาอย่างสม่ำเสมอ"},{"word":"projection","pos":"noun","en_meaning":"a prediction or forecast about what might happen in the future; a visual representation of an object, especially one on a screen","th_meaning":"การคาดคะเนหรือการทำนายเกี่ยวกับสิ่งที่อาจจะเกิดขึ้นในอนาคต หรือการแสดงภาพของสิ่งต่างๆ ในจอคอมพิวเตอร์หรือจอเพื่อแสดงผลลัพธ์ของการดำเนินการ","example_en":"The company's financial projections are optimistic.","example_th":"การทำนายทางการเงินของบริษัทเป็นอย่างดี"},{"word":"prominent","pos":"adjective","en_meaning":"well-known; important; famous","th_meaning":"โดดเด่น; อันมีชื่อเสียง;","example_en":"He is a prominent figure in the industry.","example_th":"เข่านำนำในวงการนี้"},{"word":"pronounce","pos":"verb","en_meaning":"to say the sounds of words in a certain way, especially in order to make them clear or correctly","th_meaning":"พูดอ่าน ( พูดทั้งหมดในรูปแบบบางอย่าง เพื่อบอกให้มีความชัดเจน)","example_en":"How do you pronounce this word?","example_th":"คำว่า 'pronounce' ถูกพูดในวิธีไร?"},{"word":"proposition","pos":"noun","en_meaning":"a statement that can be true or false","th_meaning":"คำอธิบายหรือการเสนอข้อความที่มีความหมายและอาจเป็นจริงหรือเท็จจริง","example_en":"She made a proposition to the boss about a new project.","example_th":"เธอได้เสนอมันซื้ออสังคมออนไลน์ให้กับหัวหน้า"},{"word":"protocol","pos":"noun","en_meaning":"A set of rules for communication or behavior, especially in a specific field or situation.","th_meaning":"规約 การกำหนดข้อตกลงหรือกระบวนการทางการเงินที่เกี่ยวข้องกับสิ่งที่คุณทำ ซึ่งมีความเป็นธรรมและโปร่งใส","example_en":"They follow the protocol for communicating with customers.","example_th":"เขากำลังตาม规約ในการสื่อสารกับลูกค้า"},{"word":"proton","pos":"noun","en_meaning":"a subatomic particle with a positive electric charge, the nucleus of an atom consists mainly of protons and neutrons.","th_meaning":"โปรตอน (prô ton) เป็นสิ่งมีน้ำหนักอย่างเล็กและมีชาร์จบวก ส่วนใหญ่นucleusของอะมอนิกันประกอบด้วยโปรตอนและไอนรูโทน","example_en":"The nucleus of an atom consists mainly of protons and neutrons.","example_th":"ส่วนใหญ่นucleusของอะมอนิกันประกอบด้วยโปรตอนและไอนรูโทน"},{"word":"psychiatric","pos":"noun","en_meaning":"relating to the mind or behavior; mental health","th_meaning":"เกี่ยวกับความคิดและพฤติกรรม หรือสุขภาพจิต","example_en":"He needs to see a psychiatrist.","example_th":"เขามีปัญหาด้านจิตใจและต้องไปพบแพทย์พยาบาลสมอง"},{"word":"psychologist","pos":"noun","en_meaning":"a professional who practices psychology, especially one who provides therapy to treat emotional or mental disorders.","th_meaning":"นักจิตวิทยา หรือ พยาบาลจิตวิทยา (ที่ทำงานเฉพาะในการดูแลผู้ป่วยทางจิตใจและพฤติกรรม)","example_en":"He is a licensed psychologist who helps people with mental health issues.","example_th":"เขาเป็นนักจิตวิทยารับหน้าที่ช่วยเหลือคนที่มีปัญหาด้านสุขภาพจิต"},{"word":"psychology","pos":"noun","en_meaning":"The study of the human mind and behavior.","th_meaning":"การศึกษาทางจิตวิทยา","example_en":"She has a degree in psychology.","example_th":"เธอได้รับปริญญาในสาขาจิตวิทยา"},{"word":"publish","pos":"verb","en_meaning":"to make something available to the public, especially by placing it on a website or in newspapers","th_meaning":"เผยแพร่","example_en":"He published a new book last year.","example_th":"เขาเผยแพร่มินิมาร์ที่ใหม่เมื่อปีก่อนหน้านี้"},{"word":"pulse","pos":"noun","en_meaning":"a regular beat or movement, especially of the heart","th_meaning":"คลื่นหรือสัญญาณที่ซ้ำ ๆ เกิดขึ้นในร่างกาย อย่างเช่น สัญญาณของหัวใจ","example_en":"The patient's pulse was racing.","example_th":"ความเร็วของคลื่นของคนไข้กำลังสูง"},{"word":"punch","pos":"verb","en_meaning":"to hit someone with your hand, especially a closed fist","th_meaning":"ที่แท้จริงที่จะรบกวนหรือข่มขู่คนอื่นโดยการใช้มือปั่นดิบ","example_en":"He punched the wall.","example_th":"เขากับผู้อื่นไปตีโต๊ะ"},{"word":"punish","pos":"verb","en_meaning":"to mete out punishment or to reprimand someone for wrongdoing","th_meaning":"ถูกโทษ, ถูกลำดวน","example_en":"The teacher punished the students for their misbehavior.","example_th":"ครูต้องการจะโทษนักเรียนที่ทำผิด"},{"word":"punishment","pos":"noun","en_meaning":"a severe penalty imposed as a form of retribution for an offense or wrongdoing.","th_meaning":"การทำโทษหรือการขัดขวางสำหรับผิดกฎหมายหรือความร้ายแรงต่อผู้อื่น","example_en":"He was sentenced to prison for his crimes.","example_th":"เขาถูกจำคุกเป็นเวลา 5 ปีเพราะผิดกฎหมาย"},{"word":"purely","pos":"adverb","en_meaning":"only, solely","th_meaning":"เพียงอย่างเดียว หรือ เฉพาะ","example_en":"He decided to go purely on intuition.","example_th":"เขานั่งตัดสินใจไปยังสถานการณ์ด้วยความมีอิทธิพลจากประสบการณ์ที่เคยรู้จักก่อน"},{"word":"puzzle","pos":"noun","en_meaning":"an activity or game involving fitting together pieces in the correct way to form a picture, shape, etc.","th_meaning":"สิ่งที่ต้องการจับมือกันหรือทำให้ตรงกันเพื่อให้รูปทรงหรือภาพเข้ามาเป็นหนึ่ง","example_en":"He enjoys solving crossword puzzles for fun.","example_th":"เขาชอบทำสิ่งลับขีดฆ่าเพื่อความสนุก"},{"word":"qualitative","pos":"adjective","en_meaning":"relating to or involving quality or qualit
