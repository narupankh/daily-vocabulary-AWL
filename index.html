<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Vocab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f0f7f2;--surface:#ffffff;--surface2:#f4faf6;--surface3:#e8f5ec;
  --border:rgba(22,163,74,0.10);--border2:rgba(22,163,74,0.18);
  --text:#0f1f14;--muted:#6b7c72;
  --accent:#16a34a;--accent-bg:#dcfce7;--accent-text:#15803d;
  --accent2:#059669;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 4px 16px rgba(22,163,74,0.07);
  --shadow-sm:0 1px 2px rgba(0,0,0,0.05);
  --green:#15803d;--green-bg:#dcfce7;
  --red:#dc2626;--red-bg:#fee2e2;
  --amber:#b45309;--amber-bg:#fef3c7;
  --pos-noun:#2563eb;--pos-noun-bg:#eff6ff;
  --pos-verb:#16a34a;--pos-verb-bg:#f0fdf4;
  --pos-adj:#9333ea;--pos-adj-bg:#faf5ff;
  --pos-adv:#ea580c;--pos-adv-bg:#fff7ed;
  --pos-other:#64748b;--pos-other-bg:#f8fafc;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0d1710;--surface:#131f16;--surface2:#1a2b1e;--surface3:#1f3324;
  --border:rgba(74,222,128,0.08);--border2:rgba(74,222,128,0.15);
  --text:#e2f0e6;--muted:#7a9e82;
  --accent:#4ade80;--accent-bg:#14532d;--accent-text:#86efac;
  --accent2:#34d399;
  --shadow:0 1px 3px rgba(0,0,0,0.3),0 4px 16px rgba(0,0,0,0.2);
  --shadow-sm:0 1px 2px rgba(0,0,0,0.2);
  --green:#86efac;--green-bg:#14532d;
  --red:#fca5a5;--red-bg:#7f1d1d;
  --amber:#fde68a;--amber-bg:#451a03;
  --pos-noun:#93c5fd;--pos-noun-bg:#0f2040;
  --pos-verb:#86efac;--pos-verb-bg:#0a2e16;
  --pos-adj:#d8b4fe;--pos-adj-bg:#230d3b;
  --pos-adv:#fdba74;--pos-adv-bg:#2c1002;
  --pos-other:#94a3b8;--pos-other-bg:#0f172a;
}}

body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem 4rem;}
.wrap{width:100%;max-width:540px;}
.screen{display:none;flex-direction:column;gap:1rem;}
.screen.active{display:flex;}

/* ── Login ── */
.login-hero{text-align:center;padding:3rem 0 1.5rem;}
.login-icon{width:64px;height:64px;border-radius:20px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 1.25rem;box-shadow:0 8px 24px rgba(22,163,74,0.28);}
.login-title{font-size:1.75rem;font-weight:800;letter-spacing:-0.04em;color:var(--text);}
.login-sup{display:inline-block;font-size:0.72rem;font-weight:600;color:var(--accent);background:var(--accent-bg);padding:3px 10px;border-radius:20px;margin-bottom:0.6rem;letter-spacing:0.04em;text-transform:uppercase;}
.login-sub{font-size:0.82rem;color:var(--muted);line-height:1.6;}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2rem;display:flex;flex-direction:column;gap:1rem;box-shadow:var(--shadow);}
.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-size:0.72rem;font-weight:600;color:var(--muted);letter-spacing:0.07em;text-transform:uppercase;}
.field input{padding:0.75rem 1rem;border-radius:12px;border:1.5px solid var(--border2);background:var(--surface2);color:var(--text);font-size:0.95rem;font-family:inherit;outline:none;transition:border-color 0.15s,box-shadow 0.15s;}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(22,163,74,0.12);}
.field input::placeholder{color:var(--muted);}
.btn-login{width:100%;padding:0.85rem;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;font-size:0.95rem;font-weight:700;font-family:inherit;cursor:pointer;transition:opacity 0.15s,transform 0.1s;letter-spacing:0.01em;box-shadow:0 4px 14px rgba(22,163,74,0.3);}
.btn-login:hover{opacity:0.92;transform:translateY(-1px);}
.btn-login:active{transform:translateY(0);}
.login-err{font-size:0.78rem;color:var(--red);min-height:1.1em;text-align:center;}

/* ── Topbar ── */
.topbar{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:0.9rem 1.1rem;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow-sm);}
.top-left{display:flex;align-items:center;gap:10px;}
.top-av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;display:flex;align-items:center;justify-content:center;font-size:0.85rem;font-weight:700;flex-shrink:0;box-shadow:0 2px 8px rgba(22,163,74,0.25);}
.top-name{font-size:0.9rem;font-weight:700;letter-spacing:-0.01em;}
.top-date{font-size:0.68rem;color:var(--muted);margin-top:1px;}
.btn-out{font-size:0.72rem;color:var(--muted);background:none;border:1px solid var(--border2);border-radius:8px;padding:0.32rem 0.8rem;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.btn-out:hover{color:var(--text);border-color:var(--accent);color:var(--accent);}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:1.35rem 1.4rem;box-shadow:var(--shadow-sm);}
.card-label{font-size:0.65rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem;}

/* ── Progress ── */
.prog-stats{display:flex;align-items:baseline;gap:6px;margin-bottom:10px;}
.prog-count{font-size:1.5rem;font-weight:800;letter-spacing:-0.03em;color:var(--accent);}
.prog-total{font-size:0.8rem;color:var(--muted);font-weight:500;}
.prog-label{font-size:0.72rem;color:var(--muted);margin-left:auto;}
.prog-track{height:8px;background:var(--surface3);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width 0.8s cubic-bezier(0.34,1.56,0.64,1);}

/* ── Word tiles ── */
.word-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.85rem;}
@media(max-width:420px){.word-grid{grid-template-columns:1fr;}}
.wtile{border-radius:16px;padding:1.1rem 1.1rem 1rem;border:1px solid transparent;position:relative;overflow:hidden;transition:transform 0.15s,box-shadow 0.15s;}
.wtile:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.08);}
.wt-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:0.5rem;gap:6px;}
.wt-word{font-size:1.3rem;font-weight:800;letter-spacing:-0.03em;line-height:1.2;}
.wt-pos-badge{font-size:0.6rem;font-weight:600;padding:3px 8px;border-radius:99px;white-space:nowrap;text-transform:uppercase;letter-spacing:0.06em;flex-shrink:0;margin-top:3px;}
.wt-n{font-size:0.6rem;color:var(--muted);margin-bottom:0.55rem;font-weight:500;}
.wt-en{font-size:0.82rem;line-height:1.55;font-weight:500;margin-bottom:3px;}
.wt-th{font-size:0.82rem;line-height:1.55;font-weight:600;margin-bottom:0.6rem;}
.wt-line{border:none;border-top:1px solid rgba(0,0,0,0.07);margin:0.5rem 0;}
@media(prefers-color-scheme:dark){.wt-line{border-top-color:rgba(255,255,255,0.07);}}
.wt-ex{font-size:0.72rem;color:var(--muted);line-height:1.6;font-style:italic;}
.wt-ex-th{font-size:0.72rem;color:var(--muted);line-height:1.55;margin-top:2px;opacity:0.75;}

/* ── Status ── */
.status{font-size:0.78rem;padding:0.65rem 1rem;border-radius:10px;margin-top:0.85rem;display:none;font-weight:500;}
.status.ok{background:var(--green-bg);color:var(--green);display:block;}
.status.err{background:var(--red-bg);color:var(--red);display:block;}
.status.warn{background:var(--amber-bg);color:var(--amber);display:block;}

/* ── More button ── */
.btn-more{margin-top:0.9rem;width:100%;padding:0.75rem;border-radius:12px;background:var(--surface2);color:var(--accent);border:1.5px dashed var(--border2);font-size:0.85rem;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.15s;letter-spacing:0.01em;}
.btn-more:hover{background:var(--accent-bg);border-color:var(--accent);border-style:solid;}
.btn-more:disabled{opacity:0.35;cursor:not-allowed;}

/* ── Search ── */
.search-wrap{position:relative;margin-bottom:0.85rem;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:0.95rem;pointer-events:none;}
.search-input{width:100%;padding:0.72rem 1rem 0.72rem 2.4rem;border-radius:12px;border:1.5px solid var(--border2);background:var(--surface2);color:var(--text);font-size:0.9rem;font-family:inherit;outline:none;transition:border-color 0.15s,box-shadow 0.15s;}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(22,163,74,0.10);}
.search-input::placeholder{color:var(--muted);}

/* ── History ── */
.hist-list{display:flex;flex-direction:column;gap:4px;max-height:240px;overflow-y:auto;padding-right:2px;}
.hist-list::-webkit-scrollbar{width:3px;}
.hist-list::-webkit-scrollbar-track{background:transparent;}
.hist-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}
.hist-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface2);border-radius:10px;font-size:0.76rem;transition:background 0.12s;}
.hist-row:hover{background:var(--surface3);}
.hist-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0;opacity:0.6;}
.hist-words{flex:1;font-weight:500;color:var(--text);}
.hist-date{font-size:0.65rem;color:var(--muted);}
.badge{padding:2px 8px;border-radius:99px;font-size:0.6rem;font-weight:600;background:var(--green-bg);color:var(--green);letter-spacing:0.04em;}
.badge-extra{background:var(--accent-bg);color:var(--accent-text);}
.empty{font-size:0.8rem;color:var(--muted);text-align:center;padding:1.75rem 0;}

/* ── Memorize button ── */
.btn-memorize{margin-top:0.75rem;width:100%;padding:0.6rem;border-radius:10px;background:transparent;border:1.5px solid var(--border2);color:var(--muted);font-size:0.78rem;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.15s;letter-spacing:0.02em;}
.btn-memorize:hover:not(.memorized){background:var(--accent-bg);border-color:var(--accent);color:var(--accent);}
.btn-memorize.memorized{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);cursor:default;}

/* ── History word chips ── */
.hist-word-chip{display:inline-block;padding:1px 7px;border-radius:99px;font-size:0.68rem;font-weight:600;margin:1px 2px;}
.hist-word-chip.noun{background:var(--pos-noun-bg);color:var(--pos-noun);}
.hist-word-chip.verb{background:var(--pos-verb-bg);color:var(--pos-verb);}
.hist-word-chip.adj{background:var(--pos-adj-bg);color:var(--pos-adj);}
.hist-word-chip.adv{background:var(--pos-adv-bg);color:var(--pos-adv);}
.hist-word-chip.other{background:var(--pos-other-bg);color:var(--pos-other);}
.hist-word-chip.memorized-chip{font-weight:800;}
</style>
</head>
<body>
<div class="wrap">

  <div id="loginScreen" class="screen active">
    <div class="login-hero">
      <div class="login-icon">🌿</div>
      <div class="login-sup">Vocabulary Builder</div>
      <div class="login-title">DAILY VOCABULARY</div>
      <div class="login-sub">2 NEW WORDS EVERY DAY</div>
    </div>
    <div class="login-card">
      <div class="field">
        <label>Your name</label>
        <input id="nameInput" type="text" placeholder="e.g. Your Name" maxlength="40" />
      </div>
      <div class="field">
        <label>Passcode</label>
        <input id="passInput" type="password" placeholder="Enter passcode" />
      </div>
      <button class="btn-login" onclick="tryLogin()">Start learning →</button>
      <div class="login-err" id="loginErr"></div>
    </div>
  </div>

  <div id="appScreen" class="screen">
    <div class="topbar">
      <div class="top-left">
        <div class="top-av" id="topAv"></div>
        <div>
          <div class="top-name" id="topName"></div>
          <div class="top-date" id="topDate"></div>
        </div>
      </div>
      <button class="btn-out" onclick="logout()">Sign out</button>
    </div>

    <div class="card">
      <div class="card-label">Your progress</div>
      <div class="prog-stats">
        <div class="prog-count" id="progCount">0</div>
        <div class="prog-total" id="progTotal">/ 956 words</div>
        <div class="prog-label" id="progPct">0%</div>
      </div>
      <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>

    <div class="card">
      <div class="card-label">Today's words</div>
      <div class="word-grid" id="wordGrid"></div>
      <button class="btn-more" id="moreBtn" onclick="loadMore()" style="display:none">+ Give me 2 more words</button>
      <div class="status" id="statusBar"></div>
    </div>

    <div class="card">
      <div class="card-label">Look up a word</div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input id="searchInput" class="search-input" type="text" placeholder="Search word, meaning, or Thai…" oninput="doSearch()" />
      </div>
      <div id="searchOut"></div>
    </div>

    <div class="card">
      <div class="card-label">History</div>
      <div id="histWrap"></div>
    </div>
  </div>

</div>
<script>
const PASSCODE = "mjpvocab";
const STORAGE_KEY = "mjp_vocab_";
const WORDS = [{"word":"abdominal","pos":"noun","en_meaning":"relating to the abdomen; of or for the belly","th_meaning":"เกี่ยวกับท้อง","example_en":"He had an abdominal injury.","example_th":"เขาได้รับบาดเจ็บที่ช่วงท้อง"},{"word":"absorb","pos":"verb","en_meaning":"to take in or soak up, especially liquid, as by the action of a sponge.","th_meaning":"ดูดซับหรือกักเก็บ","example_en":"The sponge absorbs water easily.","example_th":"ตะกอนดีกว่าในสังข์บ่อย"},{"word":"absorption","pos":"noun","en_meaning":"the process of taking something in by or as if by sponging, soaking up, absorbing.","th_meaning":"การดูดซับหรือทำให้ด่างอยู่ภายใน","example_en":"The earth absorbs carbon dioxide from the atmosphere.","example_th":"โลกดูดซับคาร์บอนไดออกไซด์จากบรรยากาศ"},{"word":"accelerate","pos":"verb","en_meaning":"to make something happen faster or move at a greater speed","th_meaning":"เพิ่มความเร็วหรือทำให้เกิดขึ้นที่รวดเร็วขึ้น","example_en":"The car accelerated rapidly down the hill.","example_th":"รถยนต์ขับแข่งได้อย่างรวดเร็วลงเขา"},{"word":"acceleration","pos":"noun","en_meaning":"the rate at which something increases in speed, especially a vehicle.","th_meaning":"การเร่งความเร็วหรือการเพิ่มความเร็วอย่างรวดเร็ว","example_en":"The car's acceleration was impressive.","example_th":"การเร่งของรถนั้นยอดเยี่ยม"},{"word":"accent","pos":"noun","en_meaning":"a distinguishing quality or manner of speech that is associated with a particular geographical region, social group, or individual.","th_meaning":"การพูดที่มีลักษณะเฉพาะหรือไม่เหมือนกัน โดยเกี่ยวกับภูมิภาค กลุ่มสังคม หรือบุคคล","example_en":"She has a French accent.","example_th":"เธอพูดภาษาฝรั่งเศส"},{"word":"accumulate","pos":"verb","en_meaning":"to collect or gather (something), especially in increasing amounts over time","th_meaning":"สะสม (tak kham)","example_en":"She has accumulated a lot of work to do.","example_th":"เธอมีงานที่ต้องทำอยู่มากมาย"},{"word":"accumulation","pos":"noun","en_meaning":"the gradual process of building up or adding to something over time; the total amount that has been gathered","th_meaning":"การสะสม, การรวมกันของบางสิ่งที่ได้รับอย่างต่อเนื่อง","example_en":"The company's success is due to its ability to accumulate wealth through smart investments.","example_th":"ความสำเร็จของบริษัทนี้มีสาเหตุในความสามารถในการสะสมกำลังใจทางการเงินผ่านการลงทุนอย่างชาญฉลาด"},{"word":"accuracy","pos":"noun","en_meaning":"the degree of correctness or freedom from error","th_meaning":"ความแม่นยำ","example_en":"The report's accuracy was questionable.","example_th":"ผลลัพธ์ของรายงานมีความไม่แน่นอน"},{"word":"accurately","pos":"adverb","en_meaning":"with precision or exactness","th_meaning":"อย่างแม่นยำ","example_en":"He answered the question accurately.","example_th":"เขากลับคำถามได้อย่างแม่นยำ"},{"word":"acid","pos":"noun","en_meaning":"A chemical substance with a pH less than 7, typically having a sour taste and corrosive properties.","th_meaning":"สารเคมีที่มีความจิตรกรรมด้านกลุ่มซิงเกะก้อน (pH น้อยกว่า 7) และมีรสแค็วและสามารถทำลายสิ่งแวดล้อมได้","example_en":"The lemon juice is an acid.","example_th":"น้ำตาลมะนาวเป็นสารเคมีชนิดอันดับซิงเกะก้อน"},{"word":"acidic","pos":"adjective","en_meaning":"tending to make something sour or sharp in taste or effect; having a high concentration of hydrogen ions and causing pain or burning when contact is made with living tissue.","th_meaning":"มีรสจัดหรือเป็นอันตรายต่อเยื่อบริเวณ","example_en":"The lemon juice was very acidic, and it burned my tongue when I drank it.","example_th":"น้ำส้มข้นก็เป็นของหวานเหมือนกัน แต่ก็มีรสจัดที่จะทำให้เรามักลืมที่รับประทานด้วยใจ"},{"word":"activate","pos":"verb","en_meaning":"to make something start working or functioning again, to bring (something) into action.","th_meaning":"ให้ทำงานหรือใช้งานอีกครั้ง","example_en":"To activate the alarm, press the button.","example_th":"เพื่อเปิดปลุกที่สัญญาณ ควรกดปุ่ม"},{"word":"actively","pos":"adverb","en_meaning":"in an energetic and lively manner","th_meaning":"อย่างกระตือรือร้นหรือชินเก่ง","example_en":"He played actively in the game.","example_th":"เขาเล่นเกมอย่างกระตือรือร้น"},{"word":"acute","pos":"adjective","en_meaning":"sharp, pointed","th_meaning":"แหลม, ช่างฉลาด","example_en":"The doctor gave me an acute painkiller to take.","example_th":"แพทย์ให้ฉันทานยาแก่ปวดที่เป็นอาการแหลม"},{"word":"adaptation","pos":"noun","en_meaning":"The process of changing or being changed to fit a new environment or situation.","th_meaning":"การปรับตัวหรือการเปลี่ยนแปลงเพื่อให้เข้ากับสภาพแวดล้อมใหม่หรือสถานการณ์","example_en":"The city has undergone significant adaptation since the earthquake.","example_th":"เมืองได้ผ่านกระบวนการปรับตัวอย่างมากขึ้น kểตั้งแต่แผ่นดินไหว"},{"word":"adaptive","pos":"adjective","en_meaning":"able to change in order to survive or function effectively in a changing situation","th_meaning":"สามารถปรับเปลี่ยนได้เพื่ออยู่ในสถานการณ์ที่เปลี่ยนแปลง","example_en":"The plant species is highly adaptive and can grow in various environments.","example_th":"พันธุ์ผักชนิดนี้มีความปรับตัวสูงและสามารถเติบโตได้ในสภาพแวดล้อมที่แตกต่างกัน"},{"word":"adjacent","pos":"adjective","en_meaning":"next to each other in space or time; contiguous","th_meaning":"ติดกันหรืออยู่ใกล้เคียงกัน","example_en":"The houses are adjacent.","example_th":"บ้านเหล่านี้อยู่ติดกัน"},{"word":"admission","pos":"noun","en_meaning":"the act or process of being admitted to a place, especially to a school or hospital.","th_meaning":"การเข้าร่วมหรือสมัครเข้าสู่สถานที่บางอย่าง เช่น การเข้ารับการศึกษาหรือการเข้ารับการรักษา","example_en":"The patient's admission to the hospital was a matter of life and death.","example_th":"การเข้ารับการรักษาของผู้ป่วยในโรงพยาบาลนั้นเป็นเรื่องของการชีวิตหรือตาย"},{"word":"adolescent","pos":"noun","en_meaning":"a young person, especially one undergoing the physical and psychological changes of puberty.","th_meaning":"เด็กเยาวชน, ผู้กำลังผ่านพันธุกรรมวัยสาว/หลาน","example_en":"She is an adolescent girl.","example_th":"เธอเป็นเด็กเยาวชนหญิง"},{"word":"adverse","pos":"adjective","en_meaning":"opposed to what is wished for or hoped for; harmful or disadvantageous.","th_meaning":"ขัดแย้งกับความต้องการหรือหวัง; ไม่ดีหรือเสียหาย","example_en":"The weather conditions were adverse, making the trip impossible.","example_th":"สภาพอากาศไม่ดีทำให้การเดินทางเป็นไปไม่ได้"},{"word":"aerosol","pos":"noun","en_meaning":"a fine spray of liquid or solid particles dispersed in a gas, often produced by a pump, canister, spray bottle, or pressurized can.","th_meaning":"ละอองส่วนต่างๆ ที่กระจายในอากาศ เช่น น้ำยาล้างรถ","example_en":"He sprang into action with an aerosol can of insect repellent.","example_th":"เขารวมตัวขึ้นเพื่อกำจัดแมลงกับการส่งพลาสติกละอองกำจัดแมลง"},{"word":"aesthetic","pos":"adjective","en_meaning":"relating to beauty or the arts in a cultivated taste or appreciation.","th_meaning":"เกี่ยวกับความสวยงามหรือศิลปะในท่าทางทันสมัย","example_en":"She has an aesthetic sense.","example_th":"เธอมีความรู้สึกด้านความสวยงาม"},{"word":"affirm","pos":"verb","en_meaning":"to assert or state as true or real, especially something that may not be certain or obvious","th_meaning":"ยืนยันหรือระบุเป็นจริง ถึงแม้ว่าอาจจะไม่แน่นอนหรือชัดเจน","example_en":"The witness was asked to affirm the truth of his statement.","example_th":"ผู้ให้ข้อมูลถูกถามว่าจะยืนยันความจริงของคำพูดของเขาหรือไม่"},{"word":"afterward","pos":"adverb","en_meaning":"at or after a specified time; later on.","th_meaning":"หลังจากนั้น หรือในภายหลัง","example_en":"We will meet afterward.","example_th":"เราจะพบกันต่อไป"},{"word":"aggregate","pos":"noun, verb","en_meaning":"to combine things into a single unit; a collection of similar items or people; to form or join together into one whole.","th_meaning":"รวมหรือจับมือกันเป็นกลุ่มด้วยกัน; การรวบรวมสิ่งที่คล้ายกันหรือคนให้เป็นกลุ่มเดียวกัน","example_en":"The company is aggregating data from multiple sources.","example_th":"บริษัทกำลังรวมข้อมูลจากแหล่งหลายแห่ง"},{"word":"agriculture","pos":"noun","en_meaning":"the activity or business of farming, especially growing crops and raising livestock","th_meaning":"การเกษตร การปลูก庄稼 และเลี้ยงสัตว์เพื่อใช้ประโยชน์","example_en":"Agriculture is a major industry in many countries.","example_th":"การเกษตรเป็นภาคธุรกิจที่สำคัญในประเทศหลายแห่ง"},{"word":"airplane","pos":"noun","en_meaning":"A vehicle designed for flying through the air using wings.","th_meaning":"เครื่องบิน","example_en":"He flew to Paris in an airplane.","example_th":"เขานั่งเครื่องบินไปพารี"},{"word":"algebra","pos":"noun","en_meaning":"A branch of mathematics dealing with symbols and the rules for manipulating these symbols.","th_meaning":"สาขาของคณิตศาสตร์ที่เกี่ยวกับการใช้ตัวอักษรและกฎในการจัดการกับตัวอักษรเหล่านั้น","example_en":"He loves algebra because it involves solving puzzles with numbers.","example_th":"เขารักคณิตศาสตร์ เพราะมันเกี่ยวกับการทำปัญหาที่มีตัวเลข"},{"word":"algorithm","pos":"noun","en_meaning":"a set of instructions that defines a sequence of operations to be performed.","th_meaning":"กระบวนการที่กำหนดลำดับของคำสั่งในการทำงานหรือการทำบางอย่าง","example_en":"The quick brown fox jumps over the lazy dog using an algorithm.","example_th":"ใช้กติกาการค้นหาแบบ binary search เพื่อค้นหาข้อมูลในรายการที่เรียงลำดับ"},{"word":"alien","pos":"noun","en_meaning":"a person who comes from another planet or universe and is not human","th_meaning":"คนนอกโลกหรือผู้ที่มาจากดาวอื่น ๆ ในระบบสุริย์ของเรา ไม่ใช่มนุษย์","example_en":"The discovery of extraterrestrial life would be a monumental achievement for humanity.","example_th":"การค้นพบวิถีชีพนอกโลกจะเป็นความสำเร็จอันมหัศจรรย์สำหรับมนุษยชาติ"},{"word":"alliance","pos":"noun","en_meaning":"A formal agreement or arrangement between two or more parties for mutual benefit.","th_meaning":"การส่งเสริมความเข้าใจและเป็นมืออาชีพกันระหว่างกลุ่มหรือประเทศอย่างซ้ำ ๆ","example_en":"The alliance between the United States and Canada is one of the most important in the world.","example_th":"การส่งเสริมความเข้าใจและเป็นมืออาชีพกันระหว่างสหรัฐอเมริกาและแคนด้าเป็นหนึ่งในที่สำคัญที่สุดในโลก"},{"word":"allocate","pos":"verb","en_meaning":"to assign or set aside a particular function, space, or amount for someone or something","th_meaning":"ต้องการหรือระบุจำนวนหนึ่งจำนวนเฉพาะสำหรับใคร้าหรือบางสิ่งใด","example_en":"The company will allocate more resources to the new project.","example_th":"บริษัทจะมอบทรัพยากรมากขึ้นให้กับโครงการใหม่"},{"word":"allocation","pos":"noun","en_meaning":"The act of assigning or distributing something, especially a fixed amount of resources such as money or staff.","th_meaning":"การจัดสรรหรือตั้งค่าสิ่งใดสิ่งหนึ่งอย่างมีระบบ","example_en":"The company made a new allocation for the marketing department.","example_th":"บริษัทได้มีการจัดสรรเงินใหม่ให้กับแผนกตลาด"},{"word":"altitude","pos":"noun","en_meaning":"the height of something above a reference level, especially mean sea level.","th_meaning":"ความสูงจากระดับน้ำทะเลเฉลิมพระบาทสมเด็จพระเจ้าอยู่หัว","example_en":"The plane flew at an altitude of 30,000 feet.","example_th":"เครื่องบินบินที่ความสูง 30,000 กิโลเมตร"},{"word":"aluminum","pos":"noun","en_meaning":"A light, silvery-white metallic element with low density and high electrical conductivity.","th_meaning":"ธาตุเหล็กอัลูมิเนียม","example_en":"The aircraft was made mostly of aluminum for its lightweight.","example_th":"เครื่องบินทำหลักจากเหล็กอัลูมิเนียมเพื่อความเบา"},{"word":"amino","pos":"noun","en_meaning":"any of a class of organic compounds containing amine groups and at least one carbon atom bonded to hydrogen","th_meaning":"อะมิโน (เป็นชนิดของสารประกอบที่ประกอบด้วยกลุ่มเอามินและคาร์บอนได้รับการเชื่อมต่อไปด้วยออกซิเจน)","example_en":"The body needs amino acids to build proteins.","example_th":"ร่างกายจำเป็นต้องใช้อัมิโนกีว่าในการสร้างโปรเพน"},{"word":"amongst","pos":"preposition","en_meaning":"in or among a group of people, objects, or things","th_meaning":"ในกลุ่มหรือชุดของคน วัตถุหรือสิ่งเหล่านั้น","example_en":"She felt she was amongst the best.","example_th":"เธอรู้สึกเหมือนเป็นคนดีที่สุดในกลุ่ม"},{"word":"amplitude","pos":"noun","en_meaning":"the extent of a vibration or oscillation from the mean position; magnitude","th_meaning":"ความสูงสุดของคลื่นหรือการเปลี่ยนแปลงในปริมาณใด ๆ","example_en":"The amplitude of the wave is 5 meters.","example_th":"ความสูงสุดของคลื่นนี้คือ 5 เมตร"},{"word":"analogy","pos":"noun","en_meaning":"a comparison between two unlike things in order to highlight similarities between them.","th_meaning":"คำสัพพะการเปรียบเทียบของสองสิ่งที่คล้ายกันเพื่อแสดงความคล้ายคลึงระหว่างตัวนั้น ๆ ต่อไป","example_en":"He compared her to a flower.","example_th":"เขามีดูเหมือนคนดอกไม้"},{"word":"ancestor","pos":"noun","en_meaning":"a person in the family line preceding one's parents, grandparents, etc.","th_meaning":"พ่อบ้าหรือบรรดาประพันธุ์ของคุณ","example_en":"My great-grandfather was a famous painter.","example_th":"สูตรเลี้ยงลูกแม่ยี่ปู่ของฉันสอนให้ผม"},{"word":"anthropology","pos":"noun","en_meaning":"the scientific study of human beings, including their origins, development, and cultural behavior.","th_meaning":"การศึกษาวิทยามนุษยศาสตร์ ที่ครอบคลุมเรื่องราวเกี่ยวกับประวัติศาสตร์ การพัฒนา และพฤติกรรมทางสังคมของมนุษย์","example_en":"The field of anthropology is vast and covers many sub-disciplines, including physical anthropology, cultural anthropology, and linguistic anthropology.","example_th":"สาขาวิทยามนุษยศาสตร์มีความกว้างใหญ่และครอบคลุมหลายด้าน รวมถึงวิทยามนุษยศาสตร์เชิงร่างกาย สังคม และภาษา"},{"word":"anti","pos":"adjective","en_meaning":"opposed to, against","th_meaning":"ขัดกัน, ตรงข้าม","example_en":"He is anti-establishment.","example_th":"เขารักษาความไม่ยึดตามที่รัฐบาลกำหนด"},{"word":"antibiotic","pos":"noun","en_meaning":"A substance produced by certain living organisms to kill or inhibit the growth of bacteria and other microorganisms.","th_meaning":"สารที่มีคุณสมบัติฆ่าหรือหยุดการเจริญเติบโตของแบคทีเรียและอวัยวะเชื้อโรคอื่น ๆ","example_en":"Penicillin is a common antibiotic used to treat bacterial infections.","example_th":"ปenicillin เป็นยาที่มักใช้ในการรักษาโรคติดเชื้อแบคทีเรีย"},{"word":"antibody","pos":"noun","en_meaning":"a protein produced by the immune system in response to a foreign substance, such as a pathogen or toxin, that can neutralize that substance and help fight infection.","th_meaning":"สารภูมิคุ้มกันที่สร้างขึ้นโดยระบบภูมิคุ้มกันในการตอบสนองต่อสิ่งแปลกปลอม เช่น แบคทีเรียหรือสาร độc เพื่อทำให้ออกจากความเสียหาย","example_en":"The body produces antibodies to fight off infections.","example_th":"ร่างกายสร้างผ่าภูมิคุ้มกันเพื่อลดเชื้อโรค"},{"word":"antiquity","pos":"noun","en_meaning":"the state or quality of being old and ancient; the time that has passed since an event or period.","th_meaning":"ความเก่าแก่ การผ่านเวลายาวนาน","example_en":"The study of antiquity is fascinating.","example_th":"การศึกษาวัฒนธรรมโบราณเป็นเรื่องที่น่าสนใจ"},{"word":"appendix","pos":"noun","en_meaning":"an additional part or section, especially one added at the end of a document or book; a small organ or structure in the body.","th_meaning":"ส่วนเพิ่มเติมหรือส่วนเสริม การเพิ่มเติมของเอกสารหรือหนังสือ ส่วนเล็ก ๆ ในร่างกาย","example_en":"The medical report included an appendix with the test results.","example_th":"รายงานแพทย์รวมถึงส่วนที่มีผลทดสอบ"},{"word":"applause","pos":"noun","en_meaning":"a sound of approval or admiration, often made by clapping the hands together.","th_meaning":"เสียงปรับตัวหรือเห็นดี","example_en":"The audience gave a standing ovation to the performers.","example_th":"สาธารณชนapplauseผู้การแสดง"},{"word":"apple","pos":"noun","en_meaning":"a fruit with a soft pulpy texture, typically red, green, or yellow in color","th_meaning":"แอปเปิ้ล (Áppei)","example_en":"I love to eat apples every day.","example_th":"ฉันชอบกินแอปเปิ้ลทุกวัน"},{"word":"approximate","pos":"verb, adjective","en_meaning":"to be close to in number or extent; not exact but reasonably so","th_meaning":"ที่คล้ายคลึงกัน ไม่แม่นยำแต่อยู่ในระดับใกล้เคียง","example_en":"The measurement was approximate.","example_th":"การวัดนั้นเป็นการประมาณ"},{"word":"approximation","pos":"noun","en_meaning":"the quality or state of coming close to something in effect, value, or meaning; an estimate","th_meaning":"การประมาณหรืออ้างอิงถึงค่าที่ใกล้เคียงกับมูลค่าจริง","example_en":"The scientist made an approximation of the distance.","example_th":"นักวิทยาศาสตร์ทำการประมาณระยะทางนั้น"},{"word":"arbitrary","pos":"adjective","en_meaning":"not guided by reason or necessity; random; haphazard.","th_meaning":"ไม่ได้รับการควบคุมหรือกำหนดโดยระเบียบหรือความจำเป็น หรือ สุขสันต์","example_en":"He made an arbitrary decision.","example_th":"เขานำไปทำสิ่งที่เขาใจเท่านั้น และไม่มีเหตุผลหลักฐาน"},{"word":"archaeology","pos":"noun","en_meaning":"The study of human history and prehistory through the analysis of material culture.","th_meaning":"การศึกษาประวัติศาสตร์และประวัติศาสตร์ดินเผ่าผ่านการวิเคราะห์ของคุณสมบัติต่าง ๆ ของสังคมมนุษย์","example_en":"Archaeology is a fascinating field.","example_th":"การศึกษาโบราณเป็นสาขาที่น่าสนใจ"},{"word":"architect","pos":"noun","en_meaning":"A person who designs buildings and structures.","th_meaning":"ผู้ออกแบบบ้านและโครงสร้างต่างๆ","example_en":"She is an architect with over 10 years of experience.","example_th":"เธอเป็นนักออกแบบที่มีประสบการณ์มากกว่า 10 ปี"},{"word":"array","pos":"noun","en_meaning":"a collection of items stored at contiguous memory locations and accessed via indices.","th_meaning":"โครงสร้างข้อมูลที่เก็บรวบรวมข้อมูลหลายๆ รายการในตำแหน่งที่อยู่ติดกันด้วยกัน โดยสามารถเข้าถึงได้โดยใช้ดัชนี","example_en":"The array contains integers from 1 to 10.","example_th":"อาร์เรย์นี้มีจำนวนเต็มจาก 1 ไปจนถึง 10"},{"word":"arrow","pos":"noun","en_meaning":"a long narrow missile with a point and fletching used for shooting from a bow or at targets.","th_meaning":"ตะกั่ง, สปียู","example_en":"He shot an arrow into the heart of the beast.","example_th":"เขาส่งตะกั่งไปตรงกลางแมลง"},{"word":"articulate","pos":"verb","en_meaning":"to express thoughts and ideas clearly and effectively, often using language that is logical and well-structured.","th_meaning":"คุณภาพในการสื่อสารที่ชัดเจนและมีความเข้าใจ","example_en":"She is articulate in her speech and has a clear understanding of the subject matter.","example_th":"เธอสามารถสื่อสารได้อย่างชัดเจนและมีความเข้าใจในหัวข้อที่กำลังพูด"},{"word":"artifact","pos":"noun","en_meaning":"A man-made object with historical or cultural significance.","th_meaning":"สิ่งแวดล้อมที่สร้างขึ้นด้วยมือและมีความสำคัญทางประวัติศาสตร์หรือวัฒนธรรม","example_en":"The museum houses many valuable artifacts from around the world.","example_th":"ห้องสมุดมีสิ่งแวดล้อมมากมายจากทุกแห่งของโลก"},{"word":"artificial","pos":"adjective","en_meaning":"not natural or genuine; made or done with human skill rather than occurring naturally","th_meaning":"ที่สร้างขึ้นโดยมนุษย์ หรือไม่เป็นธรรมชาติ","example_en":"The dress is too artificial for my taste.","example_th":"เสื้อผ้านี้มีความสัมพันธ์กับสภาพแวดล้อมที่เรียกว่า 'อันตราย' หรือ 'ไม่ธรรมชาติ'"},{"word":"artistic","pos":"adjective","en_meaning":"having or showing ability, skill, and imagination in art or design","th_meaning":"มีความสร้างสรรค์หรือด้านศิลปะที่ดี","example_en":"She is very artistic and loves to paint.","example_th":"เธอมีความสามารถในการวาดภาพและรักการวาดภาพ"},{"word":"artwork","pos":"noun","en_meaning":"a work of art, especially one that is produced for sale or exhibition","th_meaning":"ศิลปะ หรืองานศิลปะ","example_en":"The gallery features a variety of artworks from local artists.","example_th":"แกลเลอรีนี้มีการ trưng bàyงานศิลปะจากศิลปินท้องถิ่นหลายอย่าง"},{"word":"aspect","pos":"noun","en_meaning":"a particular feature or element of something.","th_meaning":"ลักษณะเฉพาะหรือองค์ประกอบบางส่วนของบางอย่าง","example_en":"The aspect of the painting that I admire most is the color.","example_th":"ลักษณะที่ฉันชื่นชอบมากที่สุดในภาพวาดนี้คือสี"},{"word":"assembly","pos":"noun","en_meaning":"the process of making something by putting its parts together; a group or collection of people or things brought together for a common purpose","th_meaning":"การประกอบส่วนต่างๆ หรือการรวมร่างกายกันมาเป็นหนึ่งอย่าง เช่น การผลิตสินค้า","example_en":"The company is working on the assembly line.","example_th":"บริษัทกำลังทำงานในไลน์จัดส่ง"},{"word":"assert","pos":"verb","en_meaning":"to state or claim something firmly and with confidence, often in a way that you are certain is true","th_meaning":"ยืนยันหรือกล่าวหาว่าบางอย่างเป็นจริง","example_en":"I assert that the project will be completed on time.","example_th":"ฉันตั้งใจว่าโครงการจะเสร็จสมบูรณ์ในเวลาที่กำหนด"},{"word":"assignment","pos":"noun","en_meaning":"the act of giving or giving out work to be done, especially as part of one's job; the work given to someone to do","th_meaning":"การมอบหมายงานให้ทำหรือสิ่งที่ต้องทำให้ดูแล ซึ่งเป็นหน้าที่ส่วนหนึ่งของงานหรือภาระงาน","example_en":"The teacher gave me an assignment to write a report.","example_th":"ครูมอบหมายให้ผมเขียนรายงาน"},{"word":"athletic","pos":"adjective","en_meaning":"having or showing physical fitness and strength; fit and healthy.","th_meaning":"สุขภาพดี มีความแข็งแรง","example_en":"He is athletic and enjoys playing sports.","example_th":"เขาเป็นคนมีสุขภาพดีและชอบเล่นกีฬา"},{"word":"atom","pos":"noun","en_meaning":"the smallest unit of an element that can take part in a chemical reaction","th_meaning":"อะโตม คือ ส่วนเล็กที่สุดของธาตุสามารถเข้าร่วมในปฏิกิริยาเคมีได้","example_en":"An atom is the smallest unit of an element that can take part in a chemical reaction.","example_th":"อะโตมคือส่วนเล็กที่สุดของธาตุสามารถเข้าร่วมในปฏิกิริยาเคมีได้"},{"word":"atomic","pos":"adjective","en_meaning":"capable of being divided only into smaller particles with a definite mass and charge; indivisible in ordinary chemical reactions; pertaining to atoms.","th_meaning":"ที่ไม่สามารถถูกแยกเป็นส่วนย่อยได้ หรือตัวอันดับหลักในวงจรไฟฟ้า","example_en":"The structure of an atom is the fundamental building block of matter. Every element has a unique atomic structure.","example_th":"โครงสร้างของอะมอนีค์เป็นส่วนประกอบพื้นฐานของสาร"},{"word":"auction","pos":"noun","en_meaning":"a public sale of goods or property to the highest bidder, typically by an auctioneer.","th_meaning":"การประชุมซื้อขายหรือประชุมเสนอราคาทางสินค้าให้กับผู้ที่พร้อมจะจ่ายแพงที่สุด","example_en":"The items were put up for auction at the charity event.","example_th":"สิ่งของถูกวางขายในอัชนีการประชุมเพื่อร่วมงานกับกุศล"},{"word":"audio","pos":"noun","en_meaning":"a sound recorded, broadcast, or transmitted on a medium such as tape or the air","th_meaning":"เสียงที่ถูกบันทึกหรือส่งออกผ่านช่องทางอื่นๆ เช่น แผ่นดินพลาสติกหรืออากาศ","example_en":"I need to listen to my audio recordings.","example_th":"ฉันต้องการฟังคำบรรยายของฉัน"},{"word":"audit","pos":"noun","en_meaning":"an official examination of a company's financial statements and practices to ensure that they are accurate and honest.","th_meaning":"การตรวจสอบการเงินและปฏิบัติการของบริษัทเพื่อแน่ใจว่าข้อมูลเงินสดและการดำเนินงานถูกทำตามกฎหมายและเป็นไปตามความต้องการทางธุรกิจ","example_en":"The company will undergo an audit to ensure its financial statements are accurate.","example_th":"บริษัทจะผ่านการตรวจสอบเพื่อแน่ใจว่าข้อมูลเงินสดของพวกเขาถูกทำอย่างถูกต้องและตรงตามกฎหมาย"},{"word":"authority","pos":"noun","en_meaning":"the power or right to make decisions, give orders, and enforce rules.","th_meaning":"อำนาจ หรือสิทธิ์ในการตัดสินใจ ที่ประมุขให้คำสั่ง และบังคับใช้กฎระเบียบ","example_en":"He has the authority to make important decisions for the company.","example_th":"เขาได้รับอำนาจในการตัดสินใจสำคัญสำหรับบริษัท"},{"word":"autonomy","pos":"noun","en_meaning":"the condition of being self-governing; the right to make decisions for oneself without interference from others","th_meaning":"ความอิสระ, สิทธิในการตัดสินใจด้วยตนเองโดยไม่ถูกผู้อื่นแทรกแซง","example_en":"He enjoyed his newfound autonomy.","example_th":"เขาสนุกกับความอิสระที่เขารับมือได้"},{"word":"availability","pos":"noun","en_meaning":"the state of being available or being at hand when needed","th_meaning":"การให้บริการหรือการมีอยู่ที่จุดหมายได้เมื่อจำเป็นต้องใช้งาน","example_en":"The hotel has a high level of availability during the busy season.","example_th":"โรงแรมนี้มีระดับความพร้อมให้บริการสูงในฤดูกาลที่คนเดินทางมากมาย"},{"word":"axiom","pos":"noun","en_meaning":"a statement or proposition that is regarded as self-evidently true and hence forms a starting point for further reasoning or discussion.","th_meaning":"คำพูดหรือประโยคที่ถูกกำหนดว่าเป็นจริงโดยไม่จำเป็นต้องหลักฐานใดๆ และใช้เป็นจุดเริ่มต้นในการเห็นความคิดเห็นต่อไปนี้","example_en":"The law of non-contradiction is one of the most basic axioms in logic.","example_th":"กฎหมายไม่มีการตรงข้ามเป็นหนึ่งในคำพูดที่สำคัญที่สุดของตรรกศาสตร์"},{"word":"axis","pos":"noun","en_meaning":"A central line or point about which something rotates or is symmetrically arranged.","th_meaning":"แนวแกนหรือจุดกลางที่ผ่านอยู่ในสิ่งมีความหมุนหรือสมมาตร","example_en":"The Earth rotates around its axis.","example_th":"โลกหมุนรอบแกน"},{"word":"backward","pos":"adverb","en_meaning":"towards the rear or in a reverse direction","th_meaning":"กลับไป","example_en":"He walked backward to avoid the oncoming traffic.","example_th":"เขาวิ่งกลับเพื่อหลีกเลี่ยงการข้ามข่าย"},{"word":"bacteria","pos":"noun","en_meaning":"tiny living organisms that can only be seen with a microscope, some of which cause disease","th_meaning":"แบคทีเรีย","example_en":"Bacteria are found everywhere on Earth.","example_th":"แบคทีเรียพบได้ทุกที่บนโลก"},{"word":"bacterial","pos":"adjective","en_meaning":"relating to bacteria or caused by bacteria","th_meaning":"เกี่ยวกับแบคทีีย์หรือถูกแบคทีีย์ทำให้","example_en":"The patient has a bacterial infection.","example_th":"คนไข้มีการติดเชื้อแบคทีีย์"},{"word":"bang","pos":"verb","en_meaning":"to hit or collide with a loud noise, to make a sudden sharp sound","th_meaning":"กระทบหรือชนกันด้วยเสียงรุนแรง, ทำเครื่องหมายถูกชนที่เร็วและกระแทก","example_en":"He banged on the door to get her attention.","example_th":"เขากลางฝาเพื่อให้เธอได้ยิน"},{"word":"bargain","pos":"noun","en_meaning":"a good deal, especially one obtained at a lower price than the original or usual one; a haggling session over the price of something.","th_meaning":"ขายน้ำเงิน, การตกลงราคาหรือขายน้ำเงินเพื่อซื้อสิ่งของที่มีอยู่ในร้านค้า","example_en":"He made a bargain on the price of the car.","example_th":"เขาได้ขายน้ำเงินในการขายรถ"},{"word":"barrel","pos":"noun","en_meaning":"a large container with a long neck and usually straight sides, used for storing or transporting liquids or gases.","th_meaning":"กระบอกใหญ่ ถ้วยบรรจุเล็กๆ","example_en":"He needs to buy a new barrel of wine.","example_th":"เขาต้องซื้อกระบอกワインใหม่"},{"word":"basin","pos":"noun","en_meaning":"a shallow dish with a low rim, typically made of ceramic or metal, used for washing hands or dishes","th_meaning":"ถ้วยข้าว (baat khao)","example_en":"I need to wash my hands in the basin.","example_th":"ฉันต้องล้างมือในถ้วยข้าว"},{"word":"bat","pos":"noun","en_meaning":"a mammal that flies at night, typically using echolocation to navigate and catch insects.","th_meaning":"พีที (เป็นชนิดของไม้)","example_en":"He went out with a bat to catch some insects.","example_th":"เขากำลังเดินทางไปดูหมากรุ่งกับมือถือ"},{"word":"beam","pos":"noun","en_meaning":"a long and narrow piece of wood, metal, or other material used as a support or framework.","th_meaning":"หลอด (lòot)","example_en":"He built the house with strong beams.","example_th":"เขาก่อบ้านด้วยหลอดที่แข็งแรง"},{"word":"behavioral","pos":"adjective","en_meaning":"relating to behavior or the study of behavior","th_meaning":"เกี่ยวกับพฤติกรรมหรือการศึกษาพฤติกรรม","example_en":"Behavioral psychology is a branch of psychology that studies human behavior.","example_th":"สาขาจิตวิทยาสังคมศาสตร์เป็นแขนงของจิตวิทยาที่ทำการศึกษาพฤติกรรมมนุษย์"},{"word":"bilingual","pos":"adjective","en_meaning":"able to speak or write two languages fluently","th_meaning":"ที่สามารถพูดและเขียนสองภาษาได้คล่องตัว","example_en":"She is bilingual and can speak both English and Spanish.","example_th":"เธอมีทักษะการสื่อสารสองภาษา สามารถพูดและเขียนเป็นภาษาอังกฤษและภาษาสpanyolได้"},{"word":"binary","pos":"noun, adjective","en_meaning":"a system of numbers using only two digits (0 and 1), or a digital system that uses only two states to represent information.","th_meaning":"ระบบเลขที่ใช้แค่สองตัวเลข (0 และ 1) หรือระบบดิจิตอลที่ใช้แค่สองสถานะในการสื่อสารข้อมูล","example_en":"The computer uses binary code to process information.","example_th":"คอมพิวเตอร์ใช้รหัสไบนารีในการประมวลผลข้อมูล"},{"word":"biodiversity","pos":"noun","en_meaning":"the variety of different kinds of living organisms within a given species, habitat, or ecosystem","th_meaning":"ความหลากหลายทางชีวภาพ","example_en":"The loss of biodiversity is one of the greatest environmental challenges facing humanity.","example_th":"การเสียหายของความหลากหลายทางชีวภาพเป็นหนึ่งในภัยคุกคามทรัพยากรธรรมชาติที่ใหญ่มากที่สุดที่กำลังเผชิญผู้คน"},{"word":"biologist","pos":"noun","en_meaning":"a scientist who studies living organisms and their relationships with each other and their environment","th_meaning":"นักชีวภาพ","example_en":"She is a biologist studying the effects of climate change on plant species.","example_th":"เธอเป็นนักชีวภาพกำลังศึกษาผลกระทบของเปลี่ยนแปลง khí hậuต่อพันธุ์พืช"},{"word":"biology","pos":"noun","en_meaning":"the scientific study of living organisms and their functions, growth, structure, behavior, and evolution.","th_meaning":"การศึกษาวิทยาชีวภาพที่ครอบคลุมด้านของชีวิตและฟังก์ชันของมัน","example_en":"Biology is a broad field that encompasses the study of all living things.","example_th":"การศึกษานี้ครอบคลุมด้านของชีวิตทั้งหมด"},{"word":"bizarre","pos":"adjective","en_meaning":"strange or unusual in a puzzling way","th_meaning":"แปลกหรือไม่ปกติในมุมมองที่สับสน","example_en":"The sight was bizarre.","example_th":"ภาพถ่ายนั้นมีความท้าทาย"},{"word":"blank","pos":"noun","en_meaning":"empty, devoid of content or color","th_meaning":"เปล่า, ไม่มีเนื้อหาหรือสี","example_en":"The canvas was blank.","example_th":"ภาพวาดเป็นไปยัง"},{"word":"bleed","pos":"verb","en_meaning":"to let blood flow from a cut or injury, to be injured and start bleeding","th_meaning":"ไหลเลือดจากบาดเจ็บหรือสิ่งแย่","example_en":"He got a cut on his finger and was bleeding.","example_th":"เขามีตะอกเลือดจากที่ร้ายแรง"},{"word":"bodily","pos":"adjective","en_meaning":"relating to the body or physical existence; having a physical form","th_meaning":"ที่เกี่ยวกับร่างกายหรือความเป็นมีร่างกาย ต้องการรูปแบบร่างกาย","example_en":"He felt bodily harmed by the incident.","example_th":"เขากลัวเหตุการณ์นั้นเป็นร่างกาย"},{"word":"bonus","pos":"noun","en_meaning":"an amount of money paid as a reward or in addition to regular pay.","th_meaning":"โบนัส (bon) หมายถึงเงินตอบแทนหรือรางวัลที่ได้รับเหนือเงินเดือนประจำงานอีกมากขึ้น","example_en":"He received a bonus for his hard work.","example_th":"เขารับโบนัสจากการทำงานหนักของตนเอง"},{"word":"bound","pos":"verb","en_meaning":"to tie or restrict","th_meaning":"ขั้นจำกัดหรือถูกต้องด้วยกฎหมาย","example_en":"He was bound by a contract.","example_th":"เขาน่าจะถูกสัญญาที่เขาลงกลับ"},{"word":"bracket","pos":"noun","en_meaning":"a device for holding, supporting, or fastening something else; a sign used to enclose or separate parts of a mathematical expression.","th_meaning":"เครื่องหมายหรืออุปกรณ์ที่ใช้สำหรับจัดเก็บ การสนับสนุน หรือจับตัวอื่น เช่น เครื่องหมายวงเล็บ","example_en":"The bookshelf has brackets to hold the books.","example_th":"ชั้นวางหนังสือมีเครื่องหมายที่ใช้สำหรับจัดเก็บหนังสือ"},{"word":"breakdown","pos":"noun","en_meaning":"the separation of something into parts or the state of being separated; a failure to function properly; a detailed examination or analysis.","th_meaning":"การแยกสลาย, การชำรุด, การวิเคราะห์อย่างละเอียด","example_en":"The engine's breakdown required immediate repair.","example_th":"การชำรุดของเครื่องยนต์จำเป็นต้องซ่อมแซมทันที"},{"word":"broadly","pos":"adverb","en_meaning":"in a general or wide sense; not specifically","th_meaning":"ทั่วไป อย่างกว้างขวาง","example_en":"He was broadly misunderstood.","example_th":"เขานับถือผิดโดยไม่จำเป็นต้องเฉพาะเจาะจง"},{"word":"bubble","pos":"noun, verb","en_meaning":"a small ball of air or other gas in a liquid or gas; to cause something to form bubbles","th_meaning":"กลยุทธ์; บั่นแก๊สในน้ำหรืออากาศ","example_en":"There are bubbles in the drink.","example_th":"มีบั่นแก๊สอยู่ในดื่ม"},{"word":"bucket","pos":"noun","en_meaning":"a container for holding liquid or other substances, typically with a handle and an open top.","th_meaning":"ถ้วยสำหรับเก็บน้ำหรือสิ่งที่ต้องการเก็บไว้ ทำให้มีฝาข้างบนและมีห้าม","example_en":"I need to buy a new bucket.","example_th":"ฉันต้องซื้อถ้วยใหม่"},{"word":"bulk","pos":"noun, verb","en_meaning":"a large quantity or amount; to increase in volume or size significantly.","th_meaning":"ปริมาณหรือจำนวนที่มาก; เพิ่มขนาดหรือปริมาณอย่างมาก","example_en":"The shipment of goods was in bulk.","example_th":"การขนส่งสินค้าเป็นกลุ่มใหญ่"},{"word":"bullet","pos":"noun","en_meaning":"a small projectile, especially one fired from a gun.","th_meaning":"กระบอก","example_en":"He shot the bullet into the target.","example_th":"เขาปืนกระบอกเข้าไปในเป้าหมาย"},{"word":"bundle","pos":"noun","en_meaning":"a collection of things tied or gathered together; a package.","th_meaning":"กลุ่มหรือชุดของสิ่งต่าง ๆ ที่ถูกจับกุมหรือรวบรวมด้วยกัน","example_en":"He bought a bunch of bananas at the market.","example_th":"เขากกลุ่มบุลขีนที่ตลาด"},{"word":"calcium","pos":"noun","en_meaning":"A chemical element with the symbol Ca and atomic number 20. It is a soft, silvery-white metallic element that is essential for bone health and other functions in living organisms.","th_meaning":"ธาตุแคลเซียม (Hatha-tu ka-leem)","example_en":"Calcium is an essential nutrient for maintaining strong bones and teeth.","example_th":"แคลเซียมเป็นสารอาหารที่จำเป็นสำหรับการบำรุงรักษาโครงหลังคาและฟัน"},{"word":"calculation","pos":"noun","en_meaning":"The process of determining a result by adding, subtracting, multiplying, or dividing numbers.","th_meaning":"การคำนวณ","example_en":"He needs to do a quick calculation to determine the total cost.","example_th":"เขารู้สึกต้องทำการคำนวณเพื่อหาค่าใช้จ่ายทั้งหมด"},{"word":"calculator","pos":"noun","en_meaning":"a device for performing mathematical calculations, especially addition, subtraction, multiplication, and division.","th_meaning":"เครื่องคิดเลข หรือ เครื่องคำนวณ เป็นอุปกรณ์ที่ใช้ในการคำนวณค่าทางคณิตศาสตร์ เช่น การบวก ลบ คูณ และหาร","example_en":"I need to use a calculator to solve this problem.","example_th":"ฉันต้องการใช้เครื่องคิดเลขเพื่อแก้ปัญหานี้"},{"word":"calculus","pos":"noun","en_meaning":"A branch of mathematics that deals with limits, derivatives, integrals, and infinite series.","th_meaning":"สาขาของคณิตศาสตร์ที่เกี่ยวกับการหาอนุพันธ์ ดินติ ส่วนรวม และอนุกรม vôริง","example_en":"He studied calculus to understand the motion of planets.","example_th":"เขากำลังศึกษาคณิตศาสตร์เพื่อทำความเข้าใจการเคลื่อนไหวของดาวเคราะห์"},{"word":"campus","pos":"noun","en_meaning":"a college or university and its surroundings, especially the buildings and grounds of a particular educational institution.","th_meaning":"มหาวิทยาลัยหรือสถาบันการศึกษาอื่นๆ เรียงรูปแบบการเรียนรู้ด้วยที่ตั้งใจ","example_en":"She studies at a prestigious campus.","example_th":"เธอกำลังศึกษาที่มหาวิทยาลัยที่โดดเด่น"},{"word":"capillary","pos":"noun","en_meaning":"a tiny blood vessel in the body through which nutrients and oxygen are transferred to cells","th_meaning":"ท่อเลือดเล็กที่เชื่อมระหว่างกระแสเลือดหลักและเซลล์ในร่างกาย ทำหน้าที่ในการส่งสารอาหารและออกซิเจนไปยังเซลล์","example_en":"The capillary network is essential for the distribution of oxygen and nutrients throughout the body.","example_th":"เครือข่ายเลือดเล็กเป็นส่วนสำคัญในการกระจายออกซิเจนและสารอาหารทั่วร่างกาย"},{"word":"capitalism","pos":"noun","en_meaning":"an economic system in which private individuals or groups own and operate the means of production for profit.","th_meaning":"ระบบเศรษฐกิจที่ผู้คนหรือกลุ่มบางกลุ่มร่วมกันยึดทรัพยากรทางการผลิตเพื่อสร้างรายได้","example_en":"The country has a mixed economy with some elements of capitalism.","example_th":"ประเทศนี้มีระบบทะเบียนสินค้าและบริการที่ผสมผสานกับองค์ประกอบบางส่วนของเศรษฐกิจ ึ่ง"},{"word":"capitalist","pos":"noun","en_meaning":"An economic system or political philosophy in which the means of production are privately owned and operated for profit.","th_meaning":"ระบบทะการเงินที่เป็นเอกลักษณ์และทำการดำเนินการเพื่อผลกำไร","example_en":"The capitalist system is characterized by private ownership of the means of production.","example_th":"ระบบทะการเงินทัศนคติร่วมมือได้ถูกเป็นเอกลักษณ์และทำการดำเนินการเพื่อผลกำไร"},{"word":"carrier","pos":"noun","en_meaning":"one that carries something or someone from one place to another, such as a ship, plane, bus, or truck.","th_meaning":"คนหรือสิ่งที่ใช้เพื่อขนส่งของหรือผู้โดยสารจากจุดหนึ่งไปยังจุดอื่น","example_en":"The aircraft carrier was at sea for months.","example_th":"เรือบรรเทาเครื่องบินเดินทางไปอยู่หลายเดือนแล้ว"},{"word":"cattle","pos":"noun","en_meaning":"farm animals, such as cows, sheep, and pigs","th_meaning":"สัตว์เลี้ยง ประกอบด้วยโค่ แพะ และหมู","example_en":"We have a large herd of cattle on our farm.","example_th":"เรามีลูกจระเข้าอยู่จำนวนมากบนฟาร์มของเรามาก"},{"word":"censor","pos":"noun","en_meaning":"a person who is in charge of controlling or filtering information, especially in the media.","th_meaning":"ผู้กำกับหรือผู้ตัดสินใจในเรื่องการควบคุมหรือกรองข้อมูล อย่างไรก็ตาม ไม่สามารถแปลได้ที่แม่นยำในภาษาไทย","example_en":"The government has appointed a censor to oversee the internet in the country.","example_th":""},{"word":"characterization","pos":"noun","en_meaning":"the act of describing or the description itself; the distinguishing features or qualities that define someone or something.","th_meaning":"การจำแนกประเภทหรือการระบุคุณสมบัติเฉพาะเจาะจงของสิ่งมีชีวิต","example_en":"The characterization of the new drug showed promising results in clinical trials.","example_th":"การจำแนกประเภทยาใหม่ได้รับผลที่น่าดึงดูดในทดลองคลินิก"},{"word":"cheat","pos":"verb","en_meaning":"to deceive or manipulate in a dishonest way, especially to gain an unfair advantage","th_meaning":"โกงหรือลอกเลียนแบบอย่างไม่ถูกต้อง เพื่อได้ผลประโยชน์ทางการศึกษาหรือการทำงานไม่ว่าจะเป็นการสอบ การแข่งขัน หรือกิจกรรมทางส่วนบุคคล","example_en":"He was caught cheating on his exam.","example_th":"เขาถูกพบโกงในคะแนนการสอบ"},{"word":"cheer","pos":"verb","en_meaning":"to express happiness or approval, often by shouting or singing","th_meaning":"ขันแน่นอน, แสดงความยินดีหรือเห็นใจ, เรียกน้องให้สุขภาพด้วยเสียงส่งเสริมกำลังใจ","example_en":"The crowd cheered when the team won.","example_th":"เมื่อทีมชนะ กลุ่มคนชุมชนก็แสดงความยินดีด้วยการขันแน่นอน"},{"word":"chemistry","pos":"noun","en_meaning":"the science of the composition, structure, properties, and reactions of matter; the branch of science concerned with substances and their transformations.","th_meaning":"วิทยาการเคมี (Wichai ka chee)","example_en":"He studies chemistry in college.","example_th":"เขายากลังเรียนเคมีในมหาวิทยาลัย"},{"word":"chemotherapy","pos":"noun","en_meaning":"a treatment for cancer that uses drugs to kill cancer cells","th_meaning":"การรักษามะเร็งด้วยยาที่สามารถทำลายเซลล์มะเร็งได้","example_en":"He underwent chemotherapy to treat his cancer.","example_th":"เขารับการรักษาเชมีโทโรธีเพื่อผ่าป่วยมะเร็งของเขานั้น"},{"word":"chess","pos":"noun","en_meaning":"A board game for two players, traditionally played on an 8x8 grid with alternating light and dark squares, involving pieces such as pawns, rooks, knights, bishops, queens, and kings.","th_meaning":"เกมที่เล่นกับเพื่อนคนหนึ่ง โดยใช้กระดานขนาด 8x8 และสัญลักษณ์ต่างๆ เช่น กวาง, หมัน, ตุ๊ก, เขือ, ควีน และเป็นต้น","example_en":"I enjoy playing chess with my friends.","example_th":"ฉันชอบเล่นเกมส์ชีสกับเพื่อนๆ"},{"word":"chloride","pos":"noun","en_meaning":"a negatively charged ion of chlorine","th_meaning":"ไอออนคลอโรเจน","example_en":"Sodium chloride is table salt.","example_th":"สีป่นเป็นโซเดียมคลอร์ได้"},{"word":"chromosome","pos":"noun","en_meaning":"A structure that carries genetic information in living organisms, typically consisting of DNA and protein.","th_meaning":"ชีมอีย่อย (Chīmoyū) เป็นโครงสร้างที่ข้อมูลทางพันธุกรรมอยู่ภายในสิ่งมีชีวิต โดยประกอบด้วย ADN และโปรตีน","example_en":"Each human cell contains 46 chromosomes.","example_th":"เซลล์มนุษย์แต่ละเซลล์มี 46 เซียนออริโอ"},{"word":"chronic","pos":"adjective","en_meaning":"lasting for a long time, especially one that cannot be cured or is difficult to treat.","th_meaning":"ติดเชื้อหรือโรคที่มีความยาวนานและยากจะรักษาได้","example_en":"He has a chronic illness.","example_th":"เขามีโรคประจำปี"},{"word":"chunk","pos":"noun","en_meaning":"a piece or portion of something, especially a relatively large one; a segment of a body of text.","th_meaning":"ชิ้นส่วน (chinn) หรือ ส่วนต่างๆของบางอย่าง (pratang)","example_en":"He broke the ice cube into smaller chunks.","example_th":"เขากัดลูกแข็งน้ำแข็งให้เป็นชิ้นเล็ก ๆ"},{"word":"cinema","pos":"noun","en_meaning":"a place where films are shown for public entertainment, a large building used for showing movies","th_meaning":"โรงภาพยนตร์ ที่放映ภาพยนตร์ให้ชมกันเป็นกลุ่ม","example_en":"She went to the cinema with her friends last night.","example_th":"เธอไป cinéma กับเพื่อนๆ เมื่อวานนี้"},{"word":"circa","pos":"adverb","en_meaning":"about, roughly","th_meaning":"ประมาณ","example_en":"The event is scheduled for circa 7 PM.","example_th":"กิจกรรมนี้กำหนดเวลาประมาณ 19.00 น."},{"word":"circulate","pos":"verb","en_meaning":"to move around or travel from one place to another, often in a continuous or repeated way; to pass through different channels or people in a company, organization, or society.","th_meaning":"คัดลอกข้อมูลในระบบหรือการส่งข้อมูลที่มีอยู่ในระบบที่ต่าง ๆ ให้เข้ากับหรือผ่านระบบอื่น ๆ อีกครั้ง","example_en":"The news will circulate quickly through the city.","example_th":"ข่าวจะถูกกระจายไปทั่วเมืองได้อย่างรวดเร็ว"},{"word":"circulation","pos":"noun","en_meaning":"The act of moving something from one place to another or the movement of a liquid through a system.","th_meaning":"การบริหารจัดการเรื่องราวหรือความสัมพันธ์ระหว่างคนกับคน","example_en":"Improving blood circulation can help prevent diseases.","example_th":"การปรับปรุงการไหลเวียนของเลือดจะช่วยป้องกันโรค"},{"word":"civilization","pos":"noun","en_meaning":"the state of being civilized, or a society that is characterized by the development and practice of arts and sciences","th_meaning":"ความคivilized หรือสังคมที่มีการพัฒนาและปฏิบัติตามศิลปะและวิทยาศาสตร์","example_en":"The progress of humanity can be measured by the level of civilization.","example_th":"ความก้าวหน้าของมนุษยชาติสามารถวัดได้โดยระดับความcivilized"},{"word":"clarify","pos":"verb","en_meaning":"to make something clearer or more understandable","th_meaning":"ทำให้ชัดเจนขึ้นหรือเข้าใจง่ายขึ้น","example_en":"We need to clarify the instructions before starting the project.","example_th":"เราต้องการให้ความเข้าใจในการดำเนินงานก่อนที่จะเริ่มโครงการ"},{"word":"classification","pos":"noun","en_meaning":"The act of arranging things into groups based on similarities or differences.","th_meaning":"การจัดหมวดหมู่หรือการแบ่งประเภทของสิ่งต่างๆ ตามความคล้ายคลึงกันหรือแตกต่างกัน","example_en":"She made a classification of the plants based on their color and shape.","example_th":"เธอได้ทำการจัดหมวดหมู่สมบัติของพืชตามสีและรูปทรง"},{"word":"classify","pos":"verb","en_meaning":"to separate or arrange into different classes or categories based on similarities and differences","th_meaning":"เรียงหรือจัดหมวดหมู่ตามความคล้ายคลึงกันและแตกต่างกัน","example_en":"He needs to classify the emails by urgency.","example_th":"เขารับมือกับการจัดอีเมลโดยแบ่งตามความฉุนเฉิน"},{"word":"classroom","pos":"noun","en_meaning":"a room in a school or university where students are taught","th_meaning":"ห้องเรียน","example_en":"The teacher walked into the classroom.","example_th":"ครูเข้าไปในห้องเรียน"},{"word":"clay","pos":"noun","en_meaning":"a soft, plastic material composed of fine earth mixed with water, used for making pottery and bricks.","th_meaning":"ก้อนเหนียว (khwon-nueaw)","example_en":"She made a beautiful vase out of clay.","example_th":"เธอได้ทำถ้วยสวยงามด้วยก้อนเหนียว"},{"word":"clever","pos":"adjective","en_meaning":"showing great natural ability or quick intelligence","th_meaning":"ฉลาด","example_en":"He is a very clever boy.","example_th":"เขาเป็นเด็กที่ฉลาดมาก"},{"word":"client","pos":"noun","en_meaning":"a person or business that uses the services of another person, firm, or establishment.","th_meaning":"ผู้บริโภคหรือองค์กรที่ใช้บริการของบุคคลหรือกิจการอื่น","example_en":"The client asked for a detailed proposal.","example_th":"ลูกค้าขอความเห็นชอบในการเสนอราคาละเอียด"},{"word":"clinic","pos":"noun","en_meaning":"a place where medical treatment is given by a doctor or other health-care professional.","th_meaning":"คลินิก","example_en":"I need to go to the clinic for my check-up.","example_th":"ฉันต้องไปที่คลินิกตรวจสุขภาพ"},{"word":"clip","pos":"verb","en_meaning":"to cut with a pair of scissors or other cutting instrument","th_meaning":"ตัดหรือย่อยด้วยกุญแจหรือเครื่องใช้สำหรับการตัด","example_en":"He clipped his nails before the interview.","example_th":"เขาย่อยนิ้วมันก่อนที่จะไปสัมภาษณ์"},{"word":"clone","pos":"noun, verb","en_meaning":"to produce a copy of something, an exact duplicate","th_meaning":"คัดลอกหรือทำสำเนา","example_en":"She cloned the document for her coworkers.","example_th":"เธอทำการคัดลอกเอกสารนี้ให้กับเพื่อนร่วมงาน"},{"word":"closure","pos":"noun","en_meaning":"The state of being closed; a period of time during which something is not open or accessible.","th_meaning":"การปิดอยู่, ช่วงเวลาที่บางสิ่งไม่อยู่ในสถานะเปิดเผยหรือเข้าถึงได้","example_en":"The store will be closed on Sunday for a holiday.","example_th":"ร้านค้าจะปิดทำการวันอาทิตย์เพื่อหยุดนี้"},{"word":"clue","pos":"noun","en_meaning":"A piece of information that helps solve a mystery or puzzle.","th_meaning":"คำใบความช่วยเหลือที่ใช้ในการแก้ปัญหาหรือเกมส์สืบสวน","example_en":"The detective needed more clues to solve the case.","example_th":"ตำรวจต้องการข้อมูลเพิ่มเติมเพื่อแก้ไขเรื่องคดีนี้"},{"word":"coefficient","pos":"noun","en_meaning":"A number or quantity placed before and multiplying another element according to the rules of algebra. It is a constant factor in an expression.","th_meaning":"สัมประสิทธิ์ คือ ตัวเลขหรือปริมาณที่อยู่หน้าและ Nhânกับอิเลเมนต์อื่นตามกฎของพีช đại数 เป็นตัวคงที่ในสูตร","example_en":"The coefficient of friction between the two surfaces is 0.2.","example_th":"ความสัมพันธ์ระหว่างسطحสองอยู่ที่ 0.2"},{"word":"cognitive","pos":"noun","en_meaning":"relating to the mind or mental faculties; having a perception, awareness, or understanding of things","th_meaning":"เกี่ยวกับสมองหรือสมองคิดเห็น การรู้สึกและการเข้าใจของสิ่งต่างๆ","example_en":"She has excellent cognitive abilities.","example_th":"เธอมีทักษะทางจิตใจที่ยอดเยี่ยม"},{"word":"coherent","pos":"adjective","en_meaning":"having a clear and logical order or sequence; consistent in thought, argument, etc.","th_meaning":"มีความสัมพันธ์ที่คล่องตัวหรือเห็นด้วยกัน","example_en":"The story is coherent and easy to follow.","example_th":"เรื่องราวนี้ชัดเจนและง่ายต่อการทำตาม"},{"word":"collective","pos":"noun","en_meaning":"a group of people working or living together, especially for a common purpose.","th_meaning":"กลุ่มคนที่ทำงานหรืออาศัยอยู่ด้วยกันเพื่อเป้าหมายร่วมกัน","example_en":"The workers are part of a collective bargaining team.","example_th":"พนักงานตัวนี้คือส่วนหนึ่งของทีมจัดทำข้อเสนอร่วมกัน"},{"word":"colonial","pos":"noun","en_meaning":"relating to or characterized by the practice of colonization, the policy or practice of establishing colonies.","th_meaning":"เกี่ยวกับหรือมีลักษณะของการจัดตั้งท้องถิ่นในระยะยาวในประเทศอื่น ๆ โดยใช้แรงงานและทรัพยากรทางธรรมชาติดังกล่าว","example_en":"The legacy of colonialism continues to shape the political and economic landscape of many countries today.","example_th":"ประวัติศาสตร์การจัดตั้งท้องถิ่นยังคงมีบทบาทในการสร้างลักษณะทาง سيร์กุลและเศรษฐกิจของประเทศหลายแห่งในปัจจุบัน"},{"word":"colony","pos":"noun","en_meaning":"a group of people living together in a particular place, especially with the intention of settling there.","th_meaning":"กลุ่มคนที่อยู่ร่วมกันในพื้นที่某一ที่ โดยมีความตั้งใจจะอาศัยอยู่ดูแล","example_en":"The island is home to many bird colonies.","example_th":"เกาะนี้มีกลุ่มนกอยู่มาก"},{"word":"comma","pos":"noun","en_meaning":"a symbol used to separate items in a list or to indicate a pause between parts of a sentence.","th_meaning":"เครื่องหมายที่ใช้ในการแยกรายการหรือเพื่อระบุจุดหยุดระหว่างส่วนต่าง ๆ ในประโยค","example_en":"I bought apples, bananas, and oranges.","example_th":"ฉันซื้ออร่อยสุดท้ายนี้ แอปเปิล, เหล็ก, และองรุ่ง"},{"word":"commentary","pos":"noun","en_meaning":"an interpretation or explanation of something, especially a text or performance.","th_meaning":"การอภิปรายหรือวิเคราะห์คำที่เขียนอยู่ในข้อความต่าง ๆ หรือการแสดงการเล่น.","example_en":"A detailed commentary on the painting was published in the magazine.","example_th":"มีการอภิปรายละเอียดเกี่ยวกับภาพนี้ในกลุ่มบันทึกข้อมูล"},{"word":"commodity","pos":"noun","en_meaning":"a good or material that is bought and sold in a market, especially one that is not made or produced locally.","th_meaning":"สินค้าที่ขายในตลาด เช่น การค้าส่งเสริมการผลิตและกระจายความรู้","example_en":"The price of oil has been fluctuating recently.","example_th":"ราคาแก๊สโซเลียมเปลี่ยนแปลงอยู่บ่อยครั้งล่าสุด"},{"word":"commonly","pos":"adverb","en_meaning":"often or frequently","th_meaning":"บ่อยครั้งหรือเป็นที่ความต้องการมาก","example_en":"He reads books commonly.","example_th":"เขารับอ่านหนังสือบ่อยๆ"},{"word":"communicative","pos":"adjective","en_meaning":"showing or characterized by a readiness to talk and discuss topics, especially those that are personal or intimate.","th_meaning":"แสดงออกหรือมีความพร้อมที่จะคุยและพูดถึงหัวข้อ ซึ่งอาจเป็นส่วนตัวหรือลับเรื่องราว","example_en":"He is a very communicative person.","example_th":"เขาน่าจะเป็นคนที่มีความพร้อมในการคุยและพูดถึงหัวข้อต่าง ๆ"},{"word":"communist","pos":"noun","en_meaning":"a person or political belief that advocates for a classless society and government by collective ownership of the means of production, without private property, wages, or profits.","th_meaning":"ผู้มีวิถีชีวิตคอมมิวนิสต์ หรือแนวคิดที่สนับสนุนการสังคมไม่มีความแตกต่างทางคลาส และการปกครองด้วยระบบส่วนร่วมกันของทรัพยากรโดยไม่มีทรัพย์สินส่วนบุคคล เงินเดือนหรือกำไร","example_en":"He is a communist who believes in equal distribution of wealth.","example_th":"เขานำเสนอแนวคิดคอมมิวนิสต์ที่เป็นไปตามความเชื่อว่าทรัพยากรควรแบ่งปันอย่างเท่าเทียมกัน"},{"word":"compact","pos":"adjective","en_meaning":"small in size but containing much that is useful or interesting; brief and to the point","th_meaning":"อย่างเล็กซี่เล็กน้อยแต่มีสิ่งที่ใช้ประโยชน์หรือน่าสนใจมากมาย; คิดเห็นได้อย่างรวดเร็วและตรงไปตรงมา","example_en":"She packed her bags in a compact manner.","example_th":"เธอเก็บกระเป๋าของเธอในลักษณะเล็กซี่เล็กน้อย"},{"word":"comparable","pos":"adjective","en_meaning":"able to be compared or likened","th_meaning":"สามารถเปรียบเทียบหรือคล้ายกันได้","example_en":"These cars are comparable in price and performance.","example_th":"รถยนต์สองคันนี้มีราคาและประสิทธิภาพที่คล้ายกัน"},{"word":"comparative","pos":"adjective","en_meaning":"able to be compared; serving for comparison","th_meaning":"ที่สามารถเปรียบเทียบได้ หรือเป็นเครื่องมือในการเปรียบเทียบ","example_en":"This new car is more comparative than the old one.","example_th":"รถเล็กใหม่นี้ราคาถูกกว่ารถเก่ามาก"},{"word":"compensate","pos":"verb","en_meaning":"to make up for a loss or injury by giving something else of equal value","th_meaning":"ให้เพิ่มเติมหรือทำแทนที่สิ่งที่เสียหาย","example_en":"I will compensate you for the lost time.","example_th":"ฉันจะช่วยคุณด้วยเวลาที่ไม่มีอีก"},{"word":"competence","pos":"noun","en_meaning":"the ability to perform a particular task or activity successfully","th_meaning":"ทักษะในการทำบางอย่างสำเร็จ","example_en":"She has excellent competence in her field.","example_th":"เธอมีทักษะดีในสาขาของเธอ"},{"word":"competent","pos":"adjective","en_meaning":"having the ability, skills, or knowledge necessary to do a job well","th_meaning":"มีทักษะหรือความรู้เพียงพอในการทำงานได้อย่างดี","example_en":"She is highly competent in her field.","example_th":"เธอสามารถทำหน้าที่ได้ดี"},{"word":"complement","pos":"verb","en_meaning":"to make up for a deficiency or weakness, to enhance or improve something","th_meaning":"เพื่อเสริมพัฒนาหรือแก้ไขปัญหาที่เกิดขึ้น","example_en":"I need your help to complement my skills.","example_th":"ฉันต้องการความช่วยเหลือจากคุณเพื่อเสริมสร้างทักษะของฉัน"},{"word":"complication","pos":"noun","en_meaning":"a thing that makes a situation more difficult or complicated","th_meaning":"การส่งเสริมปัญหาหรือทำให้เรื่องราวซับซ้อนขึ้น","example_en":"The medical team encountered several complications during the surgery.","example_th":"ทีมแพทย์พบกับความซับซ้อนหลายอย่างขณะทำการผ่าตัด"},{"word":"comply","pos":"verb","en_meaning":"to agree with or obey a rule, order, or request.","th_meaning":"ที่ต้องปฏิบัติตามหรือเข้าใจคำสั่ง","example_en":"The company must comply with all regulations.","example_th":"บริษัทต้องปฏิบัติตามข้อกำหนดทั้งหมด"},{"word":"composer","pos":"noun","en_meaning":"a person who writes music, especially classical or orchestral music.","th_meaning":"ผู้ที่เขียนเพลง เช่น หรือchest การ์โตรีส์","example_en":"Beethoven was a great composer.","example_th":"เบทห์นอินgs คือคนที่สร้างและเขียนเพลงดังที่มีศักยภาพอย่างมาก"},{"word":"composite","pos":"noun","en_meaning":"a combination of two or more parts, elements, or substances to form a whole that is greater than the sum of its parts; something made up of different materials or components","th_meaning":"ประกอบด้วยส่วนผสมหรือองค์ประกอบหลายอย่างรวมกันเพื่อสร้างสิ่งที่มีความซับซ้อนและมากกว่าผลรวมของส่วนๆ นั้นๆ","example_en":"A composite material is a combination of two or more materials to create a stronger, lighter product.","example_th":"วัสดุประกอบเป็นสินค้าที่ประกอบด้วยการผสมผสานวัสดุหลายชนิดเพื่อให้มีความแข็งแรงและเบาขึ้น"},{"word":"comprehension","pos":"noun","en_meaning":"the ability to understand or interpret something","th_meaning":"ความสามารถในการเข้าใจหรือตีความ","example_en":"I need more time for better comprehension of the subject.","example_th":"ฉันต้องใช้เวลาเพิ่มเติมในการเข้าใจเรื่องนี้"},{"word":"computation","pos":"noun","en_meaning":"the process of calculating or computing something; the use of computers to perform calculations and operations","th_meaning":"การคำนวณหรือการใช้คอมพิวเตอร์ในการคำนวณและทำการดำเนินการทางคณิตศาสตร์","example_en":"The computation involved complex algorithms.","example_th":"การคำนวณที่เกี่ยวข้องกับอัลกอริทึมที่ซับซ้อน"},{"word":"conceive","pos":"verb","en_meaning":"to form an idea or plan in one's mind, to bring something into existence by imagination or thought.","th_meaning":"คิดสร้างหรือเกิดแนวคิดในใจ","example_en":"She conceived the idea of starting a business.","example_th":"เธอคิดว่าควรเริ่มธุรกิจ"},{"word":"conception","pos":"noun","en_meaning":"The formation or occurrence of an idea, plan, or design in the mind.","th_meaning":"การสร้างความคิด แผนหรือการออกแบบในใจ","example_en":"The conception of a new project was born out of her imagination.","example_th":"การสร้างความคิดใหม่เกิดขึ้นจากความฝันของเธอ"},{"word":"conceptual","pos":"adjective","en_meaning":"relating to or involving ideas or concepts rather than physical objects or situations; theoretical","th_meaning":"ที่เกี่ยวกับแนวคิดหรือความคิด เทคนิカル","example_en":"The problem is purely conceptual and does not require any practical solution.","example_th":"ปัญหานี้เป็นเพียงเรื่องทฤษฎีและไม่จำเป็นต้องมีการแก้ไขทางปฏิบัติ"},{"word":"conditional","pos":"adjective","en_meaning":"based on or depending on a condition","th_meaning":"ที่ขึ้นอยู่กับเงื่อนไขหรือมีเงื่อนไข","example_en":"The offer is conditional upon your acceptance.","example_th":"สิ่งเสนอมีเงื่อนไขว่าต้องการให้คุณยอมรับ"},{"word":"conduction","pos":"noun","en_meaning":"The transfer of heat, electricity, or other quantities from one part of a substance to another.","th_meaning":"การส่งผ่านความร้อน, กระแสไฟฟ้า, หรือปริมาณอื่น ๆ จากส่วนหนึ่งของวัสดุไปยังส่วนอื่น ๆ","example_en":"Electrical conduction occurs when an electric current flows through a material.","example_th":"การส่งผ่านกระแสไฟฟ้าเกิดขึ้นเมื่อกระแสไฟฟ้าไหลผ่านวัสดุ"},{"word":"cone","pos":"noun","en_meaning":"a solid geometric figure with a circular base and straight sides that taper to a point","th_meaning":"ทรงกรวย","example_en":"The ice cream cone was melting in the sun.","example_th":"สีกับคอนยังร้อนในแดด"},{"word":"configuration","pos":"noun","en_meaning":"The process of making something fit together or setting it up in a particular way, especially for use.","th_meaning":"การตั้งค่าหรือกำหนดค่าเพื่อให้อุปกรณ์หรือระบบทำงานอย่างถูกต้อง","example_en":"The server configuration is complete.","example_th":"การตั้งค่าเซิร์ฟเวอร์เสร็จสมบูรณ์แล้ว"},{"word":"confine","pos":"verb","en_meaning":"to restrict the movement or activities of someone or something to a particular place","th_meaning":"จำกัดการเคลื่อนไหวหรือกิจกรรมของบุคคลหรือสิ่งของให้อยู่ในพื้นที่เฉพาะเจาะจง","example_en":"The prison guards were instructed to confine the prisoners to their cells.","example_th":"หน่วยงานดูแลคนถูกจำคุกได้รับคำสั่งให้จำกัดการเคลื่อนไหวของผู้ก่อเหตุในห้องนักโทษ"},{"word":"confound","pos":"verb","en_meaning":"to confuse or perplex; to make something unclear or indistinct","th_meaning":"ทำให้สับสนหรือไม่เข้าใจ","example_en":"The confusing instructions made the project confounded.","example_th":"คำแนะนำที่ซับซ้อนทำให้โปรเจคสับสน"},{"word":"congruent","pos":"adjective","en_meaning":"exactly corresponding or matching; identical in form and size","th_meaning":"ตรงกันข้าม, เหมือนกัน","example_en":"The two shapes are congruent.","example_th":"รูปทรงสองตัวนี้เหมือนกัน"},{"word":"connector","pos":"noun","en_meaning":"a device that joins two things together","th_meaning":"อุปกรณ์ที่ใช้เชื่อมต่อสิ่งของสองอย่างด้วยกัน","example_en":"The electrical outlet is a connector for plugging in devices.","example_th":"ปลUG อินพาราจีซึ่งเป็นอุปกรณ์ที่ใช้เชื่อมต่อสิ่งของสองอย่างด้วยกัน"},{"word":"connotation","pos":"noun","en_meaning":"the often unseen or implicit meaning of a word, phrase, or concept that is not expressed explicitly by the literal definition","th_meaning":"ความหมายที่ซ่อนอยู่หรือไม่ได้ระบุโดยชื่อคำในลักษณะที่เป็นไปตรงข้ามกับความหมายที่เขียนบนหนังสือ","example_en":"The phrase 'healthy eating' has a positive connotation, while 'dieting' can have a negative one.","example_th":"พจนานุกรม 'การบริโภคอาหารอย่างصحดี' มีความหมายที่บวก ส่วนคำว่า 'การเลือดออกเพื่อควบคุมน้ำหนัก' อาจมีความหมายที่ลบ"},{"word":"conscious","pos":"adjective","en_meaning":"having or showing awareness of one's surroundings and existence; alert, awake, aware","th_meaning":"มีความรู้สึกหรือตระหนัก (muai khao sook)","example_en":"He was conscious when the accident happened.","example_th":"เขาตระหนักเมื่อเหตุการณ์นั้นเกิดขึ้น"},{"word":"consciousness","pos":"noun","en_meaning":"the state of being aware of one's surroundings and oneself","th_meaning":"ความรู้สึกหรือการตระหนักรู้สึกของตัวเองและสภาพแวดล้อมรอบข้าง","example_en":"She regained consciousness after the accident.","example_th":"เธอกลับมาในภาวะวินิจฉัยหลังจากอุบัติเหตุ"},{"word":"consensus","pos":"noun","en_meaning":"general agreement or opinion, especially among a group of people.","th_meaning":"สืบคุณสมบัติ ความเห็นร่วมกัน","example_en":"They reached a consensus on the project plan after several meetings.","example_th":"พวกเขาร่วมกันสร้างแผนโครงการหลังจากที่ได้พบกันหลายครั้ง"},{"word":"consent","pos":"noun, verb","en_meaning":"The permission given by a person to do something or the action of giving this permission; agreement, approval.","th_meaning":"การรับรอง การยินยอม หรือความเห็นชอบในบางเรื่อง","example_en":"He gave his consent before signing the contract.","example_th":"เขาตกลงให้ความยินยอมก่อนที่จะลงนามสัญญา"},{"word":"conservation","pos":"noun","en_meaning":"The practice of protecting natural resources so that they will be available in the future.","th_meaning":"การปกคลุมทรัพยากรธรรมชาติเพื่อให้สามารถใช้งานได้นานๆ","example_en":"Conservation efforts are vital for protecting biodiversity.","example_th":"การปฏิบัติตามหลักการปกคลุมทรัพยากรธรรมชาติเป็นสิ่งที่จำเป็นสำหรับการป้องกันความหลากหลายทางชีวภาพ"},{"word":"conserve","pos":"verb","en_meaning":"to save or protect something, typically from damage or loss.","th_meaning":"ส่งเสริมหรือปกป้องอย่างยั่งยืน","example_en":"We should conserve water by fixing the leaky faucet.","example_th":"เราควรป้องกันน้ำอย่างดีโดยการแก้ไขช่องผูกฝักที่ลื่นไหล"},{"word":"consonant","pos":"noun","en_meaning":"A speech sound produced by constricting the vocal tract in some way that stops or partially stops the flow of air from the lungs.","th_meaning":"สระที่ไม่มีความนุ่งตัว","example_en":"The quick brown fox jumps over the lazy dog.","example_th":"เพื่อนคนหนึ่งอยู่กับเพื่อนคนอื่น"},{"word":"constitution","pos":"noun","en_meaning":"a set of rules and laws that establish a government or other organization, usually constituting the framework within which it operates.","th_meaning":"คำตั้งร่างกฎหมายที่กำหนดระบบการปกครองหรือองค์กรอื่น ๆ ซึ่งประกอบด้วยข้อกำหนดและกฎหมายที่ระบุโครงสร้างในการดำเนินการของมัน","example_en":"The country's constitution was written in a new language.","example_th":"คำตั้งร่างประเทศเขียนในภาษาใหม่"},{"word":"constrain","pos":"verb","en_meaning":"to limit or restrict","th_meaning":"จำกัดหรือทรมาน","example_en":"He constrained himself to eat only vegetables.","example_th":"เขารีบเขาให้กินแค่ผักเท่านั้น"},{"word":"consultation","pos":"noun","en_meaning":"the act of discussing something with one or more people in order to get advice or opinions","th_meaning":"การปรึกษาหรือร่วมวิเคราะห์เรื่องราวด้วยกันเพื่อได้คำแนะนำหรือความคิดเห็น","example_en":"I need to have a consultation with my doctor.","example_th":"ฉันต้องการให้มีการปรึกษาด้วยแพทย์ของฉัน"},{"word":"consumption","pos":"noun","en_meaning":"the act of using up resources or energy, or the amount of something used over a period of time.","th_meaning":"การใช้พลังงานหรือทรัพยากรมากขึ้นจนหมด, ปริมาณของสิ่งมีค่าที่ถูกใช้ในระยะเวลา特定","example_en":"His high consumption habits are causing him financial problems.","example_th":"พฤติกรรมการใช้พลังงานสูงของเขานี้ทำให้มันเกิดปัญหาทางการเงิน"},{"word":"container","pos":"noun","en_meaning":"A receptacle for storing or transporting goods, materials, or people.","th_meaning":"ถ้วยสำหรับบรรจุสินค้า วัสดุดิบที่จะขนส่งหรือคน","example_en":"We use containers to store our goods during transportation.","example_th":"เราใช้ถ้วยสำหรับบรรจุสินค้าระหว่างการขนส่ง"},{"word":"continent","pos":"noun","en_meaning":"a large landmass surrounded by water, one of the Earth's seven main land areas.","th_meaning":"ทวีป (Thap)","example_en":"The continents are Europe, Asia, Africa, North America, South America, Australia, and Antarctica.","example_th":"มีทวีปสี่ภาคใหญ่ในโลกคือ ทวีปยุโรป, アジア, อเมริกาเหนือ, อเมริกาใต้, ออซเตรเลีย และแอฟริกา"},{"word":"continuity","pos":"noun","en_meaning":"the state of being continuous and unbroken; a connected series of events or phenomena; the property of being seamless.","th_meaning":"ความต่อเนื่องหรือการส่งผ่านไปกับอีกอย่างหนึ่งโดยไม่มีขัดแย้ง","example_en":"There was a continuity in his performance throughout the tournament.","example_th":"เขาได้แสดงทักษะที่มีความต่อเนื่องและสมบูรณ์ในช่วงการแข่งขันทั้งหมด"},{"word":"contour","pos":"noun, verb","en_meaning":"a line joining points of equal elevation on a map; to create or shape the outline of something","th_meaning":"เส้นทางที่เชื่อมต่อกำลังการสูญพันธุ์ที่เท่ากันในแผนที่","example_en":"The contour lines show the elevation changes in the area.","example_th":"เส้นContoursที่แสดงความเปลี่ยนแปลงระดับของบริเวณนั้น"},{"word":"contradict","pos":"verb","en_meaning":"to say or do the opposite of what someone else says or does, thereby disagreeing with them.","th_meaning":"ต่ออักษรผิดกัน หรือการไม่ยอมรับความเห็นของใครบางคนที่แตกต่างกับคุณ","example_en":"The statement he made contradicts the facts.","example_th":"คำว่าเขาบอกตรงข้ามกับสิ่งที่เกิดขึ้น"},{"word":"contradiction","pos":"noun","en_meaning":"the situation in which two or more things seem to be at odds with each other","th_meaning":"ความแย้ง หรือสถานการณ์ที่สองสิ่งใด ๆ ดูเหมือนกันไม่เข้ากับกัน","example_en":"There is a contradiction between the two statements.","example_th":"มีความแย้งระหว่างประโยคตัวอักษรสองแห่งนี้"},{"word":"contradictory","pos":"adjective","en_meaning":"not in agreement with one's statements or previous ideas; saying one thing but meaning another;","th_meaning":"ตรงข้ามกัน, มีความผิดแย้ง","example_en":"His words are contradictory.","example_th":"คำพูดของเขานั้นเป็นอักษรที่ไม่สอดคล้องกัน"},{"word":"contrary","pos":"adjective, adverb","en_meaning":"opposite; in the opposite direction or sense","th_meaning":"ตรงกันข้าม","example_en":"He has a contrary opinion to me.","example_th":"เขาเห็นใจตรงกันข้ามกับฉัน"},{"word":"controversy","pos":"noun","en_meaning":"a heated or激烈争论；dispute","th_meaning":"การขัดแย้งหรือประเด็นที่เกิดความต่อเถียง","example_en":"There has been much controversy over the new policy.","example_th":"มีประเด็นด้านขัดแย้งเกี่ยวกับนโยบายใหม่"},{"word":"converge","pos":"verb","en_meaning":"to come together or approach each other, especially so that they touch or unite; to tend towards a single point or result.","th_meaning":"มีความต้องการที่จะรวมกันหรือต้องการไปสู่จุดเดียวกัน","example_en":"The streams converge at the lake.","example_th":"น้ำเข้าด้วยกันที่ทะเล"},{"word":"convergence","pos":"noun
