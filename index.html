ร่วมวันสุดยอดการทำอาหารเพื่อเรียนรู้วิธีทำ披萨"},{"word":"yeast","pos":"noun","en_meaning":"A single-celled fungus that ferments sugars to produce ethanol and carbon dioxide, used in baking and fermentation.","th_meaning":"ยีสต์ (yīst) - สิ่งมีชีวิตที่เปลี่ยนผลไม้เป็นแป้งเกะและคาร์บอนไดออกไซด์","example_en":"Baking bread requires yeast.","example_th":"การทำขนมปังต้องใช้ยีสต์"}];

let currentName = '';

function loadData(name){
  try{const s=localStorage.getItem(STORAGE_KEY+name.toLowerCase());if(s)return JSON.parse(s);}catch(e){}
  return{index:0,history:[],lastDate:null,todayWords:[]};
}
function saveData(name,d){
  try{localStorage.setItem(STORAGE_KEY+name.toLowerCase(),JSON.stringify(d));}catch(e){}
}
function today(){return new Date().toDateString();}
function todayLabel(){return new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('loginScreen').classList.contains('active'))tryLogin();
});

function tryLogin(){
  const name=document.getElementById('nameInput').value.trim();
  const pass=document.getElementById('passInput').value;
  const err=document.getElementById('loginErr');
  if(!name){err.textContent='Please enter your name.';return;}
  if(pass!==PASSCODE){err.textContent='Wrong passcode. Try again.';document.getElementById('passInput').value='';return;}
  err.textContent='';
  currentName=name;
  openApp();
}

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function openApp(){
  show('appScreen');
  const data=loadData(currentName);
  document.getElementById('topAv').textContent=currentName[0].toUpperCase();
  document.getElementById('topName').textContent=currentName;
  document.getElementById('topDate').textContent=todayLabel();
  updateProgress(data);
  renderHistory(data);
  runDaily(data);
}

function logout(){
  currentName='';
  document.getElementById('nameInput').value='';
  document.getElementById('passInput').value='';
  document.getElementById('loginErr').textContent='';
  show('loginScreen');
}

function updateProgress(data){
  const pct=(data.index/WORDS.length)*100;
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progCount').textContent=data.index;
  document.getElementById('progTotal').textContent='/ '+WORDS.length+' words';
  document.getElementById('progPct').textContent=pct.toFixed(1)+'%';
}

function setStatus(msg,type){
  const el=document.getElementById('statusBar');
  el.textContent=msg;
  el.className='status'+(type?' '+type:'');
}

function runDaily(data){
  const grid=document.getElementById('wordGrid');
  const moreBtn=document.getElementById('moreBtn');

  if(data.index>=WORDS.length){
    grid.innerHTML='<div style="grid-column:span 2;text-align:center;padding:2rem;color:var(--muted)">All '+WORDS.length+' words completed! Great work.</div>';
    moreBtn.style.display='none';
    return;
  }

  // Already done today — show cached words
  if(data.lastDate===today()&&data.todayWords&&data.todayWords.length){
    renderCards(data.todayWords);
    moreBtn.style.display='block';
    setStatus("Today's words are ready. Want more? Click below!",'ok');
    return;
  }

  // New day — get next 2
  const pair=WORDS.slice(data.index, data.index+2);
  const newData={
    ...data,
    index:data.index+pair.length,
    lastDate:today(),
    todayWords:pair,
    history:[...(data.history||[]),{date:new Date().toLocaleDateString('en-GB'),words:pair.map(w=>w.word),extra:false}]
  };
  saveData(currentName,newData);
  renderCards(pair);
  updateProgress(newData);
  renderHistory(newData);
  moreBtn.style.display='block';
  setStatus("Today's 2 words are ready!",'ok');
}

function loadMore(){
  const data=loadData(currentName);
  if(data.index>=WORDS.length){
    setStatus('You have completed all '+WORDS.length+' words!','ok');
    return;
  }
  const btn=document.getElementById('moreBtn');
  btn.disabled=true;
  const pair=WORDS.slice(data.index,data.index+2);
  const newData={
    ...data,
    index:data.index+pair.length,
    todayWords:[...data.todayWords,...pair],
    history:[...(data.history||[]),{date:new Date().toLocaleDateString('en-GB'),words:pair.map(w=>w.word),extra:true}]
  };
  saveData(currentName,newData);
  renderCards(newData.todayWords);
  updateProgress(newData);
  renderHistory(newData);
  btn.disabled=false;
  setStatus('Added 2 more words!','ok');
}

function posKey(pos){
  const p=(pos||'').toLowerCase();
  if(p.includes('noun'))return'noun';
  if(p.includes('verb'))return'verb';
  if(p.includes('adj'))return'adj';
  if(p.includes('adv'))return'adv';
  return'other';
}
function makeTile(w,inSearch){
  const pk=posKey(w.pos);
  const c=`var(--pos-${pk})`,bg=`var(--pos-${pk}-bg)`;
  const data=loadData(currentName);
  const isMemorized=(data.memorized||[]).includes(w.word);
  const btnLabel=isMemorized?'✓ Memorized':'Memorize';
  const btnClass='btn-memorize'+(isMemorized?' memorized':'');
  const btnAttr=isMemorized?'disabled':'onclick="memorizeWord(\''+w.word+'\')"';
  return`<div class="wtile" style="background:${bg};border-color:${c}22">
    <div class="wt-n">#${WORDS.indexOf(w)+1} of ${WORDS.length}</div>
    <div class="wt-header">
      <div class="wt-word" style="color:${c}">${w.word}</div>
      <div class="wt-pos-badge" style="background:${c}18;color:${c}">${w.pos}</div>
    </div>
    <div class="wt-en">${w.en_meaning}</div>
    <div class="wt-th" style="color:${c}">${w.th_meaning}</div>
    <hr class="wt-line">
    <div class="wt-ex">${w.example_en}</div>
    <div class="wt-ex-th">${w.example_th}</div>
    <button class="${btnClass}" ${btnAttr}>${btnLabel}</button>
  </div>`;
}
function memorizeWord(word){
  const data=loadData(currentName);
  const memorized=data.memorized||[];
  if(memorized.includes(word))return;
  const newData={...data,memorized:[...memorized,word]};
  saveData(currentName,newData);
  renderCards(newData.todayWords);
  renderHistory(newData);
}

function renderCards(wordList){
  const shown=wordList.slice(-2);
  document.getElementById('wordGrid').innerHTML=shown.map(makeTile).join('');
}

function doSearch(){
  const q=(document.getElementById('searchInput').value||'').trim().toLowerCase();
  const out=document.getElementById('searchOut');
  if(!q){out.innerHTML='';return;}
  const data=loadData(currentName);
  const learned=data.todayWords||[];
  const results=learned.filter(w=>
    w.word.toLowerCase().includes(q)||
    (w.en_meaning||'').toLowerCase().includes(q)||
    (w.th_meaning||'').toLowerCase().includes(q)
  );
  if(!results.length){out.innerHTML='<div class="empty">No match found in your learned words.</div>';return;}
  out.innerHTML='<div style="display:flex;flex-direction:column;gap:0.75rem;margin-top:0.25rem">'+results.map(makeTile).join('')+'</div>';
}

function renderHistory(data){
  const wrap=document.getElementById('histWrap');
  if(!data.history||!data.history.length){wrap.innerHTML='<div class="empty">No entries yet.</div>';return;}
  const memorized=data.memorized||[];
  wrap.innerHTML='<div class="hist-list">'+[...data.history].reverse().map(h=>`
    <div class="hist-row">
      <span class="hist-dot"></span>
      <span class="hist-words">${h.words.map(w=>{
        const wo=WORDS.find(x=>x.word===w);
        const pk=wo?posKey(wo.pos):'other';
        const mem=memorized.includes(w);
        return`<span class="hist-word-chip ${pk}${mem?' memorized-chip':''}">${w}${mem?' ✓':''}</span>`;
      }).join('')}</span>
      <span class="badge${h.extra?' badge-extra':''}">${h.extra?'+2':'daily'}</span>
      <span class="hist-date">${h.date}</span>
    </div>`).join('')+'</div>';
}
</script>
